<!--
  Jamlex hero stamps + scattered decorations
  ----------------------------------------------------------------------------
  Reusable SVG illustrations for auth screens, auth gates, and empty states.
  Each "stamp" is a self-contained SVG that includes its scattered confetti
  decorations. Drop into any screen with the matching class name on the wrapper.

  Wrappers:
    <div class="hero-stamp hero-stamp--lock"></div>       — Login
    <div class="hero-stamp hero-stamp--profile"></div>    — Register
    <div class="hero-stamp hero-stamp--phone"></div>      — Phone auth
    <div class="hero-stamp hero-stamp--key"></div>        — Forgot/New password
    <div class="hero-stamp hero-stamp--success"></div>    — Email verified

  Auth gate (full-illustration variant):
    <div class="auth-gate-illo auth-gate-illo--leitner"></div>
    <div class="auth-gate-illo auth-gate-illo--mywords"></div>
    <div class="auth-gate-illo auth-gate-illo--books"></div>

  The included CSS provides the layout — each illustration uses absolute
  positioning so the decorations don't reflow the layout.
-->

<!-- ─── HERO STAMP — LOCK ───────────────────────────────────────────── -->
<template id="tpl-hero-lock">
  <div class="hero-stamp hero-stamp--auth">
    <!-- Decoration: yellow diamond (top-start) -->
    <svg class="deco deco-1" viewBox="0 0 24 24" fill="none">
      <rect x="2" y="2" width="20" height="20" rx="4" transform="rotate(45 12 12)" fill="#F5B945"/>
    </svg>
    <!-- Decoration: purple square + person (mid-start) -->
    <svg class="deco deco-2" viewBox="0 0 48 48" fill="none">
      <rect x="2" y="2" width="44" height="44" rx="12" fill="#6C5CE7"/>
      <circle cx="24" cy="19" r="6" fill="#fff"/>
      <path d="M12 36c0-6.6 5.4-12 12-12s12 5.4 12 12" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    </svg>
    <!-- Decoration: green circle + check (top-end) -->
    <svg class="deco deco-3" viewBox="0 0 48 48" fill="none">
      <circle cx="24" cy="24" r="22" fill="#26D07C"/>
      <path d="M14 24l7 7 13-13" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <!-- Decoration: small purple diamond (mid-end) -->
    <svg class="deco deco-4" viewBox="0 0 16 16" fill="none">
      <rect x="1" y="1" width="14" height="14" rx="2" transform="rotate(45 8 8)" fill="#8E7BFF"/>
    </svg>

    <!-- Main stamp: rounded square + lock -->
    <div class="hero-stamp__shape">
      <svg viewBox="0 0 64 64" fill="none">
        <rect x="14" y="28" width="36" height="28" rx="6" stroke="#1A2138" stroke-width="3.5"/>
        <path d="M22 28v-7a10 10 0 0 1 20 0v7" stroke="#1A2138" stroke-width="3.5" stroke-linecap="round"/>
        <circle cx="32" cy="42" r="2.5" fill="#1A2138"/>
        <line x1="32" y1="44" x2="32" y2="48" stroke="#1A2138" stroke-width="3" stroke-linecap="round"/>
      </svg>
    </div>
  </div>
</template>

<!-- ─── HERO STAMP — PROFILE (register) ─────────────────────────────── -->
<template id="tpl-hero-profile">
  <div class="hero-stamp hero-stamp--auth hero-stamp--profile">
    <!-- Decoration: purple plus circle (top-start) -->
    <svg class="deco deco-1" viewBox="0 0 48 48" fill="none">
      <circle cx="24" cy="24" r="22" fill="#6C5CE7"/>
      <path d="M24 14v20M14 24h20" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    </svg>
    <!-- Decoration: green check (top-end) -->
    <svg class="deco deco-2" viewBox="0 0 48 48" fill="none">
      <circle cx="24" cy="24" r="22" fill="#26D07C"/>
      <path d="M14 24l7 7 13-13" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <!-- Decoration: orange diamond (right) -->
    <svg class="deco deco-3" viewBox="0 0 20 20" fill="none">
      <rect x="2" y="2" width="16" height="16" rx="3" transform="rotate(45 10 10)" fill="#F5B945"/>
    </svg>
    <!-- Decoration: purple lock badge (bottom-end) -->
    <svg class="deco deco-4" viewBox="0 0 48 48" fill="none">
      <rect x="4" y="4" width="40" height="40" rx="10" fill="#6C5CE7"/>
      <rect x="16" y="22" width="16" height="14" rx="3" stroke="#fff" stroke-width="2.5"/>
      <path d="M19 22v-3a5 5 0 0 1 10 0v3" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
    </svg>

    <!-- Main stamp: teal rounded square + profile silhouette -->
    <div class="hero-stamp__shape hero-stamp__shape--teal">
      <svg viewBox="0 0 64 64" fill="none">
        <circle cx="32" cy="24" r="8" fill="#fff"/>
        <path d="M18 50c0-7.7 6.3-14 14-14s14 6.3 14 14" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>
        <line x1="22" y1="56" x2="42" y2="56" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
      </svg>
    </div>
  </div>
</template>

<!-- ─── HERO STAMP — KEY (forgot / reset password) ──────────────────── -->
<template id="tpl-hero-key">
  <div class="hero-stamp hero-stamp--auth">
    <svg class="deco deco-1" viewBox="0 0 24 24" fill="none">
      <rect x="2" y="2" width="20" height="20" rx="4" transform="rotate(45 12 12)" fill="#F5B945"/>
    </svg>
    <svg class="deco deco-2" viewBox="0 0 48 48" fill="none">
      <rect x="2" y="2" width="44" height="44" rx="12" fill="#6C5CE7"/>
      <circle cx="24" cy="19" r="6" fill="#fff"/>

      <circle cx="24" cy="24" r="22" fill="#26D07C"/>

        <circle cx="24" cy="32" r="10" stroke="#1A2138" stroke-width="3.5"/>

        <line x1="46" y1="32" x2="46" y2="40" stroke="#1A2138" stroke-width="3.5" stroke-linecap="round"/>
        <line x1="52" y1="32" x2="52" y2="38" stroke="#1A2138" stroke-width="3.5" stroke-linecap="round"/>

<!-- ─── AUTH GATE ILLUSTRATION (big standalone, with leaves + books) ──── -->
<template id="tpl-auth-gate-illo">
  <div class="auth-gate-illo">
    <!-- Sparkles -->
    <svg class="auth-gate-illo__sparkle auth-gate-illo__sparkle--1" viewBox="0 0 24 24" fill="none">
      <path d="M12 2l1.5 6 6 1.5-6 1.5L12 17l-1.5-6-6-1.5 6-1.5L12 2z" fill="#A5DCD5"/>
    </svg>
    <svg class="auth-gate-illo__sparkle auth-gate-illo__sparkle--2" viewBox="0 0 24 24" fill="none">
      <path d="M12 2l1.5 6 6 1.5-6 1.5L12 17l-1.5-6-6-1.5 6-1.5L12 2z" fill="#A5DCD5"/>
    </svg>
    <svg class="auth-gate-illo__sparkle auth-gate-illo__sparkle--3" viewBox="0 0 24 24" fill="none">
      <path d="M12 2l1.5 6 6 1.5-6 1.5L12 17l-1.5-6-6-1.5 6-1.5L12 2z" fill="#A5DCD5"/>
    </svg>

    <!-- Background card (the rounded rectangle behind everything) -->
    <svg class="auth-gate-illo__bg-card" viewBox="0 0 200 220" fill="none">
      <rect x="20" y="20" width="160" height="180" rx="20" fill="#fff" stroke="#E8F0F2" stroke-width="2"/>
    </svg>

    <!-- Big teal lock -->
    <svg class="auth-gate-illo__lock" viewBox="0 0 120 140" fill="none">
      <defs>
        <linearGradient id="lockGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#4ECDC4"/>
          <stop offset="100%" stop-color="#00B4A6"/>
        </linearGradient>
      </defs>
      <!-- Body -->
      <rect x="20" y="58" width="80" height="70" rx="14" fill="url(#lockGrad)"/>
      <!-- Shackle -->
      <path d="M36 58v-18a24 24 0 0 1 48 0v18" stroke="#4ECDC4" stroke-width="10" fill="none" stroke-linecap="round"/>
      <!-- Keyhole -->
      <circle cx="60" cy="86" r="6" fill="#fff"/>
      <rect x="57" y="86" width="6" height="14" rx="2" fill="#fff"/>
    </svg>

    <!-- Plant/leaves on the right -->
    <svg class="auth-gate-illo__plant" viewBox="0 0 80 100" fill="none">
      <!-- Pot -->
      <path d="M20 75h40l-4 18a4 4 0 0 1-4 3h-24a4 4 0 0 1-4-3l-4-18z" fill="#E8F0F2"/>
      <!-- Leaves -->
      <path d="M40 70c-8-4-16-12-14-26 10 4 16 14 14 26z" fill="#7FCFC6"/>
      <path d="M40 70c8-4 16-12 14-26-10 4-16 14-14 26z" fill="#4ECDC4"/>
      <path d="M40 72v-26" stroke="#26B5AC" stroke-width="2"/>
    </svg>

    <!-- Books on the left -->
    <svg class="auth-gate-illo__books" viewBox="0 0 80 60" fill="none">
      <rect x="6" y="20" width="50" height="36" rx="2" fill="#A5DCD5"/>
      <rect x="14" y="10" width="50" height="36" rx="2" fill="#7FCFC6"/>
      <line x1="20" y1="14" x2="58" y2="14" stroke="#4ECDC4" stroke-width="1.5"/>
      <line x1="20" y1="42" x2="58" y2="42" stroke="#4ECDC4" stroke-width="1.5"/>
    </svg>
  </div>
</template>

<style>
/* ─── Hero stamp (auth screen variant) ──────────────────────────────── */
.hero-stamp {
  position: relative;
  width: 200px;
  height: 200px;
  margin: var(--sp-4) auto var(--sp-5);
}
.hero-stamp__shape {
  position: absolute;
  inset: 30px;
  background: #E8F0F2;
  border-radius: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 8px 24px rgba(30, 50, 60, 0.06);
}
.hero-stamp__shape--teal {
  background: linear-gradient(135deg, #4ECDC4, #00B4A6);
}
.hero-stamp__shape svg {
  width: 80px;
  height: 80px;
}
.hero-stamp .deco {
  position: absolute;
}
.hero-stamp .deco-1 { width: 22px; height: 22px; top: 24px;  inset-inline-start: 24px; }
.hero-stamp .deco-2 { width: 50px; height: 50px; top: 78px;  inset-inline-start: -2px; }
.hero-stamp .deco-3 { width: 44px; height: 44px; top: 20px;  inset-inline-end:  16px;  }
.hero-stamp .deco-4 { width: 14px; height: 14px; top: 90px;  inset-inline-end:  2px;   }

.hero-stamp--profile .deco-4 { width: 44px; height: 44px; top: auto; bottom: -8px; inset-inline-end: -2px; }

/* ─── Auth gate illustration (bigger, standalone) ────────────────────── */
.auth-gate-illo {
  position: relative;
  width: 240px;
  height: 240px;
  margin: var(--sp-6) auto var(--sp-5);
}
.auth-gate-illo > svg { position: absolute; }
.auth-gate-illo__bg-card {
  width: 200px; height: 220px;
  top: 10px; inset-inline-start: 20px;
}
.auth-gate-illo__lock {
  width: 140px; height: 160px;
  top: 30px; inset-inline-start: 50px;
}
.auth-gate-illo__plant {
  width: 70px; height: 90px;
  bottom: 4px; inset-inline-end: 4px;
}
.auth-gate-illo__books {
  width: 70px; height: 56px;
  bottom: 4px; inset-inline-start: 4px;
}
.auth-gate-illo__sparkle { width: 14px; height: 14px; }
.auth-gate-illo__sparkle--1 { top: 30px; inset-inline-start: 70px; }
.auth-gate-illo__sparkle--2 { top: 60px; inset-inline-end: 50px; }
.auth-gate-illo__sparkle--3 { top: 130px; inset-inline-start: 30px; }
</style>
