<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00B4A6" />
  <title>Jamlex Design Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;padding:0;height:100%;font-family:'Vazirmatn','Inter',system-ui,sans-serif;background:#F4FBFA;color:#1A1A2E;-webkit-font-smoothing:antialiased}
    .container{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center}
    .logo{font-size:48px;font-weight:800;color:#00B4A6;letter-spacing:-1px;margin-bottom:8px}
    .tag{color:#6B7280;margin-bottom:24px;font-size:14px}
    .status{padding:12px 20px;background:#FFFFFF;border-radius:14px;border:1px solid #E3E8EE;font-size:13px;color:#1A1A2E;max-width:520px}
    .status b{color:#00B4A6}
    .links{margin-top:24px;font-size:13px;color:#6B7280}
    .links a{color:#00B4A6;text-decoration:none;margin-inline:8px}
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Jamlex</div>
    <div class="tag">Design Preview</div>
    <div class="status">
      🚧 طراحی در حال ساخت است.<br />
      صفحات یکی‌یکی اضافه می‌شوند. <b>به‌زودی برگرد.</b>
    </div>
    <div class="links">
      <a href="https://github.com/amirj4m/jamlex-design">GitHub</a>
      ·
      <a href="https://openjam.amirj4m.com">Openjam API</a>
    </div>
  </div>
</body>
</html>
