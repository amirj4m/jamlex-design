<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00B4A6" />
  <title>Jamlex · Leitner Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css?v=mppwoho3" />
  <link rel="stylesheet" href="/css/base.css?v=mppwoho3" />
  <link rel="stylesheet" href="/css/components.css?v=mppwoho3" />
  <link rel="stylesheet" href="/css/components/v2-patterns.css?v=mppwoho3" />
  <link rel="stylesheet" href="/css/components/popup.css?v=mppwoho3" />
  <link rel="stylesheet" href="/css/chrome.css?v=mppwoho3" />
  <link rel="stylesheet" href="/css/screens/screen-base.css?v=mppwoho3" />
  <link rel="stylesheet" href="/css/screens/screens-app.css?v=mppwoho3" />
</head>
<body>
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale"><option value="fa">فارسی</option><option value="en">English</option></select>
    <select data-theme-picker aria-label="Theme"><option value="system">🖥 System</option><option value="light">☀ Light</option><option value="dark">🌙 Dark</option></select>
    <select id="state-picker" aria-label="State" onchange="
      document.querySelectorAll('.state').forEach(function(s){s.hidden = s.dataset.state !== event.target.value;});
    ">
      <option value="front">Front</option>
      <option value="back">Back (flipped)</option>
      <option value="summary">Summary</option>
    </select>
  </div>
  <a href="/screens/leitner.html" class="hub-ribbon">‹ Leitner</a>

  <div class="shell">
    <div class="phone">
      <div class="screen">
        <header class="topbar topbar--transparent">
          <div class="topbar__leading">
            <a href="/screens/leitner.html" class="btn-icon back-btn" aria-label="Back"></a>
          </div>
          <div></div>
          <div></div>
        </header>

        <!-- FRONT -->
        <div class="state" data-state="front">
          <div class="screen__body">
            <div class="leitner-boxes">
              <div class="lboxer" data-box="1"><div class="lboxer__shape"><span class="lboxer__num">1</span></div><span class="lboxer__count">43</span></div>
              <div class="lboxer" data-box="2"><div class="lboxer__shape"><span class="lboxer__num">2</span></div><span class="lboxer__count">61</span></div>
              <div class="lboxer" data-box="3"><div class="lboxer__shape"><span class="lboxer__num">3</span></div><span class="lboxer__count">10</span></div>
              <div class="lboxer" data-box="4"><div class="lboxer__shape"><span class="lboxer__num">4</span></div><span class="lboxer__count">89</span></div>
              <div class="lboxer" data-box="5" data-active="true"><div class="lboxer__shape"><span class="lboxer__num">5</span></div><span class="lboxer__count">233</span></div>
            </div>

            <div class="review-pill-bar">
              <button class="audio-btn audio-btn--lg" aria-label="Play" data-audio="ours">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg>
              </button>
              <div class="review-pill-bar__count">1 / 75</div>
              <button class="audio-btn audio-btn--lg" aria-label="Delete" style="background:rgba(244,67,54,0.10);color:var(--jx-danger);" onclick="event.stopPropagation();window.confirmAction('deleteLeitnerCard');">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
              </button>
            </div>

            <div class="flip-card-v3" onclick="
              document.getElementById('state-picker').value='back';
              document.querySelectorAll('.state').forEach(function(s){s.hidden = s.dataset.state !== 'back';});
            ">
              <div class="flip-card-v3__english">ours</div>
              <div class="flip-card-v3__ipa">/aʊrz/</div>
            </div>
          </div>
        </div>

        <!-- BACK (flipped + 4 mastery buttons) -->
        <div class="state" data-state="back" hidden>
          <div class="screen__body">
            <div class="leitner-boxes">
              <div class="lboxer" data-box="1"><div class="lboxer__shape"><span class="lboxer__num">1</span></div><span class="lboxer__count">43</span></div>
              <div class="lboxer" data-box="2"><div class="lboxer__shape"><span class="lboxer__num">2</span></div><span class="lboxer__count">61</span></div>
              <div class="lboxer" data-box="3"><div class="lboxer__shape"><span class="lboxer__num">3</span></div><span class="lboxer__count">10</span></div>
              <div class="lboxer" data-box="4"><div class="lboxer__shape"><span class="lboxer__num">4</span></div><span class="lboxer__count">89</span></div>
              <div class="lboxer" data-box="5" data-active="true"><div class="lboxer__shape"><span class="lboxer__num">5</span></div><span class="lboxer__count">233</span></div>
            </div>

            <div class="review-pill-bar">
              <button class="audio-btn audio-btn--lg" aria-label="Play" data-audio="ours">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg>
              </button>
              <div class="review-pill-bar__count">1 / 75</div>
              <button class="audio-btn audio-btn--lg" aria-label="Delete" style="background:rgba(244,67,54,0.10);color:var(--jx-danger);" onclick="event.stopPropagation();window.confirmAction('deleteLeitnerCard');">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
              </button>
            </div>

            <div class="flip-card-v3 flip-card-v3--back">
              <div class="flip-card-v3__english">ours</div>
              <div class="flip-card-v3__meaning" data-i18n="v3.flashcards.meaning"></div>
              <div class="flip-card-v3__example">This house is ours now.</div>
            </div>

            <div class="mastery-buttons">
              <button class="mbtn mbtn--dont">
                <svg class="mbtn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
                <span data-i18n="v3.leitner.review.dontKnow"></span>
              </button>
              <button class="mbtn mbtn--sort">
                <svg class="mbtn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="4" x2="12" y2="14"/><circle cx="12" cy="19" r="1.4" fill="currentColor"/></svg>
                <span data-i18n="v3.leitner.review.sortOf"></span>
              </button>
              <button class="mbtn mbtn--know">
                <svg class="mbtn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                <span data-i18n="v3.leitner.review.know"></span>
              </button>
              <button class="mbtn mbtn--well">
                <svg class="mbtn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 12 8 17 21 4"/><polyline points="9 12 14 17 21 10"/></svg>
                <span data-i18n="v3.leitner.review.knowWell"></span>
              </button>
            </div>
          </div>
        </div>

        <!-- SUMMARY -->
        <div class="state" data-state="summary" hidden>
          <div class="screen__body" style="text-align:center;">
            <div class="lottie-stage lottie-stage--lg" data-lottie="hero-trophy" style="margin: var(--sp-3) auto;"></div>

            <h1 class="summary-title" data-i18n="v3.leitner.review.summary.title"></h1>
            <p class="summary-sub" data-i18n-html="v3.leitner.review.summary.subtitle"></p>

            <div class="summary-stats">
              <div class="stat-cell">
                <div class="stat-cell__icon" style="background:rgba(108,92,231,0.16);color:#6C5CE7;">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2" fill="currentColor"/></svg>
                </div>
                <div class="stat-cell__label" data-i18n="v3.leitner.review.summary.accuracy"></div>
                <div class="stat-cell__val" style="color:#6C5CE7;">92%</div>
              </div>
              <div class="stat-cell">
                <div class="stat-cell__icon" style="background:rgba(74,144,217,0.16);color:#4A90D9;">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                </div>
                <div class="stat-cell__label" data-i18n="v3.leitner.review.summary.wordsReviewed"></div>
                <div class="stat-cell__val" style="color:#4A90D9;">75</div>
              </div>
              <div class="stat-cell">
                <div class="stat-cell__icon" style="background:rgba(76,175,80,0.16);color:#2A8E4D;">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><polyline points="9 16 11 18 16 13"/></svg>
                </div>
                <div class="stat-cell__label" data-i18n="v3.leitner.review.summary.studyTime"></div>
                <div class="stat-cell__val" style="color:#2A8E4D;" data-i18n="v3.leitner.review.summary.minutesUnit" data-i18n-vars='{"n":22}'></div>
              </div>
            </div>

            <div class="quote-card">
              <div class="lottie-stage lottie-stage--sm" data-lottie="quote-plant"></div>
              <div class="quote-card__body">
                <div class="quote-card__title" data-i18n="v3.leitner.review.summary.quote"></div>
                <div class="quote-card__sub" data-i18n-html="v3.leitner.review.summary.quoteSub"></div>
              </div>
            </div>

            <a href="/screens/home.html" class="btn btn--filled btn--block btn--lg" style="margin-top: var(--sp-4);">
              <span data-i18n="v3.leitner.review.summary.continueBtn"></span>
              <span>←</span>
            </a>
            <a href="/screens/stats.html" class="btn btn--outlined btn--block btn--lg" style="margin-top: var(--sp-3);">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="6" y1="20" x2="6" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="18" y1="20" x2="18" y2="14"/></svg>
              <span data-i18n="v3.leitner.review.summary.viewStats"></span>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/screen-shell.js?v=mppwoho3"></script>
</body>
</html>
