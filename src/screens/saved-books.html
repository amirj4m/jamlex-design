<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00B4A6" />
  <title>Jamlex · Saved Books</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css?v=mpohzgrn" />
  <link rel="stylesheet" href="/css/base.css?v=mpohzgrn" />
  <link rel="stylesheet" href="/css/components.css?v=mpohzgrn" />
  <link rel="stylesheet" href="/css/components/v2-patterns.css?v=mpohzgrn" />
  <link rel="stylesheet" href="/css/chrome.css?v=mpohzgrn" />
  <link rel="stylesheet" href="/css/screens/screen-base.css?v=mpohzgrn" />
  <link rel="stylesheet" href="/css/screens/screens-app.css?v=mpohzgrn" />
</head>
<body>
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale"><option value="fa">فارسی</option><option value="en">English</option></select>
    <select data-theme-picker aria-label="Theme"><option value="system">🖥 System</option><option value="light">☀ Light</option><option value="dark">🌙 Dark</option></select>
    <select id="state-picker" aria-label="State" onchange="
      document.querySelectorAll('.state').forEach(function(s){s.hidden = s.dataset.state !== event.target.value;});
    ">
      <option value="list">With saved books</option>
      <option value="empty">Empty state</option>
      <option value="gate">Auth gate</option>
    </select>
  </div>
  <a href="/screens/reading.html" class="hub-ribbon">‹ Reading</a>

  <div class="shell">
    <div class="phone">
      <div class="screen">
        <header class="topbar topbar--transparent">
          <div class="topbar__leading">
            <a href="/screens/home.html" class="btn-icon back-btn" aria-label="Back"></a>
          </div>
          <h1 class="topbar__title" data-i18n="v3.savedBooks.title"></h1>
          <div class="topbar__trailing">
            <button class="btn-icon" aria-label="Bookmark" style="background:var(--jx-primary-glow);color:var(--jx-primary);">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            </button>
          </div>
        </header>

        <!-- STATE: list -->
        <div class="state" data-state="list">
          <div class="screen__body">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:var(--sp-2) 0 var(--sp-3);">
              <button style="display:inline-flex;align-items:center;gap:4px;background:transparent;border:0;color:var(--jx-text-2);font-weight:var(--fw-semibold);font-size:var(--fs-body-s);cursor:pointer;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                <span data-i18n="v3.savedBooks.sort"></span>
              </button>
              <span style="font-size:var(--fs-body-s);color:var(--jx-text-2);" data-i18n="v3.savedBooks.booksCount" data-i18n-vars='{"n":5}'></span>
            </div>

            <div class="sb-list">
              <a href="/screens/book-detail.html" class="sb-row">
                <button class="sb-row__menu" aria-label="Menu">⋮</button>
                <div class="sb-row__main">
                  <div class="sb-row__title">Inside Reading - 1</div>
                  <div class="sb-row__author">Arline Burgmeier</div>
                  <div class="sb-row__progress">
                    <span class="sb-row__progress-val">65%</span>
                    <div class="sb-row__progress-track"><div class="sb-row__progress-fill" style="width:65%;"></div></div>
                  </div>
                  <span class="chip" style="background:var(--jx-primary-glow);color:var(--jx-primary);align-self:flex-end;" data-i18n="v3.savedBooks.tags.english"></span>
                </div>
                <div class="sb-row__cover" style="background:linear-gradient(135deg,#1B5E20,#4CAF50);"></div>
              </a>
              <a href="/screens/book-detail.html" class="sb-row">
                <button class="sb-row__menu">⋮</button>
                <div class="sb-row__main">
                  <div class="sb-row__title" data-i18n="v3.savedBooks.titleAtomic"></div>
                  <div class="sb-row__author" data-i18n="v3.savedBooks.authorAtomic"></div>
                  <div class="sb-row__progress">
                    <span class="sb-row__progress-val">۴۲%</span>
                    <div class="sb-row__progress-track"><div class="sb-row__progress-fill" style="width:42%;"></div></div>
                  </div>
                  <span class="chip" style="background:var(--jx-primary-glow);color:var(--jx-primary);align-self:flex-end;" data-i18n="v3.savedBooks.tags.selfHelp"></span>
                </div>
                <div class="sb-row__cover" style="background:linear-gradient(135deg,#FFB74D,#E65100);"></div>
              </a>
              <a href="/screens/book-detail.html" class="sb-row">
                <button class="sb-row__menu">⋮</button>
                <div class="sb-row__main">
                  <div class="sb-row__title">The Psychology of Money</div>
                  <div class="sb-row__author">Morgan Housel</div>
                  <div class="sb-row__progress">
                    <span class="sb-row__progress-val">۷۴%</span>
                    <div class="sb-row__progress-track"><div class="sb-row__progress-fill" style="width:74%;"></div></div>
                  </div>
                  <span class="chip" style="background:var(--jx-primary-glow);color:var(--jx-primary);align-self:flex-end;" data-i18n="v3.savedBooks.tags.finance"></span>
                </div>
                <div class="sb-row__cover" style="background:linear-gradient(135deg,#E0E0E0,#9E9E9E);"></div>
              </a>
              <a href="/screens/book-detail.html" class="sb-row">
                <button class="sb-row__menu">⋮</button>
                <div class="sb-row__main">
                  <div class="sb-row__title" data-i18n="v3.savedBooks.titleCompound"></div>
                  <div class="sb-row__author" data-i18n="v3.savedBooks.authorCompound"></div>
                  <div class="sb-row__progress">
                    <span class="sb-row__progress-val">۵۰%</span>
                    <div class="sb-row__progress-track"><div class="sb-row__progress-fill" style="width:50%;"></div></div>
                  </div>
                  <span class="chip" style="background:var(--jx-primary-glow);color:var(--jx-primary);align-self:flex-end;" data-i18n="v3.savedBooks.tags.selfHelp"></span>
                </div>
                <div class="sb-row__cover" style="background:linear-gradient(135deg,#EF5350,#B71C1C);"></div>
              </a>
              <a href="/screens/book-detail.html" class="sb-row">
                <button class="sb-row__menu">⋮</button>
                <div class="sb-row__main">
                  <div class="sb-row__title">Deep Work</div>
                  <div class="sb-row__author">Cal Newport</div>
                  <div class="sb-row__progress">
                    <span class="sb-row__progress-val">۳۱%</span>
                    <div class="sb-row__progress-track"><div class="sb-row__progress-fill" style="width:31%;"></div></div>
                  </div>
                  <span class="chip" style="background:var(--jx-primary-glow);color:var(--jx-primary);align-self:flex-end;" data-i18n="v3.savedBooks.tags.timeMgmt"></span>
                </div>
                <div class="sb-row__cover" style="background:linear-gradient(135deg,#FFEB3B,#FFA000);"></div>
              </a>
            </div>
          </div>
        </div>

        <!-- STATE: empty -->
        <div class="state" data-state="empty" hidden>
          <div class="screen__body" style="display:flex;flex-direction:column;">
            <div class="empty-block" style="margin: auto;">
              <div class="lottie-stage lottie-stage--lg" data-lottie="empty-book-bookmark"></div>
              <h2 class="empty-block__title" data-i18n="v3.savedBooks.emptyTitle"></h2>
              <p class="empty-block__sub" data-i18n-html="v3.savedBooks.emptyBody"></p>
              <a href="/screens/reading.html" class="btn btn--outlined btn--lg" style="margin-top: var(--sp-5); min-width: 200px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16" y2="16"/></svg>
                <span data-i18n="v3.savedBooks.searchBook"></span>
              </a>
            </div>
          </div>
        </div>

        <!-- STATE: gate -->
        <div class="state" data-state="gate" hidden>
          <div class="gate">
            <div class="lottie-stage lottie-stage--lg" data-lottie="gate-lock-leaves"></div>
            <h2 class="gate__title" data-i18n-html="v3.reading.guestTitle"></h2>
            <a href="/screens/login.html" class="btn btn--filled btn--block btn--lg" data-i18n="v3.leaderboard.loginCta"></a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/screen-shell.js?v=mpohzgrn"></script>
</body>
</html>
