<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00B4A6" />
  <title>Jamlex · Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css?v=mpp34hw6" />
  <link rel="stylesheet" href="/css/base.css?v=mpp34hw6" />
  <link rel="stylesheet" href="/css/components.css?v=mpp34hw6" />
  <link rel="stylesheet" href="/css/components/v2-patterns.css?v=mpp34hw6" />
  <link rel="stylesheet" href="/css/components/popup.css?v=mpp34hw6" />
  <link rel="stylesheet" href="/css/chrome.css?v=mpp34hw6" />
  <link rel="stylesheet" href="/css/screens/screen-base.css?v=mpp34hw6" />
  <link rel="stylesheet" href="/css/screens/screens-app.css?v=mpp34hw6" />
</head>
<body>
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale"><option value="fa">فارسی</option><option value="en">English</option></select>
    <select data-theme-picker aria-label="Theme"><option value="system">🖥 System</option><option value="light">☀ Light</option><option value="dark">🌙 Dark</option></select>
    <select id="state-picker" aria-label="State" onchange="
      document.querySelectorAll('.state').forEach(function(s){s.hidden = s.dataset.state !== event.target.value;});
    ">
      <option value="data">With data</option>
      <option value="gate">Auth gate</option>
    </select>
  </div>
  <a href="/" class="hub-ribbon">‹ Hub</a>

  <div class="shell">
    <div class="phone">
      <div class="screen">
        <header class="topbar topbar--transparent">
          <div class="topbar__leading"></div>
          <div></div>
          <div></div>
        </header>

        <!-- STATE: data -->
        <div class="state" data-state="data">
          <div class="screen__body">
            <div class="page-title">
              <p class="page-title__sub" data-i18n="v3.leaderboard.subtitle"></p>
            </div>

            <!-- Your rank panel -->
            <div class="rank-panel">
              <div class="rank-panel__col">
                <div class="rank-panel__ring">
                  <svg viewBox="0 0 60 60" fill="none">
                    <circle cx="30" cy="30" r="26" stroke="var(--jx-input-bg)" stroke-width="4"/>
                    <circle cx="30" cy="30" r="26" stroke="var(--jx-primary)" stroke-width="4" stroke-linecap="round" stroke-dasharray="163.4" stroke-dashoffset="36" transform="rotate(-90 30 30)"/>
                    <text x="30" y="36" text-anchor="middle" font-size="14" font-weight="800" fill="var(--jx-primary)" font-family="Inter">78%</text>
                  </svg>
                </div>
                <div class="rank-panel__cap" data-i18n-html="v3.leaderboard.percentAbove"></div>
              </div>
              <div class="rank-panel__col rank-panel__col--center">
                <div class="rank-panel__avatar"><span>T</span></div>
                <div class="rank-panel__name">Tester</div>
                <span class="pod__level-chip" style="background:var(--jx-input-bg);color:var(--jx-text-2);" data-i18n="v3.leaderboard.level" data-i18n-vars='{"n":12}'></span>
              </div>
              <div class="rank-panel__col">
                <div class="rank-panel__cap" data-i18n="v3.leaderboard.yourRank"></div>
                <div class="rank-panel__rank">128</div>
                <div class="rank-panel__cap" style="font-family:var(--font-family-latin),var(--font-family);" data-i18n="v3.leaderboard.ofUsers" data-i18n-vars='{"n":"12,456"}'></div>
              </div>
            </div>

            <!-- Section heading: top -->
            <div class="section-h">
              <div class="section-h__title" data-i18n="v3.leaderboard.topTitle"></div>
            </div>

            <!-- Top-3 podium -->
            <div class="podium-3">
              <!-- 2nd -->
              <div class="pod pod--2">
                <span class="pod__rank">2</span>
                <div class="pod__crown">👑</div>
                <div class="pod__avatar"><span>P</span></div>
                <div class="pod__name">Parsa_1378</div>
                <span class="pod__level-chip" data-i18n="v3.leaderboard.level" data-i18n-vars='{"n":26}'></span>
                <div class="pod__xp">11,230 XP</div>
              </div>
              <!-- 1st (center, taller) -->
              <div class="pod pod--1">
                <span class="pod__rank">1</span>
                <div class="pod__crown">👑</div>
                <div class="pod__avatar"><span>A</span></div>
                <div class="pod__name">Ali.reza</div>
                <span class="pod__level-chip" data-i18n="v3.leaderboard.level" data-i18n-vars='{"n":28}'></span>
                <div class="pod__xp">12,560 XP</div>
              </div>
              <!-- 3rd -->
              <div class="pod pod--3">
                <span class="pod__rank">3</span>
                <div class="pod__crown">👑</div>
                <div class="pod__avatar"><span>M</span></div>
                <div class="pod__name">Mahdi_77</div>
                <span class="pod__level-chip" data-i18n="v3.leaderboard.level" data-i18n-vars='{"n":25}'></span>
                <div class="pod__xp">10,245 XP</div>
              </div>
            </div>

            <!-- Rank list -->
            <div class="lb-list">
              <div class="lb-row">
                <span class="lb-row__num">4</span>
                <span class="lb-row__avatar"><span>A</span></span>
                <span class="lb-row__name">Armin_s</span>
                <span class="pod__level-chip" data-i18n="v3.leaderboard.level" data-i18n-vars='{"n":25}'></span>
                <span class="lb-row__xp">9,850 XP</span>
              </div>
              <div class="lb-row">
                <span class="lb-row__num">5</span>
                <span class="lb-row__avatar"><span>S</span></span>
                <span class="lb-row__name">Sina_2002</span>
                <span class="pod__level-chip" data-i18n="v3.leaderboard.level" data-i18n-vars='{"n":22}'></span>
                <span class="lb-row__xp">9,120 XP</span>
              </div>
              <div class="lb-row">
                <span class="lb-row__num">6</span>
                <span class="lb-row__avatar"><span>H</span></span>
                <span class="lb-row__name">Hamiid</span>
                <span class="pod__level-chip" data-i18n="v3.leaderboard.level" data-i18n-vars='{"n":21}'></span>
                <span class="lb-row__xp">8,760 XP</span>
              </div>
              <div class="lb-row">
                <span class="lb-row__num">7</span>
                <span class="lb-row__avatar"><span>m</span></span>
                <span class="lb-row__name">mohsen.01</span>
                <span class="pod__level-chip" data-i18n="v3.leaderboard.level" data-i18n-vars='{"n":25}'></span>
                <span class="lb-row__xp">8,230 XP</span>
              </div>
              <div class="lb-row" data-me="true">
                <span class="lb-row__num">128</span>
                <span class="lb-row__avatar"><span>T</span></span>
                <span class="lb-row__name">Tester <span style="color:var(--jx-primary);" data-i18n="v3.leaderboard.you"></span></span>
                <span class="pod__level-chip" data-i18n="v3.leaderboard.level" data-i18n-vars='{"n":12}'></span>
                <span class="lb-row__xp">2,340 XP</span>
              </div>
              <div class="lb-row">
                <span class="lb-row__num">129</span>
                <span class="lb-row__avatar"><span>R</span></span>
                <span class="lb-row__name">Reza_m</span>
                <span class="pod__level-chip" data-i18n="v3.leaderboard.level" data-i18n-vars='{"n":12}'></span>
                <span class="lb-row__xp">2,330 XP</span>
              </div>
            </div>

            <div style="display:flex;align-items:center;gap:6px;justify-content:center;margin-top:var(--sp-4);font-size:var(--fs-caption);color:var(--jx-text-3);">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
              <span data-i18n="v3.leaderboard.updatedHint"></span>
            </div>
          </div>
        </div>

        <!-- STATE: gate -->
        <div class="state" data-state="gate" hidden>
          <div class="gate">
            <div class="lottie-stage lottie-stage--lg" data-lottie="gate-lock-leaves"></div>
            <h2 class="gate__title" data-i18n-html="v3.leaderboard.guestTitle"></h2>
            <p class="gate__sub" data-i18n-html="v3.leaderboard.guestSub"></p>
            <a href="/screens/login.html" class="btn btn--filled btn--block btn--lg" data-i18n="v3.leaderboard.loginCta"></a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/screen-shell.js?v=mpp34hw6"></script>
</body>
</html>
