<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00B4A6" />
  <title>Jamlex · Forgot Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/chrome.css" />
  <link rel="stylesheet" href="/css/screens/screen-base.css" />
</head>
<body>
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale">
      <option value="fa">فارسی</option>
      <option value="en">English</option>
    </select>
    <select data-theme-picker aria-label="Theme">
      <option value="system">🖥 System</option>
      <option value="light">☀ Light</option>
      <option value="dark">🌙 Dark</option>
    </select>
  </div>
  <a href="/" class="hub-ribbon">‹ Hub</a>

  <div class="shell">
    <div class="phone">
      <div class="screen">
        <section class="auth-screen">
          <header class="auth-screen__header">
            <a href="/screens/login.html" class="btn-icon back-btn" data-i18n-attr="aria-label:common.back"></a>
          </header>

          <div class="auth-screen__body">
            <div class="auth-screen__title-block">
              <h1 class="auth-screen__title" data-i18n="auth.forgotTitle"></h1>
              <p class="auth-screen__subtitle" data-i18n="auth.verify.emailSubtitle" data-i18n-vars='{"email":"——"}'></p>
            </div>

            <div class="segmented" style="align-self:center;margin-bottom:var(--sp-2);">
              <div class="segmented__item" data-selected="true" id="seg-email" data-i18n="auth.email" onclick="
                this.dataset.selected = 'true';
                document.getElementById('seg-phone').dataset.selected = 'false';
                document.querySelectorAll('.method').forEach(function (m) { m.hidden = m.dataset.method !== 'email'; });
              "></div>
              <div class="segmented__item" id="seg-phone" data-i18n="auth.phone" onclick="
                this.dataset.selected = 'true';
                document.getElementById('seg-email').dataset.selected = 'false';
                document.querySelectorAll('.method').forEach(function (m) { m.hidden = m.dataset.method !== 'phone'; });
              "></div>
            </div>

            <form class="auth-screen__form method" data-method="email" onsubmit="event.preventDefault();">
              <div class="field">
                <label class="field__label" for="fp-email" data-i18n="auth.email"></label>
                <input id="fp-email" type="email" class="field__input" autocomplete="username" required data-i18n-attr="placeholder:auth.emailPlaceholder" />
              </div>
              <button type="submit" class="btn btn--filled btn--block" data-i18n="auth.resetBtn"></button>
            </form>

            <form class="auth-screen__form method" data-method="phone" hidden onsubmit="event.preventDefault();">
              <div class="field">
                <label class="field__label" for="fp-phone" data-i18n="auth.phone"></label>
                <div class="phone-row">
                  <button type="button" class="country-pick">
                    <span class="country-pick__flag">🇮🇷</span>
                    <span>+98</span>
                  </button>
                  <input id="fp-phone" type="tel" class="field__input" autocomplete="tel" inputmode="numeric" required data-i18n-attr="placeholder:auth.phonePlaceholder" />
                </div>
              </div>
              <button type="submit" class="btn btn--filled btn--block" data-i18n="auth.sendCodeBtn"></button>
            </form>

            <div class="auth-link-row">
              <span data-i18n="auth.haveAccountQ"></span>
              <a href="/screens/login.html" data-i18n="auth.signInBtn"></a>
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <script type="module" src="/js/screen-shell.js"></script>
</body>
</html>
