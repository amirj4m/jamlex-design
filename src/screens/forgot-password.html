<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00B4A6" />
  <title>Jamlex · Forgot Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css?v=mppi26aa" />
  <link rel="stylesheet" href="/css/base.css?v=mppi26aa" />
  <link rel="stylesheet" href="/css/components.css?v=mppi26aa" />
  <link rel="stylesheet" href="/css/components/v2-patterns.css?v=mppi26aa" />
  <link rel="stylesheet" href="/css/components/popup.css?v=mppi26aa" />
  <link rel="stylesheet" href="/css/chrome.css?v=mppi26aa" />
  <link rel="stylesheet" href="/css/screens/screen-base.css?v=mppi26aa" />
</head>
<body>
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale"><option value="fa">فارسی</option><option value="en">English</option></select>
    <select data-theme-picker aria-label="Theme"><option value="system">🖥 System</option><option value="light">☀ Light</option><option value="dark">🌙 Dark</option></select>
    <select id="state-picker" aria-label="State" onchange="
      document.querySelectorAll('.state').forEach(function(s){s.hidden = s.dataset.state !== event.target.value;});
    ">
      <option value="form">Enter email</option>
      <option value="sent">Email sent</option>
    </select>
  </div>
  <a href="/" class="hub-ribbon">‹ Hub</a>

  <div class="shell">
    <div class="phone">
      <div class="screen screen--auth">
        <header class="topbar topbar--transparent">
          <div class="topbar__leading">
            <a href="/screens/login.html" class="btn-icon back-btn" aria-label="Back"></a>
          </div>
          <h1 class="topbar__title" data-i18n="auth.forgotTitle"></h1>
          <div></div>
        </header>

        <!-- STATE: form -->
        <div class="screen__body screen__body--auth state" data-state="form">
          <div class="lottie-stage lottie-stage--in-disc" data-lottie="hero-lock"></div>

          <h1 class="auth-title" data-i18n="auth.forgotTitle"></h1>
          <p class="auth-subtitle" data-auth-content="email" data-i18n="auth.forgotSubtitle"></p>
          <p class="auth-subtitle" data-auth-content="phone" data-i18n="auth.forgotSubtitlePhone" hidden></p>

          <div class="auth-tabs" role="tablist">
            <button type="button" class="auth-tab auth-tab--active" data-auth-tab="email" role="tab">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><polyline points="3,7 12,13 21,7"/></svg>
              <span data-i18n="auth.tabEmail"></span>
            </button>
            <button type="button" class="auth-tab" data-auth-tab="phone" role="tab">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="3"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
              <span data-i18n="auth.tabPhone"></span>
            </button>
          </div>

          <!-- Email recovery form -->
          <form class="auth-form" autocomplete="on" data-auth-content="email">
            <div class="field">
              <div class="field__control">
                <span class="field__slot-start">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="5" width="18" height="14" rx="2"/><polyline points="3,7 12,13 21,7"/>
                  </svg>
                </span>
                <input
                  type="email"
                  class="field__input field__input--with-slot-start"
                  data-i18n-attr="placeholder:auth.email"
                  autocomplete="email"
                  inputmode="email"
                />
              </div>
            </div>

            <button type="button" onclick="
              document.getElementById('state-picker').value='sent';
              document.querySelectorAll('.state').forEach(function(s){s.hidden = s.dataset.state !== 'sent';});
            " class="btn btn--filled btn--block btn--lg" data-i18n="auth.resetBtn"></button>
          </form>

          <!-- Phone recovery form -->
          <form class="auth-form" autocomplete="on" data-auth-content="phone" hidden>
            <div class="field field--phone">
              <div class="field__control">
                <button type="button" class="field__country">
                  🇺🇸 <span>+1</span>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
                </button>
                <input
                  type="tel"
                  class="field__input"
                  data-i18n-attr="placeholder:auth.phonePlaceholder"
                  autocomplete="tel"
                  inputmode="tel"
                  dir="ltr"
                  style="text-align: start;"
                />
                <span class="field__slot-end">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="5" y="2" width="14" height="20" rx="3"/><line x1="12" y1="18" x2="12.01" y2="18"/>
                  </svg>
                </span>
              </div>
            </div>

            <a href="/screens/phone-auth.html" class="btn btn--filled btn--block btn--lg" data-i18n="auth.sendCodeBtn"></a>
          </form>

          <div class="auth-footer-link">
            <a href="/screens/login.html" data-i18n="auth.signInBtn"></a>
          </div>
        </div>

        <!-- STATE: email sent confirmation -->
        <div class="screen__body screen__body--auth state" data-state="sent" hidden>
          <div class="lottie-stage lottie-stage--in-disc" data-lottie="hero-envelope-check"></div>

          <h1 class="auth-title" data-i18n="auth.emailSentTitle"></h1>
          <p class="auth-subtitle" data-i18n="auth.emailSentSub"></p>

          <div class="email-chip">amirj4m@gmail.com</div>

          <p class="auth-subtitle" style="margin-top: var(--sp-2);" data-i18n-html="auth.emailSentSpamHint"></p>

          <div style="margin-top: auto; padding-top: var(--sp-4);">
            <a href="/screens/login.html" class="btn btn--filled btn--block btn--lg" data-i18n="auth.backToLogin"></a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/screen-shell.js?v=mppi26aa"></script>
  <script>
    document.addEventListener('click', function (e) {
      var tab = e.target.closest('[data-auth-tab]');
      if (!tab) return;
      var name = tab.dataset.authTab;
      var container = tab.closest('.state') || document;
      container.querySelectorAll('[data-auth-tab]').forEach(function (el) {
        el.classList.toggle('auth-tab--active', el.dataset.authTab === name);
      });
      container.querySelectorAll('[data-auth-content]').forEach(function (el) {
        el.hidden = el.dataset.authContent !== name;
      });
    });
  </script>
</body>
</html>
