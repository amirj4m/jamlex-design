<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00B4A6" />
  <title>Jamlex · Splash</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/chrome.css" />
  <link rel="stylesheet" href="/css/screens/screen-base.css" />
</head>
<body>
  <!-- Desktop-only preview controls -->
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale">
      <option value="fa">فارسی</option>
      <option value="en">English</option>
    </select>
    <select data-theme-picker aria-label="Theme">
      <option value="system">🖥 System</option>
      <option value="light">☀ Light</option>
      <option value="dark">🌙 Dark</option>
    </select>
  </div>
  <a href="/" class="hub-ribbon">‹ Hub</a>

  <div class="shell">
    <div class="phone">
      <div class="screen">
        <section class="splash">
          <div class="splash__logo">J</div>
          <h1 class="splash__title" data-i18n="app.name">Jamlex</h1>
          <div class="splash__tag" data-i18n="app.tagline"></div>
          <div class="splash__loader" aria-label="Loading" role="status"></div>
        </section>
      </div>
    </div>
  </div>

  <script type="module" src="/js/screen-shell.js"></script>
</body>
</html>
