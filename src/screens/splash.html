<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00B4A6" />
  <title>Jamlex · Splash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css?v=mpreg55f" />
  <link rel="stylesheet" href="/css/base.css?v=mpreg55f" />
  <link rel="stylesheet" href="/css/components.css?v=mpreg55f" />
  <link rel="stylesheet" href="/css/components/v2-patterns.css?v=mpreg55f" />
  <link rel="stylesheet" href="/css/components/popup.css?v=mpreg55f" />
  <link rel="stylesheet" href="/css/chrome.css?v=mpreg55f" />
  <link rel="stylesheet" href="/css/screens/screen-base.css?v=mpreg55f" />
</head>
<body>
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale"><option value="fa">فارسی</option><option value="en">English</option></select>
    <select data-theme-picker aria-label="Theme"><option value="system">🖥 System</option><option value="light">☀ Light</option><option value="dark">🌙 Dark</option></select>
  </div>
  <a href="/" class="hub-ribbon">‹ Hub</a>

  <div class="shell">
    <div class="phone">
      <div class="screen" style="justify-content: center; align-items: center; display: flex; flex-direction: column; background: linear-gradient(180deg, #F4FBFA 0%, #E6F4F1 100%);">
        <div class="lottie-stage lottie-stage--lg" data-lottie="splash-logo"></div>
        <h1 style="font-size:36px;font-weight:800;letter-spacing:-1px;color:var(--jx-primary);font-family:var(--font-family-latin);margin-top:var(--sp-3);">Jamlex</h1>
        <p style="color:var(--jx-text-2);font-size:var(--fs-body-s);margin-top:var(--sp-2);" data-i18n="app.tagline"></p>
        <div style="margin-top:var(--sp-8);">
          <span class="splash-dot" style="animation-delay:0s;"></span>
          <span class="splash-dot" style="animation-delay:0.2s;"></span>
          <span class="splash-dot" style="animation-delay:0.4s;"></span>
        </div>
      </div>
    </div>
  </div>

  <style>
    .splash-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--jx-primary);
      display: inline-block;
      animation: dot-pulse 1.4s ease-in-out infinite;
      margin: 0 3px;
    }
    @keyframes dot-pulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1.2); }
    }
  </style>

  <script type="module" src="/js/screen-shell.js?v=mpreg55f"></script>
</body>
</html>
