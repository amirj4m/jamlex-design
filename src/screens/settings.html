<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00B4A6" />
  <title>Jamlex · Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css?v=mpojz86z" />
  <link rel="stylesheet" href="/css/base.css?v=mpojz86z" />
  <link rel="stylesheet" href="/css/components.css?v=mpojz86z" />
  <link rel="stylesheet" href="/css/components/v2-patterns.css?v=mpojz86z" />
  <link rel="stylesheet" href="/css/components/popup.css?v=mpojz86z" />
  <link rel="stylesheet" href="/css/chrome.css?v=mpojz86z" />
  <link rel="stylesheet" href="/css/screens/screen-base.css?v=mpojz86z" />
  <link rel="stylesheet" href="/css/screens/screens-app.css?v=mpojz86z" />
</head>
<body>
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale"><option value="fa" data-i18n="v3.profile.uiLangValue"></option><option value="en">English</option></select>
    <select data-theme-picker aria-label="Theme"><option value="system">🖥 System</option><option value="light">☀ Light</option><option value="dark">🌙 Dark</option></select>
    <select id="state-picker" aria-label="State" onchange="
      document.querySelectorAll('.state').forEach(function(s){s.hidden = s.dataset.state !== event.target.value;});
    ">
      <option value="list">Settings list</option>
      <option value="notif">Notif dialog open</option>
    </select>
  </div>
  <a href="/screens/profile.html" class="hub-ribbon">‹ Profile</a>

  <div class="shell">
    <div class="phone">
      <div class="screen">
        <header class="topbar">
          <div class="topbar__leading">
            <a href="/screens/profile.html" class="btn-icon back-btn" aria-label="Back"></a>
          </div>
          <h1 class="topbar__title" data-i18n="v3.settings.title"></h1>
          <div></div>
        </header>

        <div class="screen__body">
          <div class="section-label" data-i18n="v3.settings.secAppearance"></div>
          <div class="setting-list">
            <button class="setting-item">
              <span class="setting-item__icon" style="background:rgba(74,144,217,0.16);color:#4A90D9;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 3v18M3 12h18"/></svg>
              </span>
              <div class="setting-item__main">
                <div class="setting-item__label" data-i18n="v3.profile.displayMode"></div>
                <div class="setting-item__sub" data-i18n="v3.profile.displaySystem"></div>
              </div>
              <span class="setting-item__chevron"></span>
            </button>
          </div>

          <div class="section-label" data-i18n="v3.settings.secLearning"></div>
          <div class="setting-list">
            <button class="setting-item">
              <span class="setting-item__icon" style="background:var(--jx-primary-glow);color:var(--jx-primary);">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
              </span>
              <div class="setting-item__main">
                <div class="setting-item__label" data-i18n="v3.profile.dailyLimit"></div>
                <div class="setting-item__sub" data-i18n="v3.profile.dailyLimitSub"></div>
              </div>
              <span class="setting-item__chevron"></span>
            </button>
            <button class="setting-item" onclick="
              document.getElementById('state-picker').value='notif';
              document.querySelectorAll('.state').forEach(function(s){s.hidden = s.dataset.state !== 'notif';});
            ">
              <span class="setting-item__icon" style="background:rgba(255,152,0,0.16);color:#E59A1A;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/></svg>
              </span>
              <div class="setting-item__main">
                <div class="setting-item__label" data-i18n="v3.profile.notifTitle"></div>
                <div class="setting-item__sub" data-i18n="v3.profile.notifOnSub"></div>
              </div>
              <span class="setting-item__chevron"></span>
            </button>
          </div>

          <div class="section-label" data-i18n="v3.settings.secLang"></div>
          <div class="setting-list">
            <button class="setting-item">
              <span class="setting-item__icon" style="background:rgba(108,92,231,0.16);color:#6C5CE7;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15 15 0 0 1 4 10 15 15 0 0 1-4 10 15 15 0 0 1-4-10 15 15 0 0 1 4-10z"/></svg>
              </span>
              <div class="setting-item__main">
                <div class="setting-item__label" data-i18n="v3.profile.uiLanguage"></div>
                <div class="setting-item__sub" data-i18n="v3.profile.uiLangValue"></div>
              </div>
              <span class="setting-item__chevron"></span>
            </button>
          </div>

          <div class="section-label" data-i18n="v3.settings.secAccount"></div>
          <div class="setting-list">
            <button class="setting-item setting-item--danger" onclick="window.confirmAction('logout').then(function(ok){if(ok)setTimeout(function(){location.href='/screens/login.html'},900);});">
              <span class="setting-item__icon" style="background:rgba(244,67,54,0.12);color:var(--jx-danger);">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              </span>
              <div class="setting-item__main">
                <div class="setting-item__label" data-i18n="v3.profile.logout"></div>
              </div>
              <span class="setting-item__chevron"></span>
            </button>
            <button class="setting-item setting-item--danger" onclick="window.confirmAction('deleteAccount').then(function(ok){if(ok)setTimeout(function(){location.href='/screens/login.html'},900);});">
              <span class="setting-item__icon" style="background:rgba(244,67,54,0.18);color:var(--jx-danger);">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
              </span>
              <div class="setting-item__main">
                <div class="setting-item__label" data-i18n="v3.profile.deleteAccount"></div>
                <div class="setting-item__sub" data-i18n="v3.profile.deleteAccountSub"></div>
              </div>
              <span class="setting-item__chevron"></span>
            </button>
          </div>

          <div class="section-label" data-i18n="v3.settings.secAbout"></div>
          <div class="setting-list">
            <button class="setting-item">
              <span class="setting-item__icon" style="background:var(--jx-input-bg);color:var(--jx-text-2);">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
              </span>
              <div class="setting-item__main">
                <div class="setting-item__label" data-i18n="v3.profile.aboutApp"></div>
                <div class="setting-item__sub font-latin">v1.0.0</div>
              </div>
              <span class="setting-item__chevron"></span>
            </button>
          </div>
        </div>

        <!-- Notif dialog overlay -->
        <div class="state" data-state="notif" hidden>
          <div class="scrim" onclick="
            document.getElementById('state-picker').value='list';
            document.querySelectorAll('.state').forEach(function(s){s.hidden = s.dataset.state !== 'list';});
          ">
            <div class="dialog-card" onclick="event.stopPropagation();">
              <div class="dialog-card__bell">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/></svg>
              </div>
              <h2 class="dialog-card__title" data-i18n="v3.settings.notif.title"></h2>
              <p class="dialog-card__sub" data-i18n="v3.settings.notif.sub"></p>

              <!-- Time spinner -->
              <div class="time-spinner">
                <button class="time-spinner__btn" aria-label="up"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="18 15 12 9 6 15"/></svg></button>
                <div class="time-spinner__val">08:30</div>
                <button class="time-spinner__btn" aria-label="down"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="6 9 12 15 18 9"/></svg></button>
              </div>

              <!-- Day circles -->
              <div style="text-align:end;margin-top:var(--sp-3);font-size:var(--fs-body-s);color:var(--jx-text-2);font-weight:var(--fw-semibold);" data-i18n="v3.settings.notif.days"></div>
              <div class="day-circles" style="margin-top:var(--sp-2);">
                <button class="day-circles__btn" data-selected="true" data-i18n="v3.settings.day.sa"></button>
                <button class="day-circles__btn" data-selected="true" data-i18n="v3.settings.day.su"></button>
                <button class="day-circles__btn" data-selected="true" data-i18n="v3.settings.day.mo"></button>
                <button class="day-circles__btn" data-i18n="v3.settings.day.tu"></button>
                <button class="day-circles__btn" data-selected="true" data-i18n="v3.settings.day.we"></button>
                <button class="day-circles__btn" data-selected="true" data-i18n="v3.settings.day.th"></button>
                <button class="day-circles__btn" data-i18n="v3.settings.day.fr"></button>
              </div>

              <!-- Sound row -->
              <div class="sound-row">
                <span class="sound-row__icon">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M9 18V5l12-2v13M9 9l12-2"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                </span>
                <span style="flex:1;font-weight:var(--fw-semibold);" data-i18n="v3.settings.notif.sound"></span>
                <span style="color:var(--jx-text-2);font-size:var(--fs-body-s);" data-i18n="v3.settings.notif.soundDefault"></span>
                <span style="color:var(--jx-text-3);">‹</span>
              </div>

              <div class="dialog-card__actions">
                <button class="dialog-card__cancel" onclick="
                  document.getElementById('state-picker').value='list';
                  document.querySelectorAll('.state').forEach(function(s){s.hidden = s.dataset.state !== 'list';});
                " data-i18n="v3.settings.notif.cancel"></button>
                <button class="btn btn--filled" style="flex:1;" data-i18n="v3.settings.notif.save"></button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/screen-shell.js?v=mpojz86z"></script>
  <script>
    document.addEventListener('click', function (e) {
      var c = e.target.closest('.day-circles__btn');
      if (c) c.dataset.selected = c.dataset.selected === 'true' ? 'false' : 'true';
    });
  </script>
</body>
</html>
