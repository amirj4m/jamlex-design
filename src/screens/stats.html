  <script type="module" src="/js/screen-shell.js?v=mppx2g4v"></script>
  <script>
    (function () {
      // -------- Tab toggle (instant, no page reload) --------
      const tabs = document.querySelectorAll('[data-tab-btn]');
      const views = document.querySelectorAll('[data-tab-view]');
      const body = document.querySelector('.screen__body');

      function show (target) {
        tabs.forEach(b => {
          b.classList.toggle('stats-tab--active', b.dataset.tabBtn === target);
          b.setAttribute('aria-selected', b.dataset.tabBtn === target ? 'true' : 'false');
        });
        views.forEach(v => {
          v.hidden = v.dataset.tabView !== target;
        });
        // Reset scroll on each switch so the user always lands at the top of
        // the new view (otherwise scroll position from the previous view
        // bleeds through).
        if (body) body.scrollTop = 0;
      }

      tabs.forEach(btn => {
        btn.addEventListener('click', () => {
          const target = btn.dataset.tabBtn;
          show(target);
          // Persist tab in URL hash so refresh / share keeps the tab.
          const hash = target === 'league' ? '#league' : '';
          history.replaceState(null, '', location.pathname + hash);
        });
      });

      // Initial tab from hash (deep-link support: /stats.html#league).
      const initial = location.hash === '#league' ? 'league' : 'mine';
      show(initial);

      // -------- Heatmap generation (year-to-date 2026) --------
      const grid = document.querySelector('[data-heatmap-grid]');
      if (grid) {
        const COLS = 22;
        const ROWS = 7;
        // Demo activity: { columnIndex: { rowIndex: level } }. Flutter will
        // replace this with a real query against `learning_events`.
        const DEMO = {
          3:  { 2: 1, 4: 1 },
          6:  { 1: 2, 3: 1 },
          9:  { 0: 1 },
          11: { 4: 1, 5: 2 },
          13: { 2: 1, 3: 2, 4: 1 },
          15: { 1: 1, 2: 2, 3: 3, 4: 2 },
          17: { 0: 2, 1: 3, 2: 2, 3: 4 },
          18: { 1: 3, 2: 4, 3: 3, 4: 2 },
          19: { 0: 2, 1: 4, 2: 3, 3: 4, 4: 3, 5: 2 },
          20: { 1: 4, 2: 3, 3: 4, 4: 4, 5: 3 },
          21: { 0: 3, 1: 4, 2: 4, 3: 3, 4: 4, 5: 2 },
        };
        const cells = [];
        for (let c = 0; c < COLS; c++) {
          for (let r = 0; r < ROWS; r++) {
            const level = (DEMO[c] && DEMO[c][r]) || 0;
            const attr = level ? ` data-level="${level}"` : '';
            cells.push(`<div class="heatmap-cell"${attr}></div>`);
          }
        }
        grid.innerHTML = cells.join('');
      }
    })();
  </script>
</body>
