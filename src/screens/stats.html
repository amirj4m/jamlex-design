<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00B4A6" />
  <title>Jamlex · Stats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css?v=mppkdag2" />
  <link rel="stylesheet" href="/css/base.css?v=mppkdag2" />
  <link rel="stylesheet" href="/css/components.css?v=mppkdag2" />
  <link rel="stylesheet" href="/css/components/v2-patterns.css?v=mppkdag2" />
  <link rel="stylesheet" href="/css/components/popup.css?v=mppkdag2" />
  <link rel="stylesheet" href="/css/chrome.css?v=mppkdag2" />
  <link rel="stylesheet" href="/css/screens/screen-base.css?v=mppkdag2" />
  <link rel="stylesheet" href="/css/screens/screens-app.css?v=mppkdag2" />
</head>
<body>
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale"><option value="fa">فارسی</option><option value="en">English</option></select>
    <select data-theme-picker aria-label="Theme"><option value="system">🖥 System</option><option value="light">☀ Light</option><option value="dark">🌙 Dark</option></select>
  </div>
  <a href="/" class="hub-ribbon">‹ Hub</a>

  <div class="shell">
    <div class="phone">
      <div class="screen">
        <div class="screen__body">
          <!-- TODO(flutter): every number on this page must come from a live
               provider/stream. See feedback_ux_patterns.md §5. Demo values
               below match the empty-state reference (mostly zeros).
               TODO(flutter): definitions of streak, record, words-learned,
               study-hours are LOCKED in architecture_stats_definitions.md. -->

          <!-- Two-tab switcher: My progress (this page) vs Compare with others -->
          <div class="stats-tabs">
            <a href="/screens/stats.html" class="stats-tab stats-tab--active" data-i18n="v3.stats.tabMine"></a>
            <a href="/screens/leaderboard.html" class="stats-tab" data-i18n="v3.stats.tabCompare"></a>
          </div>

          <!-- TOP — 3 tinted stat tiles -->
          <div class="stats-top">
            <div class="stats-tile stats-tile--blue">
              <span class="stats-tile__icon">📚</span>
              <span class="stats-tile__val">0</span>
              <span class="stats-tile__label" data-i18n="v3.stats.wordsLearned"></span>
            </div>
            <div class="stats-tile stats-tile--orange">
              <span class="stats-tile__icon">🔥</span>
              <span class="stats-tile__val">1</span>
              <span class="stats-tile__label" data-i18n="v3.stats.chain"></span>
            </div>
            <div class="stats-tile stats-tile--teal">
              <span class="stats-tile__icon">⏱️</span>
              <span class="stats-tile__val">0</span>
              <span class="stats-tile__label" data-i18n="v3.stats.studyHours"></span>
            </div>
          </div>

          <!-- Achievements card -->
          <div class="stats-card">
            <div class="stats-card__head">
              <span class="stats-card__title">
                <svg viewBox="0 0 24 24" fill="#F5B945"><path d="M7 2h10v2h4v4a4 4 0 0 1-4 4 5 5 0 0 1-3 3v3h3v2H7v-2h3v-3a5 5 0 0 1-3-3 4 4 0 0 1-4-4V4h4V2z"/></svg>
                <span data-i18n="v3.stats.achievements"></span>
              </span>
              <span class="stats-card__counter">4 / 0</span>
            </div>
            <div class="ach-grid">
              <div class="ach-cell" data-locked="true">
                <span class="ach-cell__icon">👑</span>
                <span class="ach-cell__name" data-i18n="v3.stats.achLegend"></span>
              </div>
              <div class="ach-cell" data-locked="true">
                <span class="ach-cell__icon">📅</span>
                <span class="ach-cell__name" data-i18n="v3.stats.achMonthly"></span>
              </div>
              <div class="ach-cell" data-locked="true">
                <span class="ach-cell__icon">💎</span>
                <span class="ach-cell__name" data-i18n="v3.stats.achPremium"></span>
              </div>
              <div class="ach-cell" data-locked="true">
                <span class="ach-cell__icon">🎯</span>
                <span class="ach-cell__name" data-i18n="v3.stats.achFirstStep"></span>
              </div>
            </div>
          </div>

          <!-- Activity year heatmap -->
          <div class="stats-card">
            <div class="stats-card__head">
              <span class="stats-card__title">
                <svg viewBox="0 0 24 24" fill="none" stroke="var(--jx-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span data-i18n="v3.stats.activity"></span>
              </span>
              <div class="year-toggle" data-year-toggle>
                <button type="button" class="year-toggle__btn" data-active="true">2026</button>
                <button type="button" class="year-toggle__btn">2025</button>
              </div>
            </div>
            <div class="heatmap-year">
              <div class="heatmap-year__months">
                <span>Jan</span><span>Feb</span><span>Mar</span><span>Apr</span><span>May</span>
              </div>
              <div class="heatmap-year__main">
                <div class="heatmap-year__days">
                  <span></span><span>M</span><span></span><span>W</span><span></span><span>F</span><span></span>
                </div>
                <div class="heatmap-year__grid" data-heatmap-grid></div>
              </div>
              <div class="heatmap-legend">
                <span data-i18n="v3.stats.more"></span>
                <div class="heatmap-legend__cells">
                  <div class="heatmap-cell" data-level="4"></div>
                  <div class="heatmap-cell" data-level="3"></div>
                  <div class="heatmap-cell" data-level="2"></div>
                  <div class="heatmap-cell" data-level="1"></div>
                  <div class="heatmap-cell"></div>
                </div>
                <span data-i18n="v3.stats.less"></span>
              </div>
            </div>
          </div>

          <!-- This week mini-card -->
          <div class="stats-card">
            <div class="stats-card__head">
              <span class="stats-card__title">
                <svg viewBox="0 0 24 24" fill="none" stroke="var(--jx-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span data-i18n="v3.stats.thisWeek"></span>
              </span>
            </div>
            <div class="week-mini">
              <div class="week-mini__cell">
                <span class="week-mini__icon" style="color:#E59A1A;">📅</span>
                <span class="week-mini__val">0</span>
                <span class="week-mini__label" data-i18n="v3.stats.weekDays"></span>
              </div>
              <div class="week-mini__cell">
                <span class="week-mini__icon" style="color:#4A90D9;">📖</span>
                <span class="week-mini__val">0</span>
                <span class="week-mini__label" data-i18n="v3.stats.weekWords"></span>
              </div>
              <div class="week-mini__cell">
                <span class="week-mini__icon" style="color:#1F9389;">⏱️</span>
                <span class="week-mini__val">0h</span>
                <span class="week-mini__label" data-i18n="v3.stats.weekStudy"></span>
              </div>
            </div>
          </div>
        </div>

        <div data-bottomnav="stats"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/screen-shell.js?v=mppkdag2"></script>
  <script>
    // Generate the 22×7 heatmap grid. Empty by default to match the
    // reference. The Flutter app populates each cell from session data:
    //   `learning_events` aggregated by (year, day_of_year).
    (function () {
      const grid = document.querySelector('[data-heatmap-grid]');
      if (!grid) return;
      const COLS = 22;
      const ROWS = 7;
      const cells = [];
      for (let i = 0; i < COLS * ROWS; i++) {
        cells.push('<div class="heatmap-cell"></div>');
      }
      grid.innerHTML = cells.join('');

      // Year toggle (visual only in preview)
      document.addEventListener('click', function (e) {
        const btn = e.target.closest('.year-toggle__btn');
        if (!btn) return;
        btn.parentElement.querySelectorAll('.year-toggle__btn').forEach(function (b) {
          b.removeAttribute('data-active');
        });
        btn.dataset.active = 'true';
      });
    })();
  </script>
</body>
</html>
