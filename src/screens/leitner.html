<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00B4A6" />
  <title>Jamlex · Leitner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/components/v2-patterns.css" />
  <link rel="stylesheet" href="/css/chrome.css" />
  <link rel="stylesheet" href="/css/screens/screen-base.css" />
  <link rel="stylesheet" href="/css/screens/screens-app.css" />
</head>
<body>
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale"><option value="fa">فارسی</option><option value="en">English</option></select>
    <select data-theme-picker aria-label="Theme"><option value="system">🖥 System</option><option value="light">☀ Light</option><option value="dark">🌙 Dark</option></select>
    <select id="state-picker" aria-label="State" onchange="
      document.querySelectorAll('.state').forEach(function(s){s.hidden = s.dataset.state !== event.target.value;});
    ">
      <option value="filled">With cards</option>
      <option value="empty">Empty state</option>
    </select>
  </div>
  <a href="/" class="hub-ribbon">‹ Hub</a>

  <div class="shell">
    <div class="phone">
      <div class="screen">
        <header class="topbar topbar--transparent">
          <div></div>
          <h1 class="topbar__title" data-i18n="v3.leitner.title"></h1>
          <div></div>
        </header>

        <!-- STATE: with cards -->
        <div class="state" data-state="filled">
          <div class="screen__body">
            <div class="leitner-boxes">
              <div class="lboxer" data-box="1"><div class="lboxer__shape"><span class="lboxer__num">1</span></div><span class="lboxer__count">43</span></div>
              <div class="lboxer" data-box="2"><div class="lboxer__shape"><span class="lboxer__num">2</span></div><span class="lboxer__count">61</span></div>
              <div class="lboxer" data-box="3"><div class="lboxer__shape"><span class="lboxer__num">3</span></div><span class="lboxer__count">10</span></div>
              <div class="lboxer" data-box="4"><div class="lboxer__shape"><span class="lboxer__num">4</span></div><span class="lboxer__count">89</span></div>
              <div class="lboxer" data-box="5" data-active="true"><div class="lboxer__shape"><span class="lboxer__num">5</span></div><span class="lboxer__count">233</span></div>
            </div>

            <a href="/screens/leitner-review.html" class="review-cta" style="margin-top: var(--sp-5);">
              <div>
                <div class="review-cta__title" data-i18n="v3.leitner.dueCount" data-i18n-vars='{"n":15}'></div>
                <div class="review-cta__sub" data-i18n="v3.leitner.dueSub"></div>
              </div>
              <span class="review-cta__arrow"></span>
            </a>

            <div class="section-h" style="margin-top: var(--sp-5);">
              <div class="section-h__title" data-i18n="v3.leitner.recentlyReviewed"></div>
            </div>
            <div class="word-rows-v3">
              <div class="word-row-v3">
                <button class="word-row-v3__bookmark" data-active="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.8"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></button>
                <div class="word-row-v3__body"><div class="word-row-v3__english">resilience</div><div class="word-row-v3__ipa">/rɪˈzɪliəns/</div></div>
                <button class="audio-btn audio-btn--lg" data-audio="resilience"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg></button>
              </div>
              <div class="word-row-v3">
                <button class="word-row-v3__bookmark"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></button>
                <div class="word-row-v3__body"><div class="word-row-v3__english">ephemeral</div><div class="word-row-v3__ipa">/ɪˈfemərəl/</div></div>
                <button class="audio-btn audio-btn--lg" data-audio="ephemeral"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg></button>
              </div>
              <div class="word-row-v3">
                <button class="word-row-v3__bookmark"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></button>
                <div class="word-row-v3__body"><div class="word-row-v3__english">eloquent</div><div class="word-row-v3__ipa">/ˈeləkwənt/</div></div>
                <button class="audio-btn audio-btn--lg" data-audio="eloquent"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg></button>
              </div>
            </div>
          </div>
        </div>

        <!-- STATE: empty -->
        <div class="state" data-state="empty" hidden>
          <div class="screen__body" style="display:flex;flex-direction:column;">
            <div style="margin-top: auto; margin-bottom: auto; text-align: center;">
              <div class="lottie-stage lottie-stage--lg" data-lottie="empty-box-plane"></div>
              <h2 class="empty-block__title" data-i18n="v3.leitner.emptyTitle"></h2>
              <p class="empty-block__sub" data-i18n-html="v3.leitner.emptyBody"></p>
              <a href="/screens/vocabulary.html" class="btn btn--filled btn--block btn--lg" style="margin-top: var(--sp-5);">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                <span data-i18n="v3.leitner.emptyCta"></span>
              </a>
              <div class="info-card">
                <span class="info-card__icon">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7c.6.7 1 1.5 1 2.3v1h6v-1c0-.8.4-1.6 1-2.3A7 7 0 0 0 12 2z"/></svg>
                </span>
                <div class="info-card__text" data-i18n-html="v3.leitner.infoHint"></div>
              </div>
            </div>
          </div>
        </div>

        <div data-bottomnav="leitner"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/screen-shell.js"></script>
</body>
</html>
