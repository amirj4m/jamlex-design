<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00B4A6" />
  <title>Jamlex · Leitner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css?v=mppjzszv" />
  <link rel="stylesheet" href="/css/base.css?v=mppjzszv" />
  <link rel="stylesheet" href="/css/components.css?v=mppjzszv" />
  <link rel="stylesheet" href="/css/components/v2-patterns.css?v=mppjzszv" />
  <link rel="stylesheet" href="/css/components/popup.css?v=mppjzszv" />
  <link rel="stylesheet" href="/css/chrome.css?v=mppjzszv" />
  <link rel="stylesheet" href="/css/screens/screen-base.css?v=mppjzszv" />
  <link rel="stylesheet" href="/css/screens/screens-app.css?v=mppjzszv" />
</head>
<body>
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale"><option value="fa">فارسی</option><option value="en">English</option></select>
    <select data-theme-picker aria-label="Theme"><option value="system">🖥 System</option><option value="light">☀ Light</option><option value="dark">🌙 Dark</option></select>
    <select id="state-picker" aria-label="State" onchange="
      document.querySelectorAll('.state').forEach(function(s){s.hidden = s.dataset.state !== event.target.value;});
    ">
      <option value="review">With cards (review)</option>
      <option value="empty">Empty Leitner</option>
    </select>
  </div>
  <a href="/" class="hub-ribbon">‹ Hub</a>

  <div class="shell">
    <div class="phone">
      <div class="screen">
        <header class="topbar topbar--transparent">
          <div></div>
          <h1 class="topbar__title" data-i18n="v3.leitner.title"></h1>
          <div></div>
        </header>

        <!-- Tiny top-of-screen toast for the graduation moment. Sits inside .screen
             so it's confined to the phone frame, slides down from above the topbar. -->
        <div class="lt-toast" data-lt-toast>
          <span class="lt-toast__icon">🎓</span>
          <span data-lt-toast-text></span>
        </div>
        <div class="screen__body lt-session" data-flipped="false" data-lt-session>
        <!-- ⚠️ Leitner scheduling formula is LOCKED in memory:
             architecture_leitner_algorithm.md. Box intervals 1/2/4/7/14 days,
             today's queue ordering (new first, most overdue next, lower box,
             older), overflow handling, graduation rules. Any Flutter port
             MUST follow that document. -->
        <!-- STATE: review (has cards). Default visible. -->
        <div class="state" data-state="review">
          <!-- Five Leitner boxes 1→5 LEFT→RIGHT (dir=ltr locks the order).
               Standard Leitner intervals: 1d / 2d / 4d / 7d / 14d. The active
               box is the one we're reviewing FROM (here: box 5).
               TODO(flutter): the count badges (43/61/10/89/233) are PLACEHOLDERS.
               In the real app they MUST come from a live query
               `SELECT COUNT(*) FROM cards WHERE box=$n AND user_id=…` per box,
               recomputed reactively when cards move. See memory
               feedback_ux_patterns.md §5. -->
          <div class="lt-boxes" dir="ltr">
            <div class="lt-box" data-box="1" title="هر روز">
              <span class="lt-box__count">43</span>
              <div class="lt-box__shape"><span class="lt-box__num">1</span></div>
              <span class="lt-box__arrow"></span>
            </div>
            <div class="lt-box" data-box="2" title="هر ۲ روز">
              <span class="lt-box__count">61</span>
              <div class="lt-box__shape"><span class="lt-box__num">2</span></div>
              <span class="lt-box__arrow"></span>
            </div>
            <div class="lt-box" data-box="3" title="هر ۴ روز">
              <span class="lt-box__count">10</span>
              <div class="lt-box__shape"><span class="lt-box__num">3</span></div>
              <span class="lt-box__arrow"></span>
            </div>
            <div class="lt-box" data-box="4" title="هفتگی">
              <span class="lt-box__count">89</span>
              <div class="lt-box__shape"><span class="lt-box__num">4</span></div>
              <span class="lt-box__arrow"></span>
            </div>
            <div class="lt-box" data-box="5" data-active="true" title="دو هفته یکبار">
              <span class="lt-box__count">233</span>
              <div class="lt-box__shape"><span class="lt-box__num">5</span></div>
              <span class="lt-box__arrow"></span>
            </div>
          </div>

          <!-- Control pill: audio (English TTS in real app) | counter | trash.
               TODO(flutter): "1 / 75" — 1 is the current card index in today's
               review queue, 75 is the user's `daily_card_limit` setting. Both
               are LIVE — not hardcoded. -->
          <div class="lt-control" dir="ltr">
            <button type="button" class="lt-control__btn" data-lt-audio aria-label="Play">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 0 0-2.5-4.03v8.05A4.5 4.5 0 0 0 16.5 12z"/></svg>
            </button>
            <span class="lt-control__counter" data-lt-counter>1 / 75</span>
            <button type="button" class="lt-control__btn lt-control__btn--danger" data-lt-trash aria-label="Delete">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
            </button>
          </div>

          <!-- Flashcard — click flips to Persian meaning. English content
               on the front, Persian meaning on the back. -->
          <div class="lt-card" data-lt-card>
            <div class="lt-card__inner">
              <div class="lt-card__front">
                <div class="lt-card__english" data-lt-word>ours</div>
                <div class="lt-card__ipa" data-lt-ipa>/aʊrz/</div>
              </div>
              <div class="lt-card__back" dir="rtl">
                <div class="lt-card__meaning" data-lt-meaning>مال ما</div>
              </div>
            </div>
          </div>

          <!-- Front: ONE translate CTA. Tapping it (or the card itself) flips
               to the Persian meaning. Hidden once the card is flipped. -->
          <button type="button" class="lt-translate-btn" data-lt-translate>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 8h14M5 8l4-4m-4 4 4 4M3 16h10M13 16l-3 3m3-3-3-3"/></svg>
            <span data-i18n="v3.leitner.translate"></span>
          </button>

          <!-- Back: 4 mastery buttons. Visible only AFTER the user has seen
               the Persian meaning (i.e. once the session is in "flipped" state).
               dir=ltr keeps the worst→best progression LEFT→RIGHT. -->
          <div class="lt-mastery" dir="ltr">
            <button type="button" class="lt-mbtn lt-mbtn--dont" data-lt-move="reset">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
              <span data-i18n="v3.leitner.review.dontKnow"></span>
            </button>
            <button type="button" class="lt-mbtn lt-mbtn--sort" data-lt-move="stay">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><line x1="12" y1="4" x2="12" y2="14"/><circle cx="12" cy="19" r="1.6" fill="currentColor"/></svg>
              <span data-i18n="v3.leitner.review.sortOf"></span>
            </button>
            <button type="button" class="lt-mbtn lt-mbtn--know" data-lt-move="+1">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              <span data-i18n="v3.leitner.review.know"></span>
            </button>
            <button type="button" class="lt-mbtn lt-mbtn--well" data-lt-move="+2">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 12 8 17 21 4"/><polyline points="9 12 14 17 21 10"/></svg>
              <span data-i18n="v3.leitner.review.knowWell"></span>
            </button>
          </div>
        </div>

        <!-- STATE: empty — shown when the user has no cards in Leitner.
             TODO(flutter): switch between states based on
             `useStream(leitnerCardCountProvider).hasData && count > 0`. -->
        <div class="state" data-state="empty" hidden style="display:flex;flex-direction:column;flex:1;">
          <div style="margin:auto;text-align:center;width:100%;">
            <div class="lottie-stage lottie-stage--lg" data-lottie="empty-box-plane"></div>
            <h2 class="empty-block__title" data-i18n="v3.leitner.emptyTitle"></h2>
            <p class="empty-block__sub" data-i18n-html="v3.leitner.emptyBody"></p>
            <a href="/screens/vocabulary.html" class="btn btn--filled btn--block btn--lg" style="margin-top: var(--sp-5);">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
              <span data-i18n="v3.leitner.emptyCta"></span>
            </a>
            <div class="info-card">
              <span class="info-card__icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7c.6.7 1 1.5 1 2.3v1h6v-1c0-.8.4-1.6 1-2.3A7 7 0 0 0 12 2z"/></svg>
              </span>
              <div class="info-card__text" data-i18n-html="v3.leitner.infoHint"></div>
            </div>
          </div>
        </div>
        </div>

        <div data-bottomnav="leitner"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/screen-shell.js?v=mppjzszv"></script>
  <script>
    // Leitner review interaction.
    // The active box (green outline) is the box the current card lives in.
    // Move math from the active box:
    //   reset (don't know)  → box 1   (always back to the start)
    //   stay  (sort of)     → same box
    //   +1    (know)        → activeBox + 1 — if > 5, the card GRADUATES
    //   +2    (know well)   → activeBox + 2 — if > 5, the card GRADUATES
    // Graduation removes the card from Leitner. We show a success popup
    // and advance to the next card.
    //
    // Card-click flips between English (front) and Persian meaning (back).
    (function () {
      const WORDS = [
        { word: 'ours',        ipa: '/aʊrz/',           meaning: 'مال ما',          box: 5 },
        { word: 'resilience',  ipa: '/rɪˈzɪliəns/',     meaning: 'تاب‌آوری',         box: 1 },
        { word: 'ephemeral',   ipa: '/ɪˈfemərəl/',      meaning: 'گذرا، زودگذر',     box: 3 },
        { word: 'eloquent',    ipa: '/ˈeləkwənt/',      meaning: 'سخنور، فصیح',      box: 4 },
        { word: 'serendipity', ipa: '/ˌserənˈdɪpɪti/',  meaning: 'خوش‌اقبالی',       box: 2 },
        { word: 'ubiquitous',  ipa: '/juːˈbɪkwɪtəs/',   meaning: 'همه‌جا حاضر',      box: 5 },
        { word: 'paradigm',    ipa: '/ˈpærədaɪm/',      meaning: 'الگو، سرمشق',      box: 3 },
        { word: 'meticulous',  ipa: '/məˈtɪkjələs/',    meaning: 'دقیق، باوسواس',    box: 4 },
      ];
      const TOTAL = 75; // user's daily-limit setting

      let idx = 0;
      const sessionEl = document.querySelector('[data-lt-session]');
      const wordEl    = document.querySelector('[data-lt-word]');
      const ipaEl     = document.querySelector('[data-lt-ipa]');
      const meaningEl = document.querySelector('[data-lt-meaning]');
      const counterEl = document.querySelector('[data-lt-counter]');
      const toastEl   = document.querySelector('[data-lt-toast]');
      const toastTxt  = document.querySelector('[data-lt-toast-text]');

      // Top-slide celebration toast — used ONLY for graduation. Quick visual
      // wink, no buttons, no blocking. Not a popup (intentional exception).
      function showGraduationToast () {
        if (!toastEl || !toastTxt) return;
        // Pull localised text from i18n if available, else fall back to a literal.
        const msg = (window.t && window.t('v3.leitner.graduated'))
          || (document.documentElement.lang === 'en' ? 'Card graduated from Leitner' : 'این کارت از لایتنر فارغ‌التحصیل شد');
        toastTxt.textContent = msg;
        toastEl.dataset.active = 'true';
        setTimeout(function () { toastEl.removeAttribute('data-active'); }, 1800);
      }

      function flip (toFlipped) {
        const wantFlipped = (toFlipped === undefined)
          ? sessionEl.dataset.flipped !== 'true'
          : !!toFlipped;
        sessionEl.dataset.flipped = wantFlipped ? 'true' : 'false';
      }

      function setActiveBox (n) {
        document.querySelectorAll('.lt-box').forEach(function (b) { b.removeAttribute('data-active'); });
        const el = document.querySelector('.lt-box[data-box="' + n + '"]');
        if (el) el.dataset.active = 'true';
      }

      function paintCard () {
        const item = WORDS[idx % WORDS.length];
        wordEl.textContent    = item.word;
        ipaEl.textContent     = item.ipa;
        meaningEl.textContent = item.meaning;
        counterEl.textContent = (idx + 1) + ' / ' + TOTAL;
        flip(false); // always show the front (English) for a new card
        setActiveBox(item.box);
      }

      function highlightLanding (target, hue) {
        // hue: 'green' | 'red' | 'yellow' — drives the pulse colour.
        const box = document.querySelector('.lt-box[data-box="' + target + '"]');
        if (!box) return;
        box.dataset.landed = hue;
        setTimeout(function () { box.removeAttribute('data-landed'); }, 800);
      }

      function advance () {
        idx = (idx + 1) % WORDS.length;
        paintCard();
      }

      document.addEventListener('click', function (e) {
        // Mastery buttons
        const m = e.target.closest('[data-lt-move]');
        if (m) {
          const move = m.dataset.ltMove;
          const cur  = WORDS[idx % WORDS.length].box;
          // Each action picks a target box AND a pulse hue.
          //   don't know → red    (card thrown back to box 1)
          //   sort of    → yellow (stays in place, marginal recall)
          //   know       → green  (progress)
          //   know well  → green  (big progress; may graduate)
          let target, hue;
          if      (move === 'reset') { target = 1;       hue = 'red';    }
          else if (move === 'stay')  { target = cur;     hue = 'yellow'; }
          else if (move === '+1')    { target = cur + 1; hue = 'green';  }
          else if (move === '+2')    { target = cur + 2; hue = 'green';  }

          if (target > 5) {
            // Card graduated out of Leitner — micro celebration toast at the
            // top of the screen, then advance. No popup (would block review flow).
            showGraduationToast();
            setTimeout(advance, 900);
          } else {
            highlightLanding(target, hue);
            setTimeout(advance, 720);
          }
          return;
        }
        // Trash → confirm popup, uses v3.confirm.deleteLeitnerCard keys
        if (e.target.closest('[data-lt-trash]')) {
          if (window.confirmAction) window.confirmAction('deleteLeitnerCard');
          return;
        }
        // Audio button — in the real app, plays English TTS for the word.
        if (e.target.closest('[data-lt-audio]')) {
          return;
        }
        // Translate button OR tapping the card itself → flip
        if (e.target.closest('[data-lt-translate]') || e.target.closest('[data-lt-card]')) {
          flip();
          return;
        }
      });

      // Initial render
      paintCard();
    })();
  </script>
</body>
</html>
