<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00B4A6" />
  <title>Jamlex · New Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/chrome.css" />
  <link rel="stylesheet" href="/css/screens/screen-base.css" />
</head>
<body>
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale">
      <option value="fa">فارسی</option>
      <option value="en">English</option>
    </select>
    <select data-theme-picker aria-label="Theme">
      <option value="system">🖥 System</option>
      <option value="light">☀ Light</option>
      <option value="dark">🌙 Dark</option>
    </select>
  </div>
  <a href="/" class="hub-ribbon">‹ Hub</a>

  <div class="shell">
    <div class="phone">
      <div class="screen">
        <section class="auth-screen">
          <header class="auth-screen__header">
            <a href="/screens/login.html" class="btn-icon back-btn" data-i18n-attr="aria-label:common.back"></a>
          </header>

          <div class="auth-screen__body">
            <div class="auth-screen__title-block">
              <h1 class="auth-screen__title" data-i18n="auth.newPasswordTitle"></h1>
            </div>

            <form class="auth-screen__form" onsubmit="event.preventDefault();">
              <div class="field">
                <label class="field__label" for="np-new" data-i18n="auth.newPassword"></label>
                <div class="field__control">
                  <input
                    id="np-new"
                    type="password"
                    class="field__input field__input--with-slot-end"
                    autocomplete="new-password"
                    required
                    minlength="8"
                    data-i18n-attr="placeholder:auth.passwordPlaceholder"
                    oninput="check();"
                  />
                  <button type="button" class="field__slot-end btn-icon btn-icon--sm" aria-label="Show password" onclick="
                    var i = this.parentElement.querySelector('input');
                    i.type = i.type === 'password' ? 'text' : 'password';
                    this.textContent = i.type === 'password' ? '👁' : '🙈';
                  ">👁</button>
                </div>
                <div class="pw-meter" data-strength="">
                  <span class="pw-meter__seg"></span>
                  <span class="pw-meter__seg"></span>
                  <span class="pw-meter__seg"></span>
                  <span class="pw-meter__seg"></span>
                </div>
              </div>

              <div class="field">
                <label class="field__label" for="np-confirm" data-i18n="auth.confirmPassword"></label>
                <input
                  id="np-confirm"
                  type="password"
                  class="field__input"
                  autocomplete="new-password"
                  required
                  minlength="8"
                  data-i18n-attr="placeholder:auth.passwordPlaceholder"
                  oninput="check();"
                />
                <div class="field__error" id="np-mismatch" hidden data-i18n="auth.validation.passwordMismatch"></div>
              </div>

              <button type="submit" class="btn btn--filled btn--block" data-i18n="auth.savePasswordBtn"></button>
            </form>
          </div>
        </section>
      </div>
    </div>
  </div>

  <script>
    function check() {
      var a = document.getElementById('np-new').value;
      var b = document.getElementById('np-confirm').value;
      document.getElementById('np-mismatch').hidden = !b || a === b;

      var meter = document.querySelector('.pw-meter');
      var score = 0;
      if (a.length >= 8) score++;
      if (/[a-z]/.test(a) && /[A-Z]/.test(a)) score++;
      if (/[0-9!@#$%^&*()_\-+=.,?]/.test(a)) score++;
      meter.dataset.strength = ['', 'weak', 'fair', 'good', 'strong'][score];
    }
  </script>
  <script type="module" src="/js/screen-shell.js"></script>
</body>
</html>
