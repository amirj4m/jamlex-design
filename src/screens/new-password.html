<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00B4A6" />
  <title>Jamlex · New Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css?v=mpoj5id5" />
  <link rel="stylesheet" href="/css/base.css?v=mpoj5id5" />
  <link rel="stylesheet" href="/css/components.css?v=mpoj5id5" />
  <link rel="stylesheet" href="/css/components/v2-patterns.css?v=mpoj5id5" />
  <link rel="stylesheet" href="/css/components/popup.css?v=mpoj5id5" />
  <link rel="stylesheet" href="/css/chrome.css?v=mpoj5id5" />
  <link rel="stylesheet" href="/css/screens/screen-base.css?v=mpoj5id5" />
</head>
<body>
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale"><option value="fa">فارسی</option><option value="en">English</option></select>
    <select data-theme-picker aria-label="Theme"><option value="system">🖥 System</option><option value="light">☀ Light</option><option value="dark">🌙 Dark</option></select>
  </div>
  <a href="/" class="hub-ribbon">‹ Hub</a>

  <div class="shell">
    <div class="phone">
      <div class="screen screen--auth">
        <header class="topbar topbar--transparent">
          <div class="topbar__leading">
            <a href="/screens/home.html" class="btn-icon back-btn" aria-label="Back"></a>
          </div>
          <div></div>
          <div></div>
        </header>

        <div class="screen__body screen__body--auth">
          <div class="lottie-stage lottie-stage--in-disc" data-lottie="hero-lock"></div>

          <h1 class="auth-title" data-i18n="auth.newPasswordTitle"></h1>
          <p class="auth-subtitle" data-i18n="auth.newPasswordSub"></p>

          <form class="auth-form" autocomplete="on">
            <div class="field">
              <div class="field__control">
                <span class="field__slot-start">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/>
                  </svg>
                </span>
                <input type="password" class="field__input field__input--with-slot-start field__input--with-slot-end" data-i18n-attr="placeholder:auth.newPassword" autocomplete="new-password" />
                <span class="field__slot-end">
                  <button type="button" data-pwd-toggle aria-label="Toggle">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                    </svg>
                  </button>
                </span>
              </div>
            </div>

            <div class="field">
              <div class="field__control">
                <span class="field__slot-start">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/>
                  </svg>
                </span>
                <input type="password" class="field__input field__input--with-slot-start field__input--with-slot-end" data-i18n-attr="placeholder:auth.confirmPassword" autocomplete="new-password" />
                <span class="field__slot-end">
                  <button type="button" data-pwd-toggle aria-label="Toggle">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                    </svg>
                  </button>
                </span>
              </div>
            </div>

            <div class="pw-rule-line">
              <span class="pw-rule-line__dot"></span>
              <span data-i18n="auth.pwRuleMin8"></span>
            </div>

            <button type="submit" class="btn btn--filled btn--block btn--lg" data-i18n="auth.savePasswordBtn"></button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/screen-shell.js?v=mpoj5id5"></script>
  <script>
    document.addEventListener('click', function (e) {
      var t = e.target.closest('[data-pwd-toggle]');
      if (!t) return;
      var input = t.closest('.field__control').querySelector('input');
      input.type = input.type === 'password' ? 'text' : 'password';
    });
  </script>
</body>
</html>
