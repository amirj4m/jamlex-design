<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00B4A6" />
  <title>Jamlex · Quiz MCQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css?v=mpokn2nk" />
  <link rel="stylesheet" href="/css/base.css?v=mpokn2nk" />
  <link rel="stylesheet" href="/css/components.css?v=mpokn2nk" />
  <link rel="stylesheet" href="/css/components/v2-patterns.css?v=mpokn2nk" />
  <link rel="stylesheet" href="/css/components/popup.css?v=mpokn2nk" />
  <link rel="stylesheet" href="/css/chrome.css?v=mpokn2nk" />
  <link rel="stylesheet" href="/css/screens/screen-base.css?v=mpokn2nk" />
  <link rel="stylesheet" href="/css/screens/screens-app.css?v=mpokn2nk" />
</head>
<body>
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale"><option value="fa">فارسی</option><option value="en">English</option></select>
    <select data-theme-picker aria-label="Theme"><option value="system">🖥 System</option><option value="light">☀ Light</option><option value="dark">🌙 Dark</option></select>
    <select id="state-picker" aria-label="State" onchange="
      document.querySelectorAll('.state').forEach(function(s){s.hidden = s.dataset.state !== event.target.value;});
    ">
      <option value="ask">Question</option>
      <option value="correct">Correct feedback</option>
      <option value="end">End</option>
    </select>
  </div>
  <a href="/" class="hub-ribbon">‹ Hub</a>

  <div class="shell">
    <div class="phone">
      <div class="screen">
        <header class="topbar">
          <div class="topbar__leading">
            <a href="/screens/home.html" class="btn-icon back-btn" aria-label="Back"></a>
          </div>
          <h1 class="topbar__title" data-i18n="v3.quiz.mcqTitle"></h1>
          <div class="topbar__trailing">
            <button class="btn-icon" aria-label="Close">✕</button>
          </div>
        </header>

        <div class="screen__body">
          <!-- ASK -->
          <div class="state" data-state="ask">
            <div class="fc-counter-v3">3 / 10</div>
            <div class="fc-progress-v3"><div class="fc-progress-v3__bar" style="width:30%;"></div></div>

            <div class="qprompt-v3">
              <div class="qprompt-v3__copy" data-i18n="v3.quiz.mcqPrompt"></div>
              <div class="qprompt-v3__word qprompt-v3__word--en">resilience</div>
              <button class="audio-btn audio-btn--lg" style="margin-top:var(--sp-3);" data-audio="resilience">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg>
              </button>
            </div>

            <div class="q-opts">
              <button class="q-opt"><span class="q-opt__letter">۱</span><span data-i18n="v3.quiz.options.speed"></span></button>
              <button class="q-opt" data-state="selected"><span class="q-opt__letter">۲</span><span data-i18n="v3.quiz.options.resilience"></span></button>
              <button class="q-opt"><span class="q-opt__letter">۳</span><span data-i18n="v3.quiz.options.brilliance"></span></button>
              <button class="q-opt"><span class="q-opt__letter">۴</span><span data-i18n="v3.quiz.options.silence"></span></button>
            </div>

            <button class="btn btn--filled btn--block btn--lg" style="margin-top:var(--sp-5);" data-i18n="v3.quiz.checkBtn"></button>
          </div>

          <!-- CORRECT feedback -->
          <div class="state" data-state="correct" hidden>
            <div class="fc-counter-v3">3 / 10</div>
            <div class="fc-progress-v3"><div class="fc-progress-v3__bar" style="width:30%;"></div></div>

            <div class="qprompt-v3">
              <div class="qprompt-v3__copy" data-i18n="v3.quiz.mcqPrompt"></div>
              <div class="qprompt-v3__word qprompt-v3__word--en">resilience</div>
            </div>

            <div class="q-opts">
              <button class="q-opt"><span class="q-opt__letter">۱</span><span data-i18n="v3.quiz.options.speed"></span></button>
              <button class="q-opt" data-state="correct"><span class="q-opt__letter">۲</span><span data-i18n="v3.quiz.options.resilience"></span><span style="margin-inline-start:auto;">✓</span></button>
              <button class="q-opt"><span class="q-opt__letter">۳</span><span data-i18n="v3.quiz.options.brilliance"></span></button>
              <button class="q-opt"><span class="q-opt__letter">۴</span><span data-i18n="v3.quiz.options.silence"></span></button>
            </div>

            <div class="card" style="background:#DCF4E2;border-color:#C9EDD2;color:#2A8E4D;text-align:center;margin-top:var(--sp-4);">
              <div style="font-size:18px;font-weight:800;" data-i18n="v3.quiz.correctTitle"></div>
              <div style="font-size:var(--fs-body-s);margin-top:4px;" data-i18n="v3.quiz.correctSub"></div>
            </div>

            <button class="btn btn--filled btn--block btn--lg" style="margin-top:var(--sp-3);" data-i18n="v3.quiz.next"></button>
          </div>

          <!-- END -->
          <div class="state" data-state="end" hidden>
            <div class="lottie-stage lottie-stage--lg" data-lottie="hero-trophy" style="margin:var(--sp-3) auto;"></div>
            <h1 class="summary-title" data-i18n="v3.quiz.endTitle"></h1>
            <div style="text-align:center;margin-top:var(--sp-4);">
              <div style="font-size:48px;font-weight:800;color:var(--jx-primary);font-family:var(--font-family-latin);">8 / 10</div>
              <div style="color:var(--jx-text-2);margin-top:6px;" data-i18n="v3.quiz.endAccuracy" data-i18n-vars='{"pct":80}'></div>
            </div>
            <button class="btn btn--filled btn--block btn--lg" style="margin-top:var(--sp-5);" data-i18n="v3.quiz.endRestart"></button>
            <a href="/screens/home.html" class="btn btn--outlined btn--block btn--lg" style="margin-top:var(--sp-3);" data-i18n="v3.quiz.endExit"></a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/screen-shell.js?v=mpokn2nk"></script>
</body>
</html>
