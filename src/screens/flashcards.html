<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00B4A6" />
  <title>Jamlex · Flashcards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css?v=mppif5nd" />
  <link rel="stylesheet" href="/css/base.css?v=mppif5nd" />
  <link rel="stylesheet" href="/css/components.css?v=mppif5nd" />
  <link rel="stylesheet" href="/css/components/v2-patterns.css?v=mppif5nd" />
  <link rel="stylesheet" href="/css/components/popup.css?v=mppif5nd" />
  <link rel="stylesheet" href="/css/chrome.css?v=mppif5nd" />
  <link rel="stylesheet" href="/css/screens/screen-base.css?v=mppif5nd" />
  <link rel="stylesheet" href="/css/screens/screens-app.css?v=mppif5nd" />
</head>
<body>
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale"><option value="fa">فارسی</option><option value="en">English</option></select>
    <select data-theme-picker aria-label="Theme"><option value="system">🖥 System</option><option value="light">☀ Light</option><option value="dark">🌙 Dark</option></select>
    <select id="state-picker" aria-label="State" onchange="
      document.querySelectorAll('.state').forEach(function(s){s.hidden = s.dataset.state !== event.target.value;});
    ">
      <option value="front">Front</option>
      <option value="back">Back</option>
      <option value="end">End summary</option>
    </select>
  </div>
  <a href="/" class="hub-ribbon">‹ Hub</a>

  <div class="shell">
    <div class="phone">
      <div class="screen">
        <header class="topbar">
          <div class="topbar__leading">
            <a href="/screens/home.html" class="btn-icon back-btn" aria-label="Back"></a>
          </div>
          <h1 class="topbar__title" data-i18n="v3.flashcards.title" data-i18n-vars='{"level":"B1"}'></h1>
          <div class="topbar__trailing">
            <button class="btn-icon" aria-label="Close">✕</button>
          </div>
        </header>

        <div class="screen__body">
          <!-- FRONT -->
          <div class="state" data-state="front">
            <div class="fc-counter-v3">5 / 20</div>
            <div class="fc-progress-v3"><div class="fc-progress-v3__bar" style="width:25%"></div></div>

            <div class="flip-card-v3" style="margin-top:var(--sp-5);" onclick="
              document.getElementById('state-picker').value='back';
              document.querySelectorAll('.state').forEach(function(s){s.hidden = s.dataset.state !== 'back';});
            ">
              <div class="flip-card-v3__english">accomplish</div>
              <div class="flip-card-v3__ipa">/əˈkʌmplɪʃ/</div>
              <button class="audio-btn audio-btn--lg" data-audio="accomplish" onclick="event.stopPropagation();" style="margin-top:var(--sp-4);">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg>
              </button>
            </div>

            <p style="text-align:center;color:var(--jx-text-3);font-size:var(--fs-body-s);margin-top:var(--sp-3);" data-i18n="v3.flashcards.tapToFlip"></p>
          </div>

          <!-- BACK -->
          <div class="state" data-state="back" hidden>
            <div class="fc-counter-v3">5 / 20</div>
            <div class="fc-progress-v3"><div class="fc-progress-v3__bar" style="width:25%"></div></div>

            <div class="flip-card-v3" style="margin-top:var(--sp-5);">
              <div class="flip-card-v3__english">accomplish</div>
              <div class="flip-card-v3__meaning" data-i18n="v3.flashcards.meaning"></div>
              <div class="flip-card-v3__example">She managed to accomplish all her goals.</div>
            </div>

            <div class="mastery-buttons" style="grid-template-columns:1fr 1fr;">
              <button class="mbtn mbtn--dont">
                <svg class="mbtn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
                <span data-i18n="v3.flashcards.dontKnow"></span>
              </button>
              <button class="mbtn mbtn--well">
                <svg class="mbtn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                <span data-i18n="v3.flashcards.know"></span>
              </button>
            </div>
          </div>

          <!-- END -->
          <div class="state" data-state="end" hidden>
            <div class="lottie-stage lottie-stage--lg" data-lottie="hero-trophy" style="margin:var(--sp-3) auto;"></div>
            <h1 class="summary-title" data-i18n="v3.flashcards.summary.title"></h1>
            <p class="summary-sub" data-i18n="v3.flashcards.summary.subtitle"></p>

            <div class="stats-card" style="grid-template-columns:1fr 1fr;">
              <div class="stat-cell">
                <div class="stat-cell__icon" style="background:rgba(76,175,80,0.16);color:#2A8E4D;">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <div class="stat-cell__label" data-i18n="v3.flashcards.know"></div>
                <div class="stat-cell__val" style="color:#2A8E4D;">17</div>
              </div>
              <div class="stat-cell">
                <div class="stat-cell__icon" style="background:rgba(244,67,54,0.16);color:#E15858;">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
                </div>
                <div class="stat-cell__label" data-i18n="v3.flashcards.dontKnow"></div>
                <div class="stat-cell__val" style="color:#E15858;">3</div>
              </div>
            </div>

            <button class="btn btn--filled btn--block btn--lg" style="margin-top:var(--sp-4);" data-i18n="v3.flashcards.summary.again"></button>
            <a href="/screens/home.html" class="btn btn--outlined btn--block btn--lg" style="margin-top:var(--sp-3);" data-i18n="v3.flashcards.summary.back"></a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/screen-shell.js?v=mppif5nd"></script>
</body>
</html>
