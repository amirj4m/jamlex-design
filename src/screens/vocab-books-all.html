<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00B4A6" />
  <title>Jamlex · Vocab Study Books</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css?v=mpsle3f8" />
  <link rel="stylesheet" href="/css/base.css?v=mpsle3f8" />
  <link rel="stylesheet" href="/css/components.css?v=mpsle3f8" />
  <link rel="stylesheet" href="/css/components/v2-patterns.css?v=mpsle3f8" />
  <link rel="stylesheet" href="/css/components/popup.css?v=mpsle3f8" />
  <link rel="stylesheet" href="/css/chrome.css?v=mpsle3f8" />
  <link rel="stylesheet" href="/css/screens/screen-base.css?v=mpsle3f8" />
  <link rel="stylesheet" href="/css/screens/screens-app.css?v=mpsle3f8" />
</head>
<body>
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale"><option value="fa">فارسی</option><option value="en">English</option></select>
    <select data-theme-picker aria-label="Theme"><option value="system">🖥 System</option><option value="light">☀ Light</option><option value="dark">🌙 Dark</option></select>
  </div>
  <a href="/screens/vocab-learning.html" class="hub-ribbon">‹ Vocab</a>

  <div class="shell">
    <div class="phone">
      <div class="screen">
        <header class="topbar">
          <div class="topbar__leading">
            <a href="/screens/vocab-learning.html" class="btn-icon back-btn" aria-label="Back"></a>
          </div>
          <h1 class="topbar__title" data-i18n="v3.vocabLearning.studyBooksAll"></h1>
          <div></div>
        </header>

        <div class="screen__body">
          <!-- Study books see-all — live from /v1/books, same data and
               visual mapping (BOOK_META) as the carousel on
               vocab-learning.html. Renders into a 2-col grid. -->
          <div class="vocab-book-grid" data-openjam-books>
            <a class="bookcard" style="background:var(--jx-input-bg);min-height:140px;"></a>
            <a class="bookcard" style="background:var(--jx-input-bg);min-height:140px;"></a>
            <a class="bookcard" style="background:var(--jx-input-bg);min-height:140px;"></a>
            <a class="bookcard" style="background:var(--jx-input-bg);min-height:140px;"></a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/screen-shell.js?v=mpsle3f8"></script>
  <script type="module">
    import { BOOK_META } from '/js/vocab-sections.js?v=mpsle3f8';

    async function loadBooks () {
      try {
        const cached = sessionStorage.getItem('openjam_books');
        if (cached) { renderBooks(JSON.parse(cached)); return; }
        const res = await fetch('https://openjam.amirj4m.com/v1/books');
        const data = await res.json();
        const books = data.data || [];
        sessionStorage.setItem('openjam_books', JSON.stringify(books));
        renderBooks(books);
      } catch (err) { console.warn('[openjam] failed to load books', err); }
    }
    function renderBooks (books) {
      const container = document.querySelector('[data-openjam-books]');
      if (!container) return;
      container.innerHTML = books.map(function (b) {
        const meta = BOOK_META[b.slug] || {};
        const variant = meta.variant || 'default';
        return '<a href="/screens/category-words.html?group=' + encodeURIComponent(b.slug) + '"' +
          ' class="bookcard bookcard--' + variant + '">' +
          '<div class="bookcard__head">' +
            '<div class="bookcard__title">' + (meta.brand || b.slug) + '</div>' +
            '<div class="bookcard__sub">' + (meta.sub_cefr || '') + '</div>' +
          '</div>' +
          '<span class="bookcard__pct" data-stat="book-pct">' + (meta.mock_pct || 0) + '%</span>' +
          '<div class="lottie-stage lottie-stage--sm bookcard__lottie" data-lottie="' + (meta.lottie || '') + '"></div>' +
        '</a>';
      }).join('');
    }
    loadBooks();
  </script>
</body>
</html>
