<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00B4A6" />
  <title>Jamlex · Vocab Study Books</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css?v=mprae51b" />
  <link rel="stylesheet" href="/css/base.css?v=mprae51b" />
  <link rel="stylesheet" href="/css/components.css?v=mprae51b" />
  <link rel="stylesheet" href="/css/components/v2-patterns.css?v=mprae51b" />
  <link rel="stylesheet" href="/css/components/popup.css?v=mprae51b" />
  <link rel="stylesheet" href="/css/chrome.css?v=mprae51b" />
  <link rel="stylesheet" href="/css/screens/screen-base.css?v=mprae51b" />
  <link rel="stylesheet" href="/css/screens/screens-app.css?v=mprae51b" />
</head>
<body>
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale"><option value="fa">فارسی</option><option value="en">English</option></select>
    <select data-theme-picker aria-label="Theme"><option value="system">🖥 System</option><option value="light">☀ Light</option><option value="dark">🌙 Dark</option></select>
  </div>
  <a href="/screens/vocab-learning.html" class="hub-ribbon">‹ Vocab</a>

  <div class="shell">
    <div class="phone">
      <div class="screen">
        <header class="topbar">
          <div class="topbar__leading">
            <a href="/screens/vocab-learning.html" class="btn-icon back-btn" aria-label="Back"></a>
          </div>
          <h1 class="topbar__title" data-i18n="v3.vocabLearning.studyBooksAll"></h1>
          <div></div>
        </header>

        <div class="screen__body">
          <!-- Study books see-all — minimal % badge in the top-trailing
               corner of each card. Liquid fill removed 2026-05-29 (the
               brand-tinted backgrounds + a coloured fill looked noisy).
               Values MUST match the carousel on vocab-learning.html.
               TODO(flutter): replace mock progress with the real read:
                 progress = COUNT(book_vocab WHERE graduated=true)
                          / COUNT(book_vocab) × 100 -->
          <div class="vocab-book-grid">
            <a href="/screens/category-words.html" class="bookcard bookcard--ielts">
              <div class="bookcard__head">
                <div class="bookcard__title">IELTS</div>
                <div class="bookcard__sub">B1 - B2</div>
              </div>
              <span class="bookcard__pct" data-stat="book-pct">72%</span>
              <div class="lottie-stage lottie-stage--sm bookcard__lottie" data-lottie="bookcard-ielts"></div>
            </a>
            <a href="/screens/category-words.html" class="bookcard bookcard--504">
              <div class="bookcard__head">
                <div class="bookcard__title" data-i18n="v3.vocabLearning.book.fiveHundredTitle"></div>
                <div class="bookcard__sub">A1 - A2</div>
              </div>
              <span class="bookcard__pct" data-stat="book-pct">45%</span>
              <div class="lottie-stage lottie-stage--sm bookcard__lottie" data-lottie="bookcard-504"></div>
            </a>
            <a href="/screens/category-words.html" class="bookcard bookcard--gre">
              <div class="bookcard__head">
                <div class="bookcard__title">GRE</div>
                <div class="bookcard__sub">C1 - C2</div>
              </div>
              <span class="bookcard__pct" data-stat="book-pct">38%</span>
              <div class="lottie-stage lottie-stage--sm bookcard__lottie" data-lottie="bookcard-gre"></div>
            </a>
            <a href="/screens/category-words.html" class="bookcard bookcard--toefl">
              <div class="bookcard__head">
                <div class="bookcard__title">TOEFL</div>
                <div class="bookcard__sub">B2 - C1</div>
              </div>
              <span class="bookcard__pct" data-stat="book-pct">61%</span>
              <div class="lottie-stage lottie-stage--sm bookcard__lottie" data-lottie="bookcard-toefl"></div>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/screen-shell.js?v=mprae51b"></script>
</body>
</html>
