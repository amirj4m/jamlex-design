<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00B4A6" />
  <title>Jamlex · Vocab Study Books</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css?v=mpr96g30" />
  <link rel="stylesheet" href="/css/base.css?v=mpr96g30" />
  <link rel="stylesheet" href="/css/components.css?v=mpr96g30" />
  <link rel="stylesheet" href="/css/components/v2-patterns.css?v=mpr96g30" />
  <link rel="stylesheet" href="/css/components/popup.css?v=mpr96g30" />
  <link rel="stylesheet" href="/css/chrome.css?v=mpr96g30" />
  <link rel="stylesheet" href="/css/screens/screen-base.css?v=mpr96g30" />
  <link rel="stylesheet" href="/css/screens/screens-app.css?v=mpr96g30" />
</head>
<body>
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale"><option value="fa">فارسی</option><option value="en">English</option></select>
    <select data-theme-picker aria-label="Theme"><option value="system">🖥 System</option><option value="light">☀ Light</option><option value="dark">🌙 Dark</option></select>
  </div>
  <a href="/screens/vocab-learning.html" class="hub-ribbon">‹ Vocab</a>

  <div class="shell">
    <div class="phone">
      <div class="screen">
        <header class="topbar">
          <div class="topbar__leading">
            <a href="/screens/vocab-learning.html" class="btn-icon back-btn" aria-label="Back"></a>
          </div>
          <h1 class="topbar__title" data-i18n="v3.vocabLearning.studyBooksAll"></h1>
          <div></div>
        </header>

        <div class="screen__body">
          <!-- Study books — currently 4 fixed books (IELTS, 504, GRE,
               TOEFL). Laid out 2-up on the see-all page so each card
               has room to breathe + progress bar reads cleanly.
               TODO(flutter): if the catalogue grows, switch to a
               3-col grid and drop the lottie illustrations. -->
          <div class="vocab-book-grid">
            <a href="/screens/category-words.html" class="bookcard bookcard--ielts">
              <div class="bookcard__head">
                <div class="bookcard__title">IELTS</div>
                <div class="bookcard__sub">B1 - B2</div>
              </div>
              <div class="lottie-stage lottie-stage--sm bookcard__lottie" data-lottie="bookcard-ielts"></div>
              <div class="bookcard__progress">
                <span class="bookcard__progress-val" data-i18n="v3.vocabLearning.book.progress"></span>
                <span class="bookcard__progress-pct">72%</span>
              </div>
              <div class="bookcard__bar"><div class="bookcard__bar-fill" style="width:72%;background:#43A047;"></div></div>
            </a>
            <a href="/screens/category-words.html" class="bookcard bookcard--504">
              <div class="bookcard__head">
                <div class="bookcard__title" data-i18n="v3.vocabLearning.book.fiveHundredTitle"></div>
                <div class="bookcard__sub">A1 - A2</div>
              </div>
              <div class="lottie-stage lottie-stage--sm bookcard__lottie" data-lottie="bookcard-504"></div>
              <div class="bookcard__progress">
                <span class="bookcard__progress-val" data-i18n="v3.vocabLearning.book.progress"></span>
                <span class="bookcard__progress-pct">45%</span>
              </div>
              <div class="bookcard__bar"><div class="bookcard__bar-fill" style="width:45%;background:#E53935;"></div></div>
            </a>
            <a href="/screens/category-words.html" class="bookcard bookcard--gre">
              <div class="bookcard__head">
                <div class="bookcard__title">GRE</div>
                <div class="bookcard__sub">C1 - C2</div>
              </div>
              <div class="lottie-stage lottie-stage--sm bookcard__lottie" data-lottie="bookcard-gre"></div>
              <div class="bookcard__progress">
                <span class="bookcard__progress-val" data-i18n="v3.vocabLearning.book.progress"></span>
                <span class="bookcard__progress-pct">38%</span>
              </div>
              <div class="bookcard__bar"><div class="bookcard__bar-fill" style="width:38%;background:#F57C00;"></div></div>
            </a>
            <a href="/screens/category-words.html" class="bookcard bookcard--toefl">
              <div class="bookcard__head">
                <div class="bookcard__title">TOEFL</div>
                <div class="bookcard__sub">B2 - C1</div>
              </div>
              <div class="lottie-stage lottie-stage--sm bookcard__lottie" data-lottie="bookcard-toefl"></div>
              <div class="bookcard__progress">
                <span class="bookcard__progress-val" data-i18n="v3.vocabLearning.book.progress"></span>
                <span class="bookcard__progress-pct">61%</span>
              </div>
              <div class="bookcard__bar"><div class="bookcard__bar-fill" style="width:61%;background:#1976D2;"></div></div>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/screen-shell.js?v=mpr96g30"></script>
</body>
</html>
