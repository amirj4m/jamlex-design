<body>
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale"><option value="fa">فارسی</option><option value="en">English</option></select>

      document.querySelectorAll('.state').forEach(function(s){s.hidden = s.dataset.state !== event.target.value;});

      <option value="edit-name">Edit name</option>
      <option value="edit-username">Edit username</option>
      <option value="edit-email">Edit email</option>
      <option value="edit-phone">Edit phone</option>
      <option value="country">Country picker</option>
    </select>
  </div>

          <h1 class="topbar__title" data-i18n="v3.profile.accountTitle"></h1>
          <div></div>
        </header>

        <div class="screen__body">

               ============================================================ -->

              </span>

               Contact (email / phone / password)
               ============================================================ -->
          <div class="section-label" data-i18n="v3.profile.accountSecContact"></div>

              <span class="setting-item__icon" style="background:rgba(74,144,217,0.16);color:#4A90D9;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><polyline points="3,7 12,13 21,7"/></svg>

            <div class="picker-card" onclick="event.stopPropagation();">

             ============================================================ -->

                <button class="country-row" data-cc="971" data-flag="🇦🇪" data-name="United Arab Emirates"><span class="country-row__flag">🇦🇪</span><span class="country-row__name">UAE · امارات</span><span class="country-row__code font-latin">+971</span></button>
                <button class="country-row" data-cc="90"  data-flag="🇹🇷" data-name="Turkey"><span class="country-row__flag">🇹🇷</span><span class="country-row__name">Turkey · Türkiye</span><span class="country-row__code font-latin">+90</span></button>

                <button class="country-row" data-cc="32"  data-flag="🇧🇪" data-name="Belgium"><span class="country-row__flag">🇧🇪</span><span class="country-row__name">Belgium · België</span><span class="country-row__code font-latin">+32</span></button>

  <script type="module" src="/js/screen-shell.js?v=mpqzbwnw"></script>
  <script type="module">
    import { t, getLocale } from '/js/i18n.js?v=mpqzbwnw';

    function showState (s) {
      document.querySelectorAll('.state').forEach(function (el) { el.hidden = el.dataset.state !== s; });
      var sp = document.getElementById('state-picker'); if (sp) sp.value = s;
    }
    function closeState () {
      document.querySelectorAll('.state').forEach(function (el) { el.hidden = true; });
      var sp = document.getElementById('state-picker'); if (sp) sp.value = 'list';
    }
    document.querySelectorAll('[data-open-state]').forEach(function (btn) {
      btn.addEventListener('click', function () { showState(btn.dataset.openState); });
    });
    document.querySelectorAll('[data-close-state]').forEach(function (el) {
      el.addEventListener('click', function (e) {
        if (el.classList.contains('scrim') && e.target !== el) return;
        closeState();
      });
    });

    // -------- EDIT NAME --------
    document.querySelector('[data-save-name]').addEventListener('click', function () {
      var input = document.querySelector('[data-name-input]');
      var val = (input.value || '').trim();
      if (val.length < 2) {
        window.popupError(getLocale() === 'fa' ? 'حداقل ۲ کاراکتر' : 'Min 2 characters');
        return;
      }
      document.querySelectorAll('[data-profile-name]').forEach(function (n) { n.textContent = val; });
      closeState();
      setTimeout(function () {
        window.showPopup({
          type: 'success',
          titleKey: 'v3.profile.nameSavedTitle',
          message: val,
          confirmKey: 'v3.profile.verifyCta',
          autoDismiss: 0,
        });
      }, 180);
    });

    // -------- EDIT USERNAME (with live uniqueness check) --------
    var TAKEN = ['admin', 'jamlex', 'ali', 'ali.reza', 'reza', 'support', 'tester'];
    var VALID_RE = /^[a-zA-Z0-9_]{3,20}$/;
    function checkUsername (val) {
      var node = document.querySelector('[data-username-check]');
      if (!val) { node.textContent = ''; node.dataset.status = ''; return false; }
      if (!VALID_RE.test(val)) {
        node.textContent = t(val.length < 3 ? 'v3.profile.usernameMin' : 'v3.profile.usernameInvalid');
        node.dataset.status = 'invalid';
        return false;
      }
      if (TAKEN.indexOf(val.toLowerCase()) !== -1) {
        node.textContent = t('v3.profile.usernameTaken');
        node.dataset.status = 'invalid';
        return false;
      }
      node.textContent = '✓ ' + t('v3.profile.usernameAvailable');
      node.dataset.status = 'ok';
      return true;
    }
    var unameInput = document.querySelector('[data-username-input]');
    if (unameInput) {
      unameInput.addEventListener('input', function () { checkUsername(unameInput.value.trim()); });
    }
    document.querySelector('[data-save-username]').addEventListener('click', function () {
      var val = unameInput.value.trim();
      if (!checkUsername(val)) return;
      document.querySelectorAll('[data-profile-username]').forEach(function (n) { n.textContent = '@' + val; });
      closeState();
      setTimeout(function () {
        window.showPopup({
          type: 'success',
          titleKey: 'v3.profile.usernameSavedTitle',
          message: '@' + val,
          confirmKey: 'v3.profile.verifyCta',
          autoDismiss: 0,
        });
      }, 180);
    });

    // -------- EDIT EMAIL (with dual-verify rule) --------
    // The currently-signed-in user has an old email — both old and new
    // get a verification code. If signedUpVia === 'phone', use the
    // phone-only variant of the message.
    var SIGNUP_METHOD = 'email'; // demo: 'email' or 'phone'
    document.querySelector('[data-save-email]').addEventListener('click', function () {
      var input = document.querySelector('[data-email-input]');
      var val = (input.value || '').trim();
      if (!/.+@.+\..+/.test(val)) {
        window.popupError(getLocale() === 'fa' ? 'ایمیل معتبر وارد کن' : 'Enter a valid email');
        return;
      }
      closeState();
      var bodyKey = SIGNUP_METHOD === 'phone' ? 'v3.profile.emailPhoneOnlyVerifyBody' : 'v3.profile.emailDualVerifyBody';
      setTimeout(function () {
        window.showPopup({
          type: 'info',
          titleKey: 'v3.profile.emailDualVerifyTitle',
          messageKey: bodyKey,
          messageHtml: true,
          confirmKey: 'v3.profile.verifyCta',
          autoDismiss: 0,
        });
      }, 180);
    });

    // -------- COUNTRY CODE PICKER --------
    document.querySelector('[data-open-country]').addEventListener('click', function () {
      showState('country');
    });
    document.querySelectorAll('.country-row').forEach(function (row) {
      row.addEventListener('click', function () {
        var cc = row.dataset.cc;
        var flag = row.dataset.flag;
        document.querySelector('[data-cc-flag]').textContent = flag;
        document.querySelector('[data-cc-code]').textContent = '+' + cc;
        showState('edit-phone'); // back to the phone editor
      });
    });

    // -------- EDIT PHONE (SMS verify) --------
    document.querySelector('[data-save-phone]').addEventListener('click', function () {
      var input = document.querySelector('[data-phone-input]');
      var val = (input.value || '').trim();
      var digits = val.replace(/\D/g, '');
      if (digits.length < 7) {
        window.popupError(getLocale() === 'fa' ? 'شماره معتبر وارد کن' : 'Enter a valid phone');
        return;
      }
      var cc = document.querySelector('[data-cc-code]').textContent;
      var full = cc + ' ' + val;
      closeState();
      setTimeout(function () {
        window.showPopup({
          type: 'info',
          titleKey: 'v3.profile.phoneSavedTitle',
          message: t('v3.profile.phoneVerifyBody').replace('{phone}', full),
          messageHtml: true,
          confirmKey: 'v3.profile.verifyCta',
          autoDismiss: 0,
        });
      }, 180);
    });

    // -------- Device-fingerprint country guess (Flutter parity) --------
    // The native app reads the SIM MCC, then falls back to the device
    // locale, then GPS. In the browser preview the best we have is the
    // UI locale, so we pre-select Iran (+98) for fa-IR users and the US
    // (+1) for en users — this is a placeholder; the real detection
    // happens in Flutter.
    (function () {
      var loc = getLocale();
      var guess = loc === 'fa' ? { flag: '🇮🇷', code: '+98' } : { flag: '🇺🇸', code: '+1' };
      var flagEl = document.querySelector('[data-cc-flag]');
      var codeEl = document.querySelector('[data-cc-code]');
      if (flagEl && codeEl && codeEl.textContent.trim() === '') {
        flagEl.textContent = guess.flag;
        codeEl.textContent = guess.code;
      }
    })();
  </script>
</body>
</html>
