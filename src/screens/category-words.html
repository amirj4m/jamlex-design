  <script type="module">
    // ----------------------------------------------------------------
    // category-words.html — per-category lesson list.
    //
    // NEW MODEL (locked 2026-05-29): lessons are no longer generic
    // "Lesson 1, 2, 3, ..." chunks of the group's words. Instead, each
    // row is a REAL openjam sub-category (the `children` array on the
    // group object), with its real Persian + English name.
    //
    // The 50-word rule: a single lesson can NEVER contain more than
    // 50 words. Sub-categories larger than 50 are split into
    //   ceil(word_count / 50)
    // sequentially-numbered chunks ("علم ۱", "علم ۲", … each with up
    // to 50 words, the last with the remainder).
    //
    // Worked examples on real openjam data:
    //   food-drink → food (581) → 12 lessons + drink (132) → 3   = 15
    //   science-tech → science (2077) → 42 + technology (543) → 11 = 53
    //   work-money → work (1275) → 26 + money (586) → 12         = 38
    //
    // 1. Read the openjam group slug from URL: ?group=<slug>.
    // 2. Pull the group + its children from sessionStorage cache
    //    (populated by vocab-learning.html) OR fetch on-the-fly.
    // 3. buildLessons() flattens the children into ≤50-word chunks.
    // 4. Render the lesson rows + the overall-progress ring.
    //
    // Status badge replaces the old checkmark with a letter grade
    // A-E for COMPLETED lessons. Active and locked rows keep their
    // existing progress-circle / lock glyphs.
    // ----------------------------------------------------------------
    import { getLocale } from '/js/i18n.js?v=mpreg55f';
    import { OPENJAM_LESSON_NAMES, findVocabCategoryBySlug } from '/js/vocab-sections.js?v=mpreg55f';

    const params = new URLSearchParams(location.search);
    const slug = params.get('group') || 'food-drink';

    const WORDS_PER_LESSON = 50;

    // Is this slug a synthetic category (Daily Life / Professional)?
    // If yes, we render its hand-crafted lessons directly. If no, we
    // fall through to the openjam fetch + chunking path below.
    const SYNTHETIC = findVocabCategoryBySlug(slug);

    function formatNum (n, locale) {
      return locale === 'fa' ? n.toLocaleString('fa-IR') : n.toLocaleString('en-US');
    }

    async function getGroup () {
      // Synthetic categories shape themselves into the same `group`
      // contract used by the openjam path. Each one becomes a "group"
      // with a single child that holds the hand-crafted lessons (so
      // buildLessons() can map straight through).
      if (SYNTHETIC) {
        return {
          synthetic: true,
          slug: SYNTHETIC.category.slug,
          name_fa: SYNTHETIC.category.name_fa,
          name_en: SYNTHETIC.category.name_en,
          word_count: SYNTHETIC.category.word_count,
          // Stash the hand-crafted lessons so buildLessons() can find them.
          _handCrafted: SYNTHETIC.category.lessons || [],
          children: [{
            slug: SYNTHETIC.category.slug,
            name_fa: SYNTHETIC.category.name_fa,
            name_en: SYNTHETIC.category.name_en,
            word_count: SYNTHETIC.category.word_count,
          }],
        };
      }
      let groups = null;
      try {
        const cached = sessionStorage.getItem('openjam_groups');
        if (cached) groups = JSON.parse(cached);
      } catch (e) { /* ignore */ }
      if (!groups) {
        const res = await fetch('https://openjam.amirj4m.com/v1/categories/groups');
        const data = await res.json();
        groups = data.groups || [];
        try { sessionStorage.setItem('openjam_groups', JSON.stringify(groups)); } catch (e) { /* ignore */ }
      }
      return groups.find(function (g) { return g.slug === slug; }) || groups[0];
    }

    // ----------------------------------------------------------------
    // buildLessons(group) — produce a sequential list of ≤50-word
    // lesson objects. Three paths, in priority order:
    //
    //  1. SYNTHETIC categories (Daily Life / Professional) — the
    //     hand-crafted lessons array IS the lesson list, verbatim.
    //     Every name is meaningful by design ("Kitchen tools",
    //     "Lab & equipment", …) — no chunk-number suffixes.
    //
    //  2. OPENJAM sub-categories with an entry in OPENJAM_LESSON_NAMES
    //     (the showcase map in /js/vocab-sections.js) — use those
    //     hand-crafted names. Each chunk still 50 words, just
    //     thematically named instead of "<name> ۱، <name> ۲".
    //
    //  3. OPENJAM sub-categories WITHOUT a names map — fall back to
    //     numbered chunks ("<name> ۱"). Generic but acceptable until
    //     someone authors names for that sub-cat. The product owner
    //     explicitly called this out as a TODO ("درس‌ها رو نامگذاری‌های
    //     فوق‌العاده بی‌معنی کردی"); the path stays as a temporary
    //     fallback ONLY.
    // ----------------------------------------------------------------
    function buildLessons (group) {
      // Path 1: synthetic category with hand-crafted lessons.
      if (group.synthetic && Array.isArray(group._handCrafted)) {
        return group._handCrafted.map(function (l, idx) {
          return {
            idx: idx + 1,
            parentSlug: group.slug,
            chunk: idx + 1,
            totalChunks: group._handCrafted.length,
            name_fa: l.name_fa,
            name_en: l.name_en,
            word_count: l.word_count,
          };
        });
      }

      // Paths 2 + 3: openjam sub-category tree, with optional names map.
      const lessons = [];
      const children = group.children || [];
      let globalIdx = 1;
      children.forEach(function (child) {
        const total = Math.max(1, Math.ceil(child.word_count / WORDS_PER_LESSON));
        const namesMap = OPENJAM_LESSON_NAMES[child.slug] || null;
        for (let i = 1; i <= total; i++) {
          const isLast = i === total;
          const remaining = child.word_count - WORDS_PER_LESSON * (i - 1);
          const chunkSize = isLast ? remaining : WORDS_PER_LESSON;
          const hasChunks = total > 1;
          let name_fa, name_en;
          if (namesMap && namesMap.fa[i - 1] && namesMap.en[i - 1]) {
            // Path 2: hand-crafted name for this chunk index.
            name_fa = namesMap.fa[i - 1];
            name_en = namesMap.en[i - 1];
          } else {
            // Path 3: fallback to numbered name.
            name_fa = hasChunks ? (child.name_fa + ' ' + formatNum(i, 'fa')) : child.name_fa;
            name_en = hasChunks ? (child.name_en + ' ' + i) : child.name_en;
          }
          lessons.push({
            idx: globalIdx++,
            parentSlug: child.slug,
            chunk: i,
            totalChunks: total,
            name_fa: name_fa,
            name_en: name_en,
            word_count: Math.max(1, chunkSize),
          });
        }
      });
      return lessons;
    }

    // SVG snippets reused per row status
    const LOCK_SVG = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>';
    function activeRingSvg (pct) {
      const dashoffset = 163.4 * (1 - pct / 100);
      return '<svg viewBox="0 0 60 60" fill="none" style="width:30px;height:30px;">' +
        '<circle cx="30" cy="30" r="26" stroke="var(--jx-primary-glow)" stroke-width="6"/>' +
        '<circle cx="30" cy="30" r="26" stroke="var(--jx-primary)" stroke-width="6" stroke-linecap="round" stroke-dasharray="163.4" stroke-dashoffset="' + dashoffset + '" transform="rotate(-90 30 30)"/>' +
        '<text x="30" y="36" text-anchor="middle" font-size="14" font-weight="700" fill="var(--jx-primary)" font-family="Inter">' + pct + '%</text>' +
        '</svg>';
    }

    let currentGroup = null;
    let currentLessons = [];

    function render () {
      if (!currentGroup) return;
      const locale = getLocale();
      const isfa = locale === 'fa';
      const name = isfa ? currentGroup.name_fa : currentGroup.name_en;

      currentLessons = buildLessons(currentGroup);
      const total = currentLessons.length;

      // --- Category indicator
      const indicator = isfa ? 'واژگان ' + name : name + ' words';
      document.querySelector('[data-cat-label]').textContent = indicator;

      // --- Demo state: first 2 lessons done, lesson 3 active at 65%,
      // rest follow the free / locked split.
      const doneCount = Math.min(2, total);
      const activeIdx = doneCount < total ? doneCount + 1 : 0; // 0 = no active row
      const activePct = 65;
      const partialProgress = activeIdx ? activePct / 100 : 0;
      const overallPct = total > 0
        ? Math.round(((doneCount + partialProgress) / total) * 100)
        : 0;

      document.querySelector('[data-overall-pct]').textContent = overallPct + '%';
      document.querySelector('[data-overall-ring]').setAttribute(
        'stroke-dashoffset',
        String(163.4 * (1 - overallPct / 100))
      );
      const ofText = isfa
        ? ('درس ' + formatNum(activeIdx || total, 'fa') + ' از ' + formatNum(total, 'fa'))
        : ('Lesson ' + (activeIdx || total) + ' of ' + total);
      document.querySelector('[data-overall-of]').textContent = ofText;

      // --- Demo grades for done lessons (A then B in rotation).
      // The real grade comes from the user's review performance —
      // formula TBD per product owner. For now: alternating A/B.
      const demoGrades = ['A', 'B'];

      // --- Render lessons.
      // Free tier (per architecture_freemium_strategy.md Wall 4):
      //   Lessons 1-3 are fully unlocked. Lessons 4+ fire the paywall.
      const FREE_LESSONS = 3;
      const rows = [];
      currentLessons.forEach(function (ls, idx) {
        const i = idx + 1;
        let status, grade = '', statusInner;
        let openTag, closeTag, extraAttrs = '', extraInner = '';
        if (i <= doneCount) {
          status = 'done';
          grade = demoGrades[(i - 1) % demoGrades.length];
          statusInner = grade;
          openTag = 'button';
          extraAttrs = ' type="button" data-open-lesson="' + i + '"';
          closeTag = 'button';
        } else if (i === activeIdx) {
          status = 'active';
          statusInner = activeRingSvg(activePct);
          openTag = 'button';
          extraAttrs = ' type="button" data-open-lesson="' + i + '"';
          closeTag = 'button';
        } else if (i <= FREE_LESSONS) {
          status = 'free';
          statusInner = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';
          openTag = 'button';
          extraAttrs = ' type="button" data-open-lesson="' + i + '"';
          closeTag = 'button';
        } else {
          status = 'locked';
          statusInner = LOCK_SVG;
          openTag = 'button';
          extraAttrs = ' type="button" data-locked-lesson="' + i + '"';
          closeTag = 'button';
          extraInner = '<span class="lesson-row__premium-chip" aria-hidden="true">' +
            '<svg width="9" height="9" viewBox="0 0 24 24" fill="currentColor"><path d="M2 4l4 12h12l4-12-6 4-4-8-4 8z"/></svg>' +
          '</span>';
        }
        const gradeAttr = grade ? ' data-grade="' + grade + '"' : '';
        // The leading "num" cell now shows the LESSON'S WORD COUNT —
        // the product owner explicitly asked for the count on each row
        // ("با عدد"). Names come straight from openjam (name_fa over
        // name_en, with the chunk suffix when split).
        const wcLabel = formatNum(ls.word_count, locale);
        const primaryName = isfa ? ls.name_fa : ls.name_en;
        const secondaryName = isfa ? ls.name_en : ls.name_fa;
        rows.push(
          '<' + openTag + ' class="lesson-row" data-status="' + status + '"' + gradeAttr + extraAttrs + '>' +
            '<span class="lesson-row__num">' + wcLabel + '</span>' +
            '<div class="lesson-row__title">' +
              '<div class="lesson-row__name">' + primaryName + '</div>' +
              '<div class="lesson-row__sub">' + secondaryName + '</div>' +
            '</div>' +
            extraInner +
            '<span class="lesson-row__status">' + statusInner + '</span>' +
          '</' + closeTag + '>'
        );
      });
      document.querySelector('[data-lesson-list]').innerHTML = rows.join('');

      // Free / done / active rows → open the modal.
      document.querySelectorAll('[data-open-lesson]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          openLessonModal(parseInt(btn.dataset.openLesson, 10));
        });
      });

      // Premium-walled rows → paywall popup.
      document.querySelectorAll('[data-locked-lesson]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          // TODO(flutter): FirebaseAnalytics.logEvent('add_to_leitner_click_blocked',
          //   { group_slug: slug, lesson_num: parseInt(btn.dataset.lockedLesson, 10), words_in_lesson: K });
          if (window.console) console.log('[analytics] add_to_leitner_click_blocked', btn.dataset.lockedLesson);
          if (window.showPopup) {
            window.showPopup({
              type: 'info',
              titleKey: 'v3.paywall.lesson.title',
              messageKey: 'v3.paywall.lesson.body',
              confirmKey: 'v3.paywall.lesson.cta',
              autoDismiss: 0,
            }).then(function (ok) {
              if (ok !== false) location.href = '/screens/paywall.html';
            });
          }
        });
      });
    }

    // ----------------------------------------------------------------
    // openLessonModal(n) — populates the action sheet for lesson n
    // (1-based global index in currentLessons) and shows it.
    // ----------------------------------------------------------------
    function openLessonModal (n) {
      if (!currentGroup) return;
      const lesson = currentLessons[n - 1];
      if (!lesson) return;
      const locale = getLocale();
      const isfa = locale === 'fa';

      const titleEl = document.querySelector('[data-modal-title]');
      const latinEl = document.querySelector('[data-modal-latin]');
      const countEl = document.querySelector('[data-modal-count]');
      const reviewLink = document.querySelector('[data-review-link]');
      const flashLink = document.querySelector('[data-flashcard-link]');
      const quizLink = document.querySelector('[data-quiz-link]');
      const addBtn = document.querySelector('[data-add-to-leitner]');

      // Title: Persian sub-cat name (with chunk suffix if split) in fa,
      // English name in en. The whole title now matches the row itself,
      // so the user always knows exactly which sub-category they're on.
      if (titleEl) titleEl.textContent = isfa ? lesson.name_fa : lesson.name_en;
      // Sub-line A: the OTHER language name (so both stay visible).
      if (latinEl) {
        latinEl.textContent = isfa ? lesson.name_en : lesson.name_fa;
        latinEl.style.display = '';
      }
      // Sub-line B: word count for this lesson.
      if (countEl) {
        countEl.textContent = isfa
          ? ('تعداد کلمات: ' + formatNum(lesson.word_count, 'fa'))
          : (lesson.word_count + ' words');
      }
      // Three method links carry group + sub + chunk + lesson context.
      // `lesson=N` kept for backward compat with the old query format.
      const qs = '?group=' + encodeURIComponent(slug) +
                 '&sub=' + encodeURIComponent(lesson.parentSlug) +
                 '&chunk=' + lesson.chunk +
                 '&lesson=' + n;
      if (reviewLink) reviewLink.href = '/screens/lesson-words.html' + qs;
      if (flashLink) flashLink.href = '/screens/leitner.html' + qs + '&mode=flashcard';
      if (quizLink) quizLink.href = '/screens/leitner.html' + qs + '&mode=quiz';
      if (addBtn) addBtn.dataset.lessonNum = String(n);

      document.getElementById('state-picker').value = 'modal';
      document.querySelectorAll('.state').forEach(function (s) {
        s.hidden = s.dataset.state !== 'modal';
      });
    }

    // ----------------------------------------------------------------
    // "افزودن به لایتنر" — Flutter wires this to:
    //   INSERT INTO leitner_cards (user_id, word_id, box, due_at, ...)
    //   SELECT :uid, w.id, 1, now(), ...
    //     FROM openjam_words w
    //     JOIN openjam_subcats c ON c.id = w.subcat_id
    //    WHERE c.slug = :sub
    //   ORDER BY w.rank
    //   OFFSET (:chunk - 1) * 50
    //    LIMIT 50
    //   ON CONFLICT DO NOTHING;
    // ----------------------------------------------------------------
    document.addEventListener('click', function (e) {
      const btn = e.target.closest('[data-add-to-leitner]');
      if (!btn) return;
      if (!currentGroup) return;
      const n = parseInt(btn.dataset.lessonNum || '1', 10);
      const lesson = currentLessons[n - 1];
      if (!lesson) return;
      const locale = getLocale();
      const lessonLabel = locale === 'fa' ? lesson.name_fa : lesson.name_en;
      const msg = locale === 'fa'
        ? (formatNum(lesson.word_count, 'fa') + ' لغت از «' + lessonLabel + '» به لایتنر اضافه شد')
        : (lesson.word_count + ' words from "' + lessonLabel + '" added to Leitner');
      // Close the modal before the popup fires.
      document.getElementById('state-picker').value = 'lessons';
      document.querySelectorAll('.state').forEach(function (s) {
        s.hidden = s.dataset.state !== 'lessons';
      });
      window.popupSuccess(msg);
    });

    async function init () {
      try {
        currentGroup = await getGroup();
        render();
      } catch (e) {
        console.warn('[category-words] failed to load group', e);
      }
    }

    document.addEventListener('i18n:changed', render);
    init();
  </script>
</body>
</html>
