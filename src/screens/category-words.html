<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00B4A6" />
  <title>Jamlex · Category Words</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/chrome.css" />
  <link rel="stylesheet" href="/css/screens/screen-base.css" />
  <link rel="stylesheet" href="/css/screens/screens-app.css" />
</head>
<body>
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale"><option value="fa">فارسی</option><option value="en">English</option></select>
    <select data-theme-picker aria-label="Theme"><option value="system">🖥 System</option><option value="light">☀ Light</option><option value="dark">🌙 Dark</option></select>
  </div>
  <a href="/screens/vocab-learning.html" class="hub-ribbon">‹ Categories</a>

  <div class="shell">
    <div class="phone">
      <div class="screen">
        <header class="topbar">
          <div class="topbar__leading">
            <a href="/screens/vocab-learning.html" class="btn-icon back-btn" data-i18n-attr="aria-label:common.back"></a>
          </div>
          <h1 class="topbar__title">🍔 Food</h1>
          <div class="topbar__trailing"></div>
        </header>

        <div class="screen__body">
          <div class="level-chips">
            <span class="chip chip--selectable" data-selected="true" data-i18n="reading.levelAll"></span>
            <span class="chip chip--selectable" data-level="A1">A1</span>
            <span class="chip chip--selectable" data-level="A2">A2</span>
            <span class="chip chip--selectable" data-level="B1">B1</span>
            <span class="chip chip--selectable" data-level="B2">B2</span>
            <span class="chip chip--selectable" data-level="C1">C1</span>
          </div>

          <!-- Phase 1: empty (waiting for openjam) -->
          <div class="empty" style="padding-top:var(--sp-6);">
            <div class="empty__icon">🍔</div>
            <h2 class="empty__title" data-i18n="vocabulary.emptyDB.title"></h2>
            <p class="empty__body" data-i18n="vocabulary.emptyDB.body"></p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/screen-shell.js"></script>
</body>
</html>
