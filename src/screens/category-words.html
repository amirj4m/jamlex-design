<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00B4A6" />
  <title>Jamlex · Category Words</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css?v=mpp2sb43" />
  <link rel="stylesheet" href="/css/base.css?v=mpp2sb43" />
  <link rel="stylesheet" href="/css/components.css?v=mpp2sb43" />
  <link rel="stylesheet" href="/css/components/v2-patterns.css?v=mpp2sb43" />
  <link rel="stylesheet" href="/css/components/popup.css?v=mpp2sb43" />
  <link rel="stylesheet" href="/css/chrome.css?v=mpp2sb43" />
  <link rel="stylesheet" href="/css/screens/screen-base.css?v=mpp2sb43" />
  <link rel="stylesheet" href="/css/screens/screens-app.css?v=mpp2sb43" />
</head>
<body>
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale"><option value="fa">فارسی</option><option value="en">English</option></select>
    <select data-theme-picker aria-label="Theme"><option value="system">🖥 System</option><option value="light">☀ Light</option><option value="dark">🌙 Dark</option></select>
    <select id="state-picker" aria-label="State" onchange="
      document.querySelectorAll('.state').forEach(function(s){s.hidden = s.dataset.state !== event.target.value;});
    ">
      <option value="lessons">Lessons list (free-tier)</option>
      <option value="modal">Lesson action sheet (modal)</option>
    </select>
  </div>
  <a href="/screens/vocab-learning.html" class="hub-ribbon">‹ Vocab</a>

  <div class="shell">
    <div class="phone">
      <div class="screen">
        <header class="topbar">
          <div class="topbar__leading">
            <a href="/screens/vocab-learning.html" class="btn-icon back-btn" aria-label="Back"></a>
          </div>
          <h1 class="topbar__title" style="display:inline-flex;align-items:center;gap:6px;">
            <span style="display:inline-flex;width:28px;height:28px;border-radius:8px;background:rgba(108,92,231,0.16);align-items:center;justify-content:center;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6C5CE7" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></span>
            <span data-i18n="v3.vocabLearning.title"></span>
          </h1>
          <div></div>
        </header>

        <div class="screen__body">
          <div style="text-align:end;color:var(--jx-text-2);font-size:var(--fs-body-s);margin-bottom:var(--sp-3);">
            <span style="display:inline-flex;width:8px;height:8px;border-radius:50%;background:var(--jx-primary);margin-inline-end:6px;"></span>
            <span data-i18n="v3.vocabLearning.category.indicator"></span>
          </div>

          <!-- Progress card with 3D book -->
          <div class="overall-progress">
            <div class="overall-progress__ring">
              <svg viewBox="0 0 60 60" fill="none">
                <circle cx="30" cy="30" r="26" stroke="rgba(0,180,166,0.20)" stroke-width="4"/>
                <circle cx="30" cy="30" r="26" stroke="var(--jx-primary)" stroke-width="4" stroke-linecap="round" stroke-dasharray="163.4" stroke-dashoffset="106" transform="rotate(-90 30 30)"/>
                <text x="30" y="36" text-anchor="middle" font-size="13" font-weight="800" fill="var(--jx-primary)" font-family="Inter">35%</text>
              </svg>
            </div>
            <div style="flex:1;text-align:end;">
              <div style="font-weight:var(--fw-bold);" data-i18n="v3.vocabLearning.category.overall"></div>
              <div style="font-size:var(--fs-body-s);color:var(--jx-text-2);margin-top:2px;" data-i18n="v3.vocabLearning.category.lessonOf"></div>
            </div>
            <div class="lottie-stage lottie-stage--sm" data-lottie="vocab-banner-book" style="margin:0 !important;width:56px !important;height:56px !important;"></div>
          </div>

          <!-- Lessons list -->
          <div class="lesson-list" style="margin-top:var(--sp-4);">
            <a href="/screens/flashcards.html" class="lesson-row" data-status="done">
              <span class="lesson-row__num">1</span>
              <div class="lesson-row__title">
                <div class="lesson-row__name" data-i18n="v3.vocabLearning.category.lessonName1"></div>
                <div class="lesson-row__sub">Lesson 1</div>
              </div>
              <span class="lesson-row__status">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              </span>
            </a>
            <a href="/screens/flashcards.html" class="lesson-row" data-status="done">
              <span class="lesson-row__num">2</span>
              <div class="lesson-row__title">
                <div class="lesson-row__name" data-i18n="v3.vocabLearning.category.lessonName2"></div>
                <div class="lesson-row__sub">Lesson 2</div>
              </div>
              <span class="lesson-row__status">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              </span>
            </a>
            <button class="lesson-row" data-status="active" onclick="
              document.getElementById('state-picker').value='modal';
              document.querySelectorAll('.state').forEach(function(s){s.hidden = s.dataset.state !== 'modal';});
            ">
              <span class="lesson-row__num">3</span>
              <div class="lesson-row__title">
                <div class="lesson-row__name" data-i18n="v3.vocabLearning.category.lessonName3"></div>
                <div class="lesson-row__sub">Lesson 3</div>
              </div>
              <span class="lesson-row__status">
                <svg viewBox="0 0 60 60" fill="none" style="width:30px;height:30px;">
                  <circle cx="30" cy="30" r="26" stroke="var(--jx-primary-glow)" stroke-width="6"/>
                  <circle cx="30" cy="30" r="26" stroke="var(--jx-primary)" stroke-width="6" stroke-linecap="round" stroke-dasharray="163.4" stroke-dashoffset="57" transform="rotate(-90 30 30)"/>
                  <text x="30" y="36" text-anchor="middle" font-size="14" font-weight="700" fill="var(--jx-primary)" font-family="Inter">65%</text>
                </svg>
              </span>
            </button>
            <div class="lesson-row" data-status="locked">
              <span class="lesson-row__num">4</span>
              <div class="lesson-row__title">
                <div class="lesson-row__name" data-i18n="v3.vocabLearning.category.lessonName4"></div>
                <div class="lesson-row__sub">Lesson 4</div>
              </div>
              <span class="lesson-row__status">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
              </span>
            </div>
            <div class="lesson-row" data-status="locked">
              <span class="lesson-row__num">5</span>
              <div class="lesson-row__title">
                <div class="lesson-row__name" data-i18n="v3.vocabLearning.category.lessonName5"></div>
                <div class="lesson-row__sub">Lesson 5</div>
              </div>
              <span class="lesson-row__status">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
              </span>
            </div>
            <div class="lesson-row" data-status="locked">
              <span class="lesson-row__num">6</span>
              <div class="lesson-row__title">
                <div class="lesson-row__name" data-i18n="v3.vocabLearning.category.lessonName6"></div>
                <div class="lesson-row__sub">Lesson 6</div>
              </div>
              <span class="lesson-row__status">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
              </span>
            </div>
          </div>
        </div>

        <!-- Lesson action sheet (modal) -->
        <div class="state" data-state="modal" hidden>
          <div class="scrim" onclick="
            document.getElementById('state-picker').value='lessons';
            document.querySelectorAll('.state').forEach(function(s){s.hidden = s.dataset.state !== 'lessons';});
          ">
            <div class="dialog-card" onclick="event.stopPropagation();" style="max-width:340px;">
              <div class="dialog-card__bell" style="background:var(--jx-primary-glow);color:var(--jx-primary);border-color:var(--jx-bg);">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
              </div>
              <h2 class="dialog-card__title" data-i18n="v3.vocabLearning.category.lessonName1"></h2>
              <p class="dialog-card__sub" data-i18n="v3.vocabLearning.modal.lessonCount"></p>

              <a href="/screens/flashcards.html" class="btn btn--filled btn--block btn--lg" style="margin-top:var(--sp-4);">
                <span style="width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,0.20);display:inline-flex;align-items:center;justify-content:center;">+</span>
                <span data-i18n="v3.vocabLearning.modal.addToLeitner"></span>
              </a>

              <div class="section-h" style="padding-top:var(--sp-3);">
                <div class="section-h__title" style="font-size:var(--fs-body-s);color:var(--jx-text-3);" data-i18n="v3.vocabLearning.modal.pickMethod"></div>
              </div>

              <div style="display:flex;flex-direction:column;gap:var(--sp-2);">
                <a href="/screens/flashcards.html" class="method-row">
                  <span class="method-row__icon" style="background:var(--jx-primary-glow);color:var(--jx-primary);">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                  </span>
                  <div class="method-row__body">
                    <div class="method-row__title" data-i18n="v3.vocabLearning.modal.review"></div>
                    <div class="method-row__sub" data-i18n="v3.vocabLearning.modal.reviewSub"></div>
                  </div>
                  <span class="setting-item__chevron"></span>
                </a>
                <a href="/screens/flashcards.html" class="method-row">
                  <span class="method-row__icon" style="background:rgba(108,92,231,0.16);color:#6C5CE7;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                  </span>
                  <div class="method-row__body">
                    <div class="method-row__title" data-i18n="v3.vocabLearning.modal.flashcard"></div>
                    <div class="method-row__sub" data-i18n="v3.vocabLearning.modal.flashcardSub"></div>
                  </div>
                  <span class="setting-item__chevron"></span>
                </a>
                <a href="/screens/quiz-mcq.html" class="method-row">
                  <span class="method-row__icon" style="background:rgba(255,152,0,0.18);color:#E59A1A;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="3" width="12" height="18" rx="2"/><line x1="10" y1="7" x2="14" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/><line x1="9" y1="15" x2="13" y2="15"/></svg>
                  </span>
                  <div class="method-row__body">
                    <div class="method-row__title" data-i18n="v3.vocabLearning.modal.quiz"></div>
                    <div class="method-row__sub" data-i18n="v3.vocabLearning.modal.quizSub"></div>
                  </div>
                  <span class="setting-item__chevron"></span>
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/screen-shell.js?v=mpp2sb43"></script>
</body>
</html>
