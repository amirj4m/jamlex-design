<body>

    <select data-locale-picker aria-label="Locale"><option value="fa">فارسی</option><option value="en">English</option></select>
    <select data-theme-picker aria-label="Theme"><option value="system">🖥 System</option><option value="light">☀ Light</option><option value="dark">🌙 Dark</option></select>
    <select id="state-picker" aria-label="State" onchange="
      document.querySelectorAll('.state').forEach(function(s){s.hidden = s.dataset.state !== event.target.value;});
    ">
      <option value="lessons">Lessons list (free-tier)</option>
      <option value="modal">Lesson action sheet (modal)</option>
    </select>
  </div>
  <a href="/screens/vocab-learning.html" class="hub-ribbon">‹ Vocab</a>

  <div class="shell">
    <div class="phone">
      <div class="screen">
        <header class="topbar">
          <div class="topbar__leading">
            <a href="/screens/vocab-learning.html" class="btn-icon back-btn" aria-label="Back"></a>

          <h1 class="topbar__title" style="display:inline-flex;align-items:center;gap:6px;">
            <span style="display:inline-flex;width:28px;height:28px;border-radius:8px;background:rgba(108,92,231,0.16);align-items:center;justify-content:center;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6C5CE7" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></span>
            <span data-i18n="v3.vocabLearning.title"></span>
          </h1>
          <div></div>
        </header>

        <div class="screen__body">
          <!-- Category indicator — name comes from the openjam group
               whose slug is in the URL (?group=<slug>). -->
          <div style="text-align:start;color:var(--jx-text-2);font-size:var(--fs-body-s);margin-bottom:var(--sp-3);">
            <span style="display:inline-flex;width:8px;height:8px;border-radius:50%;background:var(--jx-primary);margin-inline-end:6px;"></span>
            <span data-cat-label>…</span>
          </div>

          <!-- Progress card with 3D book — ring + numbers are filled
               from the lesson count formula below. -->
          <div class="overall-progress">
            <div class="overall-progress__ring">
              <svg viewBox="0 0 60 60" fill="none">
                <circle cx="30" cy="30" r="26" stroke="rgba(0,180,166,0.20)" stroke-width="4"/>
                <circle data-overall-ring cx="30" cy="30" r="26" stroke="var(--jx-primary)" stroke-width="4" stroke-linecap="round" stroke-dasharray="163.4" stroke-dashoffset="163.4" transform="rotate(-90 30 30)"/>
                <text data-overall-pct x="30" y="36" text-anchor="middle" font-size="13" font-weight="800" fill="var(--jx-primary)" font-family="Inter">0%</text>
              </svg>
            </div>
            <div style="flex:1;text-align:start;">
              <div style="font-weight:var(--fw-bold);" data-i18n="v3.vocabLearning.category.overall"></div>
              <div data-overall-of style="font-size:var(--fs-body-s);color:var(--jx-text-2);margin-top:2px;">…</div>
            </div>
            <div class="lottie-stage lottie-stage--sm" data-lottie="vocab-banner-book" style="margin:0 !important;width:56px !important;height:56px !important;"></div>
          </div>

          <!-- Lessons list — rendered by JS. The lesson count comes
               from the formula `clamp(5, 15, ceil(words / 220))` so
               food-drink (709) → 5 lessons, science-tech (2613) → 12
               lessons, feelings-qualities (10591) → 15 lessons.
               TODO(flutter): the demo grade letters (A/B/...) are
               placeholders. The real grade comes from the user's
               performance on that lesson — wire to the grading
               formula in architecture_lesson_grading.md once defined. -->
          <div class="lesson-list" data-lesson-list style="margin-top:var(--sp-4);">
            <div class="lesson-row" style="height:64px;border-color:transparent;background:var(--jx-input-bg);"></div>
            <div class="lesson-row" style="height:64px;border-color:transparent;background:var(--jx-input-bg);"></div>
            <div class="lesson-row" style="height:64px;border-color:transparent;background:var(--jx-input-bg);"></div>
            <div class="lesson-row" style="height:64px;border-color:transparent;background:var(--jx-input-bg);"></div>
            <div class="lesson-row" style="height:64px;border-color:transparent;background:var(--jx-input-bg);"></div>
          </div>
        </div>

        <!-- Lesson action sheet (modal) -->
        <div class="state" data-state="modal" hidden>
          <div class="scrim" onclick="
            document.getElementById('state-picker').value='lessons';
            document.querySelectorAll('.state').forEach(function(s){s.hidden = s.dataset.state !== 'lessons';});
          ">
            <div class="dialog-card" onclick="event.stopPropagation();" style="max-width:340px;">

              </div>
              <h2 class="dialog-card__title" data-i18n="v3.vocabLearning.category.lessonName1"></h2>
              <p class="dialog-card__sub" data-i18n="v3.vocabLearning.modal.lessonCount"></p>

              <a href="/screens/leitner.html" class="btn btn--filled btn--block btn--lg" style="margin-top:var(--sp-4);">
                <span style="width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,0.20);display:inline-flex;align-items:center;justify-content:center;">+</span>
                <span data-i18n="v3.vocabLearning.modal.addToLeitner"></span>
              </a>

              <div class="section-h" style="padding-top:var(--sp-3);">
                <div class="section-h__title" style="font-size:var(--fs-body-s);color:var(--jx-text-3);" data-i18n="v3.vocabLearning.modal.pickMethod"></div>
              </div>

              <div style="display:flex;flex-direction:column;gap:var(--sp-2);">
                <a href="/screens/leitner.html" class="method-row">
                  <span class="method-row__icon" style="background:var(--jx-primary-glow);color:var(--jx-primary);">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                  </span>
                  <div class="method-row__body">
                    <div class="method-row__title" data-i18n="v3.vocabLearning.modal.review"></div>
                    <div class="method-row__sub" data-i18n="v3.vocabLearning.modal.reviewSub"></div>
                  </div>
                  <span class="setting-item__chevron"></span>
                </a>
                <a href="/screens/leitner.html" class="method-row">
                  <span class="method-row__icon" style="background:rgba(108,92,231,0.16);color:#6C5CE7;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                  </span>
                  <div class="method-row__body">
                    <div class="method-row__title" data-i18n="v3.vocabLearning.modal.flashcard"></div>
                    <div class="method-row__sub" data-i18n="v3.vocabLearning.modal.flashcardSub"></div>
                  </div>
                  <span class="setting-item__chevron"></span>
                </a>
                <a href="/screens/leitner.html" class="method-row">
                  <span class="method-row__icon" style="background:rgba(255,152,0,0.18);color:#E59A1A;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="3" width="12" height="18" rx="2"/><line x1="10" y1="7" x2="14" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/><line x1="9" y1="15" x2="13" y2="15"/></svg>
                  </span>
                  <div class="method-row__body">
                    <div class="method-row__title" data-i18n="v3.vocabLearning.modal.quiz"></div>
                    <div class="method-row__sub" data-i18n="v3.vocabLearning.modal.quizSub"></div>
                  </div>
                  <span class="setting-item__chevron"></span>
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/screen-shell.js?v=mpqzbwnw"></script>
  <script type="module">
    // ----------------------------------------------------------------
    // category-words.html — dynamic per-category lesson list.
    //
    // 1. Read the openjam group slug from URL: ?group=<slug>.
    // 2. Pull the group's metadata (name + word_count) from sessionStorage
    //    cache (populated by vocab-learning.html) OR fetch on-the-fly.
    // 3. Compute lesson count via:
    //      lessonCount = clamp(5, 15, ceil(word_count / 220))
    //    Worked examples: food-drink (709) → 5, body-health (2013) →
    //    10, science-tech (2613) → 12, sport-action (5448) → 15.
    // 4. Render the lesson rows + the overall-progress ring.
    //
    // Status badge replaces the old checkmark with a letter grade
    // A-E for COMPLETED lessons. Active and locked rows keep their
    // existing progress-circle / lock glyphs.
    // ----------------------------------------------------------------
    import { getLocale } from '/js/i18n.js?v=mpqzbwnw';

    const params = new URLSearchParams(location.search);
    const slug = params.get('group') || 'food-drink';

    function lessonCount (words) {
      return Math.max(5, Math.min(15, Math.ceil(words / 220)));
    }

    function formatNum (n, locale) {
      return locale === 'fa' ? n.toLocaleString('fa-IR') : n.toLocaleString('en-US');
    }

    async function getGroup () {
      let groups = null;
      try {
        const cached = sessionStorage.getItem('openjam_groups');
        if (cached) groups = JSON.parse(cached);
      } catch (e) { /* ignore */ }
      if (!groups) {
        const res = await fetch('https://openjam.amirj4m.com/v1/categories/groups');
        const data = await res.json();
        groups = data.groups || [];
        try { sessionStorage.setItem('openjam_groups', JSON.stringify(groups)); } catch (e) { /* ignore */ }
      }
      return groups.find(function (g) { return g.slug === slug; }) || groups[0];
    }

    // SVG snippets reused per row status
    const LOCK_SVG = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>';
    function activeRingSvg (pct) {
      const dashoffset = 163.4 * (1 - pct / 100);
      return '<svg viewBox="0 0 60 60" fill="none" style="width:30px;height:30px;">' +
        '<circle cx="30" cy="30" r="26" stroke="var(--jx-primary-glow)" stroke-width="6"/>' +
        '<circle cx="30" cy="30" r="26" stroke="var(--jx-primary)" stroke-width="6" stroke-linecap="round" stroke-dasharray="163.4" stroke-dashoffset="' + dashoffset + '" transform="rotate(-90 30 30)"/>' +
        '<text x="30" y="36" text-anchor="middle" font-size="14" font-weight="700" fill="var(--jx-primary)" font-family="Inter">' + pct + '%</text>' +
        '</svg>';
    }

    let currentGroup = null;

    function render () {
      if (!currentGroup) return;
      const locale = getLocale();
      const isfa = locale === 'fa';
      const name = isfa ? currentGroup.name_fa : currentGroup.name_en;
      const total = lessonCount(currentGroup.word_count);

      // --- Category indicator
      const indicator = isfa ? 'واژگان ' + name : name + ' words';
      document.querySelector('[data-cat-label]').textContent = indicator;

      // --- Demo state: 2 lessons done, lesson 3 active at 65%, rest locked
      const doneCount = Math.min(2, total);
      const activeIdx = doneCount < total ? doneCount + 1 : 0; // 0 = no active row
      const activePct = 65;
      const partialProgress = activeIdx ? activePct / 100 : 0;
      const overallPct = Math.round(((doneCount + partialProgress) / total) * 100);

      document.querySelector('[data-overall-pct]').textContent = overallPct + '%';
      document.querySelector('[data-overall-ring]').setAttribute(
        'stroke-dashoffset',
        String(163.4 * (1 - overallPct / 100))
      );
      const ofText = isfa
        ? ('درس ' + formatNum(activeIdx || total, 'fa') + ' از ' + formatNum(total, 'fa'))
        : ('Lesson ' + (activeIdx || total) + ' of ' + total);
      document.querySelector('[data-overall-of]').textContent = ofText;

      // --- Demo grades for done lessons (A then B in rotation).
      // The real grade comes from the user's review performance —
      // formula TBD per product owner. For now: alternating A/B.
      const demoGrades = ['A', 'B'];

      // --- Render lessons
      const rows = [];
      for (let i = 1; i <= total; i++) {
        const numLabel = formatNum(i, locale);
        let status, grade = '', statusInner;
        let openTag, closeTag, extraAttrs = '';
        if (i <= doneCount) {
          status = 'done';
          grade = demoGrades[(i - 1) % demoGrades.length];
          statusInner = grade;
          openTag = 'a';
          extraAttrs = ' href="/screens/leitner.html"';
          closeTag = 'a';
        } else if (i === activeIdx) {
          status = 'active';
          statusInner = activeRingSvg(activePct);
          openTag = 'button';
          extraAttrs = ' type="button" onclick="' +
            "document.getElementById('state-picker').value='modal';" +
            "document.querySelectorAll('.state').forEach(function(s){s.hidden = s.dataset.state !== 'modal';});" +
            '"';
          closeTag = 'button';
        } else {
          status = 'locked';
          statusInner = LOCK_SVG;
          openTag = 'div';
          closeTag = 'div';
        }
        const gradeAttr = grade ? ' data-grade="' + grade + '"' : '';
        const lessonName = isfa ? ('درس ' + numLabel) : ('Lesson ' + i);
        rows.push(
          '<' + openTag + ' class="lesson-row" data-status="' + status + '"' + gradeAttr + extraAttrs + '>' +
            '<span class="lesson-row__num">' + numLabel + '</span>' +
            '<div class="lesson-row__title">' +
              '<div class="lesson-row__name">' + lessonName + '</div>' +
              '<div class="lesson-row__sub">Lesson ' + i + '</div>' +
            '</div>' +
            '<span class="lesson-row__status">' + statusInner + '</span>' +
          '</' + closeTag + '>'
        );
      }
      document.querySelector('[data-lesson-list]').innerHTML = rows.join('');
    }

    async function init () {
      try {
        currentGroup = await getGroup();
        render();
      } catch (e) {
        console.warn('[category-words] failed to load group', e);
      }
    }

    document.addEventListener('i18n:changed', render);
    init();
  </script>
</body>
</html>
