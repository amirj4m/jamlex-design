<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00B4A6" />
  <title>Jamlex · Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/chrome.css" />
  <link rel="stylesheet" href="/css/screens/screen-base.css" />
</head>
<body>
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale">
      <option value="fa">فارسی</option>
      <option value="en">English</option>
    </select>
    <select data-theme-picker aria-label="Theme">
      <option value="system">🖥 System</option>
      <option value="light">☀ Light</option>
      <option value="dark">🌙 Dark</option>
    </select>
  </div>
  <a href="/" class="hub-ribbon">‹ Hub</a>

  <div class="shell">
    <div class="phone">
      <div class="screen">
        <section class="auth-screen">
          <header class="auth-screen__header">
            <!-- intentional: no back-button on root login (it IS the entry) -->
          </header>

          <div class="auth-screen__body">
            <div class="splash__logo" style="width:64px;height:64px;border-radius:16px;font-size:32px;margin:0 auto var(--sp-3);">J</div>
            <div class="auth-screen__title-block">
              <h1 class="auth-screen__title" data-i18n="auth.signInTitle"></h1>
              <p class="auth-screen__subtitle" data-i18n="app.tagline"></p>
            </div>

            <form class="auth-screen__form" autocomplete="on" onsubmit="event.preventDefault(); this.querySelector('button[type=submit]').dataset.state='loading';">
              <div class="field">
                <label class="field__label" for="login-email" data-i18n="auth.email"></label>
                <div class="field__control">
                  <input
                    id="login-email"
                    type="email"
                    name="email"
                    class="field__input"
                    autocomplete="username"
                    autocapitalize="off"
                    inputmode="email"
                    required
                    data-i18n-attr="placeholder:auth.emailPlaceholder"
                  />
                </div>
              </div>

              <div class="field">
                <label class="field__label" for="login-password" data-i18n="auth.password"></label>
                <div class="field__control">
                  <input
                    id="login-password"
                    type="password"
                    name="password"
                    class="field__input field__input--with-slot-end"
                    autocomplete="current-password"
                    required
                    minlength="8"
                    data-i18n-attr="placeholder:auth.passwordPlaceholder"
                  />
                  <button type="button" class="field__slot-end btn-icon btn-icon--sm" aria-label="Show password" onclick="
                    var i = this.parentElement.querySelector('input');
                    i.type = i.type === 'password' ? 'text' : 'password';
                    this.textContent = i.type === 'password' ? '👁' : '🙈';
                  ">👁</button>
                </div>
              </div>

              <div class="row--between">
                <label class="check">
                  <input type="checkbox" class="check__input" name="remember" />
                  <span data-i18n="auth.rememberMe"></span>
                </label>
                <a href="/screens/forgot-password.html" class="fs-body-s" data-i18n="auth.forgotLink"></a>
              </div>

              <button type="submit" class="btn btn--filled btn--block" data-i18n="auth.signInBtn"></button>
            </form>

            <div class="auth-screen__divider"><span data-i18n="common.or"></span></div>

            <a href="#" class="btn btn--social">
              <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.75h3.57c2.08-1.92 3.28-4.74 3.28-8.07z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.75c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/><path fill="#FBBC05" d="M5.84 14.12A6.6 6.6 0 0 1 5.5 12c0-.74.13-1.46.34-2.12V7.04H2.18A11 11 0 0 0 1 12c0 1.77.42 3.45 1.18 4.96l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.04l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z"/></svg>
              <span data-i18n="auth.googleBtn"></span>
            </a>

            <a href="/screens/phone-auth.html" class="btn btn--text btn--block">
              <span>📱</span>
              <span data-i18n="auth.phoneBtn"></span>
            </a>

            <div class="auth-link-row">
              <span data-i18n="auth.noAccountQ"></span>
              <a href="/screens/register.html" data-i18n="auth.signUpBtn"></a>
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <script type="module" src="/js/screen-shell.js"></script>
</body>
</html>
