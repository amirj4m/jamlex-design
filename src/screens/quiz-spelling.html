<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00B4A6" />
  <title>Jamlex · Quiz Spelling</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/chrome.css" />
  <link rel="stylesheet" href="/css/screens/screen-base.css" />
  <link rel="stylesheet" href="/css/screens/screens-app.css" />
</head>
<body>
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale"><option value="fa">فارسی</option><option value="en">English</option></select>
    <select data-theme-picker aria-label="Theme"><option value="system">🖥 System</option><option value="light">☀ Light</option><option value="dark">🌙 Dark</option></select>
  </div>
  <a href="/" class="hub-ribbon">‹ Hub</a>

  <div class="shell">
    <div class="phone">
      <div class="screen">
        <header class="topbar">
          <div class="topbar__leading">
            <a href="/screens/home.html" class="btn-icon back-btn"></a>
          </div>
          <h1 class="topbar__title" data-i18n="quiz.modes.spelling"></h1>
          <div class="topbar__trailing">
            <button class="btn-icon" aria-label="Close">✕</button>
          </div>
        </header>

        <div class="screen__body">
          <div class="fc-counter">2 / 10</div>
          <div class="fc-progress"><div class="fc-progress__bar" style="width:20%"></div></div>

          <div class="qprompt mt-5">
            <div class="qprompt__copy" data-i18n="quiz.prompts.spelling"></div>
            <div class="qprompt__word">تاب‌آوری</div>
            <button class="audio-btn qprompt__audio" data-audio="resilience" aria-label="Play">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg>
            </button>
          </div>

          <div class="field mt-5">
            <label class="field__label" data-i18n="quiz.answerInEnglish"></label>
            <input type="text" class="field__input" style="direction:ltr;text-align:start;font-family:var(--font-family-latin);font-size:20px;" autocapitalize="none" autocomplete="off" placeholder="resilience" />
            <div class="field__help">Levenshtein-tolerant — یه typo قبول می‌شه</div>
          </div>

          <button class="btn btn--filled btn--block mt-5" data-i18n="quiz.checkBtn"></button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/screen-shell.js"></script>
</body>
</html>
