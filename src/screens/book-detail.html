<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0F4C40" />
  <title>Jamlex · Book Detail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css?v=mpp2dstt" />
  <link rel="stylesheet" href="/css/base.css?v=mpp2dstt" />
  <link rel="stylesheet" href="/css/components.css?v=mpp2dstt" />
  <link rel="stylesheet" href="/css/components/v2-patterns.css?v=mpp2dstt" />
  <link rel="stylesheet" href="/css/components/popup.css?v=mpp2dstt" />
  <link rel="stylesheet" href="/css/chrome.css?v=mpp2dstt" />
  <link rel="stylesheet" href="/css/screens/screen-base.css?v=mpp2dstt" />
  <link rel="stylesheet" href="/css/screens/screens-app.css?v=mpp2dstt" />
</head>
<body data-library-screen="book-detail">
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale"><option value="fa">فارسی</option><option value="en">English</option></select>
    <select data-theme-picker aria-label="Theme"><option value="system">🖥 System</option><option value="light">☀ Light</option><option value="dark">🌙 Dark</option></select>
  </div>
  <a href="/screens/reading.html" class="hub-ribbon">‹ Library</a>

  <div class="shell">
    <div class="phone">
      <div class="screen">
        <!-- Green hero -->
        <section class="bd-hero">
          <div class="bd-hero__deco bd-hero__deco--1"></div>
          <div class="bd-hero__deco bd-hero__deco--2"></div>
          <div class="bd-hero__deco bd-hero__deco--3"></div>

          <header class="bd-hero__top">
            <a href="/screens/reading.html" class="btn-icon back-btn bd-hero__icon" aria-label="Back"></a>
            <div></div>
            <div class="bd-hero__top-trailing">
              <a href="#" class="btn-icon bd-hero__icon" aria-label="Save">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
              </a>
            </div>
          </header>

          <!-- Cover LEFT, info RIGHT — locked LTR -->
          <div class="bd-hero__body" dir="ltr">
            <div class="bd-cover" data-bd-cover>
              <div class="bd-cover__title" data-bd-cover-title></div>
            </div>
            <div class="bd-info">
              <h1 class="bd-info__title" data-bd-title></h1>
              <p class="bd-info__edition" data-bd-edition></p>
              <div class="bd-chip">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>
                <span data-bd-author></span>
              </div>
              <div class="bd-chip">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                <span data-bd-publisher>Standard Ebooks</span>
              </div>
            </div>
          </div>

          <!-- Meta row: language | level | year -->
          <div class="bd-meta">
            <div class="bd-meta__cell">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15 15 0 0 1 4 10 15 15 0 0 1-4 10 15 15 0 0 1-4-10 15 15 0 0 1 4-10z"/></svg>
              <span><span data-i18n="v3.bookDetail.language"></span>: <span data-bd-lang></span></span>
            </div>
            <div class="bd-meta__cell">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
              <span><span data-i18n="v3.bookDetail.level"></span>: <span data-bd-level></span></span>
            </div>
            <div class="bd-meta__cell">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              <span><span data-i18n="v3.bookDetail.year"></span>: <span data-bd-year class="font-latin"></span></span>
            </div>
          </div>
        </section>

        <!-- 3-cell stat card overlapping the bottom of the hero -->
        <div class="bd-stats bd-stats--3">
          <div class="bd-stat">
            <div class="bd-stat__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div>
            <div class="bd-stat__val" data-bd-chapters></div>
            <div class="bd-stat__label" data-i18n="v3.bookDetail.chapters"></div>
          </div>
          <div class="bd-stat">
            <div class="bd-stat__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
            <div class="bd-stat__val" data-bd-studytime></div>
            <div class="bd-stat__label" data-i18n="v3.bookDetail.readingTime"></div>
          </div>
          <div class="bd-stat">
            <div class="bd-stat__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
            <div class="bd-stat__val" data-bd-progress></div>
            <div class="bd-stat__label" data-i18n="v3.bookDetail.progress"></div>
          </div>
        </div>

        <!-- About this book -->
        <div class="bd-about">
          <h2 class="bd-about__title" data-i18n="v3.bookDetail.aboutTitle"></h2>
          <p class="bd-about__body" data-bd-about></p>
        </div>

        <!-- CTAs: continue reading (online) + download (offline) -->
        <div class="bd-cta">
          <a href="/screens/book-reader.html" class="btn btn--filled btn--block btn--lg">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            <span data-i18n="v3.bookDetail.continueRead"></span>
          </a>
          <button type="button" class="btn btn--filled btn--block btn--lg" onclick="
            window.popupSuccess(null, { messageKey: 'v3.bookDetail.downloadSuccess' });
          ">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            <span data-i18n="v3.bookDetail.downloadBook"></span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/screen-shell.js?v=mpp2dstt"></script>
  <script type="module">
    import { findBook, FEATURED, localizeNum, formatYear } from '/data/books.js?v=mpp2dstt';
    import { applyToDom, t } from '/js/i18n.js?v=mpp2dstt';

    const LEVEL_LABEL_FA = { A1:'مبتدی', A2:'پایه', B1:'متوسط', B2:'فوق‌متوسط', C1:'پیشرفته', C2:'مسلط' };
    const LEVEL_LABEL_EN = { A1:'Beginner', A2:'Elementary', B1:'Intermediate', B2:'Upper-Int.', C1:'Advanced', C2:'Mastery' };

    const params = new URLSearchParams(location.search);
    const id = params.get('id') || 'pride-and-prejudice';
    const book = findBook(id) || FEATURED[0];

    function paint () {
      const lang = document.documentElement.lang || 'en';
      const levelMap = lang === 'fa' ? LEVEL_LABEL_FA : LEVEL_LABEL_EN;

      const cover = document.querySelector('[data-bd-cover]');
      cover.style.background = book.cover;
      document.querySelector('[data-bd-cover-title]').textContent = book.title;

      document.querySelector('[data-bd-title]').textContent = book.title;
      document.querySelector('[data-bd-edition]').textContent = `${formatYear(book.year)} · Standard Ebooks`;
      document.querySelector('[data-bd-author]').textContent = book.author;

      document.querySelector('[data-bd-lang]').textContent = t('v3.bookDetail.languageEn');
      document.querySelector('[data-bd-level]').textContent = levelMap[book.level] || book.level;
      document.querySelector('[data-bd-year]').textContent = formatYear(book.year);

      const chapters = Math.max(6, Math.round(book.pages / 30));
      const lessons  = Math.round(book.pages / 4);
      const minutes  = Math.round(book.pages * 3);
      const hours = Math.floor(minutes / 60);
      const mins  = minutes % 60;
      document.querySelector('[data-bd-chapters]').textContent  = localizeNum(chapters);
      document.querySelector('[data-bd-lessons]').textContent   = localizeNum(lessons);
      document.querySelector('[data-bd-studytime]').textContent = `${localizeNum(hours)}h ${localizeNum(mins)}m`;
      document.querySelector('[data-bd-progress]').textContent  = `${localizeNum(0)}%`;

      document.querySelector('[data-bd-about]').textContent = t('v3.bookDetail.aboutSampleBody');

      applyToDom(document);
    }

    document.addEventListener('i18n:changed', paint);
  </script>
</body>
</html>
