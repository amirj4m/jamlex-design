<body>
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale"><option value="fa">فارسی</option><option value="en">English</option></select>

  </div>
  <a href="/" class="hub-ribbon">‹ Hub</a>

    <div class="phone">
      <div class="screen">
        <header class="topbar topbar--transparent">
          <div class="topbar__leading"></div>
          <h1 class="topbar__title" style="display:inline-flex;align-items:center;gap:6px;">

            <div class="section-h__title" data-i18n="v3.vocabLearning.byLevel"></div>

            <button class="lvl-chip lvl-chip--c1" style="background:#FCE4E4;color:#C62828;">
              <span style="font-size:18px;font-weight:800;font-family:var(--font-family-latin);">C1</span>

            </button>
            <button class="lvl-chip lvl-chip--b2" style="background:#FCEEDC;color:#E65100;">

              <span data-i18n="v3.vocabLearning.level.B2Label"></span>
            </button>
            <button class="lvl-chip lvl-chip--b1" style="background:#E3F2FD;color:#1565C0;">

            <button class="lvl-chip lvl-chip--a2" style="background:#E0F2F1;color:#00897B;">

              <span data-i18n="v3.vocabLearning.level.A1Label"></span>

              <div class="bookcard__bar"><div class="bookcard__bar-fill" style="width:38%;background:#F57C00;"></div></div>
            </a>
            <a href="/screens/category-words.html" class="bookcard bookcard--toefl">
