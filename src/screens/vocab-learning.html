  <meta name="theme-color" content="#00B4A6" />

</head>
<body>
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale"><option value="fa">فارسی</option><option value="en">English</option></select>
    <select data-theme-picker aria-label="Theme"><option value="system">🖥 System</option><option value="light">☀ Light</option><option value="dark">🌙 Dark</option></select>
  </div>
  <a href="/" class="hub-ribbon">‹ Hub</a>

  <div class="shell">
    <div class="phone">
      <div class="screen">
        <header class="topbar topbar--transparent">
          <div class="topbar__leading"></div>
          <h1 class="topbar__title" style="display:inline-flex;align-items:center;gap:6px;">
            <span style="display:inline-flex;width:28px;height:28px;border-radius:8px;background:rgba(108,92,231,0.16);align-items:center;justify-content:center;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6C5CE7" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            </span>
            <span data-i18n="v3.vocabLearning.title"></span>
          </h1>
          <div></div>
        </header>

        <div class="screen__body">
          <div class="search-input">
            <span class="search-input__icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16" y2="16"/></svg>
            </span>
            <input type="search" data-i18n-attr="placeholder:v3.vocabLearning.searchPlaceholder" />
          </div>

          <!-- ============================================================
               New layout (locked 2026-05-29): three horizontal rows in
               this order — topic groups, levels, study books. Same
               library-style "see all" pattern as reading.html. The
               levels strip is horizontal-by-default with 5 chips, so
               no see-all is needed there.
               ============================================================ -->

          <!-- 1. واژگان موضوعی (topic groups) — horizontal scroll + see-all -->
          <div class="section-h">
            <div class="section-h__title" data-i18n="v3.vocabLearning.topicWords"></div>
            <a href="/screens/vocab-categories-all.html" class="section-h__action" data-i18n="v3.vocabLearning.seeAll"></a>
          </div>
          <!-- TODO(flutter): the 12 main groups are pulled live from
               openjam. See architecture_openjam.md for the integration
               contract. The cat-h-scroll renders horizontally. -->
          <div class="cat-h-scroll" data-openjam-groups>
            <a class="cat-disc" style="background:var(--jx-input-bg);min-height:96px;"></a>
            <a class="cat-disc" style="background:var(--jx-input-bg);min-height:96px;"></a>
            <a class="cat-disc" style="background:var(--jx-input-bg);min-height:96px;"></a>
            <a class="cat-disc" style="background:var(--jx-input-bg);min-height:96px;"></a>
          </div>

          <!-- 2. یادگیری بر اساس سطح (CEFR levels) — horizontal chip strip -->
          <div class="section-h">
            <div class="section-h__title" data-i18n="v3.vocabLearning.byLevel"></div>
          </div>
          <!-- CEFR level chips — minimal % badge under each chip's
               label. Liquid fill removed 2026-05-29 because chips have
               tinted backgrounds and a coloured fill on top of a
               coloured base looked noisy. The number is the only
               progress signal here.
               TODO(flutter): replace literal MOCK % with the same
               word-ID-intersection formula used everywhere (see
               architecture_openjam.md § "Word-ID-based progress"):
                 progress(level) = |level.word_ids ∩ graduated_word_ids|
                                 / |level.word_ids| × 100
               Hidden when |level.word_ids ∩ graduated| = 0.
               REMEMBER: a word_id counts for the level even when it
               was graduated through a category or book — graduation
               is per-word, never per-container. -->
          <!-- CEFR chips are now <a> links — each chip navigates to
               category-words.html?group=level-<X>, which fetches
               /v1/words?level=<X>&limit=1 to count and renders a list
               of 50-word lessons named "درس ۱، درس ۲…" (numbered
               naming is explicitly accepted here per product owner,
               since words at one level have no thematic grouping). -->
          <div class="level-chips" style="display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;">
            <a href="/screens/category-words.html?group=level-C1" class="lvl-chip lvl-chip--c1" style="background:#FCE4E4;color:#C62828;text-decoration:none;">
              <span style="font-size:18px;font-weight:800;font-family:var(--font-family-latin);">C1</span>
              <span data-i18n="v3.vocabLearning.level.C1Label"></span>
              <span class="lvl-chip__pct" data-stat="level-pct">8%</span>
            </a>
            <a href="/screens/category-words.html?group=level-B2" class="lvl-chip lvl-chip--b2" style="background:#FCEEDC;color:#E65100;text-decoration:none;">
              <span style="font-size:18px;font-weight:800;font-family:var(--font-family-latin);">B2</span>
              <span data-i18n="v3.vocabLearning.level.B2Label"></span>
              <span class="lvl-chip__pct" data-stat="level-pct">22%</span>
            </a>
            <a href="/screens/category-words.html?group=level-B1" class="lvl-chip lvl-chip--b1" style="background:#E3F2FD;color:#1565C0;text-decoration:none;">
              <span style="font-size:18px;font-weight:800;font-family:var(--font-family-latin);">B1</span>
              <span data-i18n="v3.vocabLearning.level.B1Label"></span>
              <span class="lvl-chip__pct" data-stat="level-pct">45%</span>
            </a>
            <a href="/screens/category-words.html?group=level-A2" class="lvl-chip lvl-chip--a2" style="background:#E0F2F1;color:#00897B;text-decoration:none;">
              <span style="font-size:18px;font-weight:800;font-family:var(--font-family-latin);">A2</span>
              <span data-i18n="v3.vocabLearning.level.A2Label"></span>
              <span class="lvl-chip__pct" data-stat="level-pct">68%</span>
            </a>
            <a href="/screens/category-words.html?group=level-A1" class="lvl-chip lvl-chip--a1" style="background:#E0F2EC;color:#1F9389;text-decoration:none;">
              <span style="font-size:18px;font-weight:800;font-family:var(--font-family-latin);">A1</span>
              <span data-i18n="v3.vocabLearning.level.A1Label"></span>
              <span class="lvl-chip__pct" data-stat="level-pct">92%</span>
            </a>
          </div>

          <!-- 3. کتاب‌های آموزشی (study books) — moved 2026-05-29 to
               sit between CEFR levels and the synthetic sections, per
               product owner. -->
          <div class="section-h">
            <div class="section-h__title" data-i18n="v3.vocabLearning.studyBooks"></div>
            <a href="/screens/vocab-books-all.html" class="section-h__action" data-i18n="v3.vocabLearning.seeAll"></a>
          </div>
          <!-- Study books — pulled live from openjam at
               GET /v1/books. Each entry has slug + name_fa + word_count
               + has_groups + group_label_fa. The JS below caches the
               list in sessionStorage and maps every slug to its visual
               variant via BOOK_META (vocab-sections.js). -->
          <div class="vocab-book-h-scroll" data-openjam-books>
            <a class="bookcard" style="background:var(--jx-input-bg);min-height:140px;flex:none;width:180px;"></a>
            <a class="bookcard" style="background:var(--jx-input-bg);min-height:140px;flex:none;width:180px;"></a>
            <a class="bookcard" style="background:var(--jx-input-bg);min-height:140px;flex:none;width:180px;"></a>
            <a class="bookcard" style="background:var(--jx-input-bg);min-height:140px;flex:none;width:180px;"></a>
          </div>

          <!-- 4. واژگان روزمره (Daily Life — synthetic section) -->
          <div class="section-h">
            <div class="section-h__title" data-i18n="v3.vocabLearning.daily.title"></div>
          </div>
          <div class="cat-h-scroll" data-synthetic-section="daily">
            <a class="cat-disc" style="background:var(--jx-input-bg);min-height:96px;"></a>
            <a class="cat-disc" style="background:var(--jx-input-bg);min-height:96px;"></a>
            <a class="cat-disc" style="background:var(--jx-input-bg);min-height:96px;"></a>
            <a class="cat-disc" style="background:var(--jx-input-bg);min-height:96px;"></a>
          </div>

          <!-- 5. واژگان حرفه‌ای (Professional — synthetic section) -->
          <div class="section-h">
            <div class="section-h__title" data-i18n="v3.vocabLearning.professional.title"></div>
          </div>
          <div class="cat-h-scroll" data-synthetic-section="professional">
            <a class="cat-disc" style="background:var(--jx-input-bg);min-height:96px;"></a>
            <a class="cat-disc" style="background:var(--jx-input-bg);min-height:96px;"></a>
            <a class="cat-disc" style="background:var(--jx-input-bg);min-height:96px;"></a>
            <a class="cat-disc" style="background:var(--jx-input-bg);min-height:96px;"></a>
          </div>

          <!-- Stats footer card retired 2026-05-29 — product owner asked
               to delete it entirely ("کلاً پاک کن کلاً بندازی سطل
               آشغال"). The same numbers (total learned, today, daily
               goal) live on the Stats screen now. Do not re-introduce
               the card here unless explicitly asked. -->
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/screen-shell.js?v=mpsm5936"></script>
  <script type="module">
    // ----------------------------------------------------------------
    // openjam categories — live fetch of the 12 main groups.
    // Endpoint: GET https://openjam.amirj4m.com/v1/categories/groups
    // No auth, CORS open, returns { groups: [{ slug, name_en, name_fa,
    // word_count, children: [...] }, ...] }.
    //
    // We pull this at runtime and template the 12 tiles. Result is
    // cached in sessionStorage so locale-switching doesn't refetch.
    // TODO(flutter): replace the fetch with the hybrid local-DB read
    // from openjam/INTEGRATION.md (one-time download → SQLite cache).
    // ----------------------------------------------------------------
    import { getLocale } from '/js/i18n.js?v=mpsm5936';
    import { VOCAB_SECTIONS, BOOK_META } from '/js/vocab-sections.js?v=mpsm5936';

    // ----------------------------------------------------------------
    // STUDY BOOKS — live from openjam at /v1/books.
    // Each book's slug is the link param; category-words.html knows
    // how to fetch /v1/books/<slug> for the per-book lesson list.
    // ----------------------------------------------------------------
    async function loadBooks () {
      try {
        const cached = sessionStorage.getItem('openjam_books');
        if (cached) { renderBooks(JSON.parse(cached)); return; }
        const res = await fetch('https://openjam.amirj4m.com/v1/books');
        const data = await res.json();
        const books = data.data || [];
        sessionStorage.setItem('openjam_books', JSON.stringify(books));
        renderBooks(books);
      } catch (err) {
        console.warn('[openjam] failed to load books', err);
      }
    }

    function renderBooks (books) {
      const container = document.querySelector('[data-openjam-books]');
      if (!container) return;
      container.innerHTML = books.map(function (b) {
        const meta = BOOK_META[b.slug] || {};
        const variant = meta.variant || 'default';
        const brand = meta.brand || b.slug;
        const sub = meta.sub_cefr || '';
        const pct = meta.mock_pct || 0;
        const lottie = meta.lottie || '';
        return '<a href="/screens/category-words.html?group=' + encodeURIComponent(b.slug) + '"' +
          ' class="bookcard bookcard--' + variant + '">' +
          '<div class="bookcard__head">' +
            '<div class="bookcard__title">' + brand + '</div>' +
            '<div class="bookcard__sub">' + sub + '</div>' +
          '</div>' +
          '<span class="bookcard__pct" data-stat="book-pct">' + pct + '%</span>' +
          '<div class="lottie-stage lottie-stage--sm bookcard__lottie" data-lottie="' + lottie + '"></div>' +
        '</a>';
      }).join('');
    }
    loadBooks();

    // ----------------------------------------------------------------
    // SYNTHETIC SECTIONS (Daily Life · Professional)
    // Locked 2026-05-29. Categories come from /js/vocab-sections.js
    // (jamlex-curated word sets that share word_ids with openjam, per
    // the cross-set progress rule in architecture_openjam.md). Same
    // .cat-disc visual as the openjam topic strip.
    //
    // Mock progress percentages here are placeholders. Flutter computes
    // per-category mastery with the same word-ID intersection formula:
    //   progress(cat) = |cat.word_ids ∩ user.graduated_word_ids|
    //                 / |cat.word_ids| × 100
    // ----------------------------------------------------------------
    const SYNTHETIC_MOCK_PROGRESS = {
      // Daily life
      'cooking': 41, 'shopping': 22, 'home-family': 58, 'exercise': 33,
      'travel': 17, 'fashion': 8,  'transport': 25,
      // Professional
      'science': 19, 'technology': 12, 'medicine': 31, 'business': 28,
      'law': 5,    'higher-ed': 47, 'arts': 14,
    };

    function renderSyntheticSection (sectionKey) {
      const section = VOCAB_SECTIONS[sectionKey];
      const container = document.querySelector('[data-synthetic-section="' + sectionKey + '"]');
      if (!section || !container) return;
      const locale = getLocale();
      const isfa = locale === 'fa';
      const wordLabel = isfa ? 'واژه' : 'words';

      container.innerHTML = section.categories.map(function (cat) {
        const name = isfa ? cat.name_fa : cat.name_en;
        const count = isfa
          ? cat.word_count.toLocaleString('fa-IR')
          : cat.word_count.toLocaleString('en-US');
        const progress = SYNTHETIC_MOCK_PROGRESS[cat.slug] || 0;
        // Liquid fill colour = app's brand turquoise (same rule as openjam).
        const fillStyle = '--progress:' + progress + '%;--progress-color:var(--jx-primary);';
        return '<a href="/screens/category-words.html?group=' + encodeURIComponent(cat.slug) + '"' +
          ' class="cat-disc" data-progress="' + progress + '" style="' + fillStyle + '">' +
          '<span class="cat-disc__icon" style="background:' + cat.tint.bg + ';color:' + cat.tint.fg + ';">' + cat.icon + '</span>' +
          '<span class="cat-disc__name">' + name + '</span>' +
          '<span class="cat-disc__count">' + count + ' ' + wordLabel + '</span>' +
        '</a>';
      }).join('');
    }

    function renderAllSynthetic () {
      renderSyntheticSection('daily');
      renderSyntheticSection('professional');
    }
    renderAllSynthetic();
    document.addEventListener('i18n:changed', renderAllSynthetic);

    // Per-group glyph + soft tint. 12 distinct colour-coded tiles so
    // each main group is visually distinguishable at a glance.
    const ICONS = {
      'food-drink':         '🍔',
      'people-family':      '👨‍👩‍👧',
      'body-health':        '💪',
      'nature-animals':     '🌿',
      'home-objects':       '🏠',
      'places-travel':      '✈️',
      'work-money':         '💼',
      'society-culture':    '🎭',
      'science-tech':       '🔬',
      'sport-action':       '⚽',
      'feelings-qualities': '😊',
      'time-learning':      '⏳',
    };
    const TINTS = {
      'food-drink':         { bg: '#FFF3E0', fg: '#E65100' },
      'people-family':      { bg: '#F3E5F5', fg: '#6A1B9A' },
      'body-health':        { bg: '#FCE4E4', fg: '#C62828' },
      'nature-animals':     { bg: '#E0F2E0', fg: '#2E7D32' },
      'home-objects':       { bg: '#FFF8E1', fg: '#B27A12' },
      'places-travel':      { bg: '#E3F2FD', fg: '#1565C0' },
      'work-money':         { bg: '#E8EAF6', fg: '#283593' },
      'society-culture':    { bg: '#FCE4EC', fg: '#C2185B' },
      'science-tech':       { bg: '#E0F7FA', fg: '#00838F' },
      'sport-action':       { bg: '#F1F8E9', fg: '#558B2F' },
      'feelings-qualities': { bg: '#FFECB3', fg: '#B27A12' },
      'time-learning':      { bg: '#E0F2F1', fg: '#00695C' },
    };

    // Mock per-category mastery (0-100) for the design preview only.
    // Spread covers a deliberate range so reviewers see how varied
    // fills read at a glance.
    //
    // TODO(flutter): replace with the WORD-ID-INTERSECTION formula
    // documented in architecture_openjam.md (§ "Word-ID-based progress").
    //
    //   progress(group) = |group.word_ids ∩ user.graduated_word_ids|
    //                   / |group.word_ids|
    //                   × 100
    //
    // Graduation is tracked per word_id GLOBALLY, never per
    // (word_id × container). When the user graduates a word inside
    // ANY container (category, level, book, lesson), the same word_id
    // counts for every other container it belongs to. This is the
    // whole point of the model: finishing "خانواده" automatically
    // lights up the % on the 504 book without the user opening it.
    // Same rule fires on the .lvl-chip__pct and .bookcard__pct values
    // — different membership set X, identical intersection formula.
    // The product owner forbade a "%" label on the tile (locked
    // 2026-05-29) — colour fill height only.
    const MOCK_PROGRESS = {
      'food-drink':         28,
      'people-family':      62,
      'body-health':        45,
      'nature-animals':     91,
      'home-objects':       18,
      'places-travel':      73,
      'work-money':         52,
      'society-culture':    8,
      'science-tech':       36,
      'sport-action':       80,
      'feelings-qualities': 14,
      'time-learning':      55,
    };

    function formatCount (n, locale) {
      return locale === 'fa'
        ? n.toLocaleString('fa-IR')
        : n.toLocaleString('en-US');
    }

    function render (groups) {
      const container = document.querySelector('[data-openjam-groups]');
      if (!container) return;
      const locale = getLocale();
      const wordLabel = locale === 'fa' ? 'واژه' : 'words';
      // Horizontal-scroll discs (library pattern). Each disc is a
      // compact tile with a glyph in a tinted circle, the group name,
      // and the word count. The full list lives at
      // /screens/vocab-categories-all.html as a 3-column grid.
      container.innerHTML = groups.map(function (g) {
        const tint = TINTS[g.slug] || { bg: 'var(--jx-input-bg)', fg: 'var(--jx-text)' };
        const icon = ICONS[g.slug] || '📖';
        const name = locale === 'fa' ? g.name_fa : g.name_en;
        const count = formatCount(g.word_count, locale);
        // data-progress carries the raw 0-100 number for Flutter to
        // override; the two custom props drive the liquid fill pseudo
        // elements in screens-app.css (.cat-disc::before / ::after).
        // Fill colour is the BRAND turquoise on every tile (locked
        // 2026-05-29) — the product owner wanted all categories to
        // fill with the app's own colour, not their per-category
        // tints. The icon tile keeps its per-category tint to stay
        // visually distinguishable.
        const progress = MOCK_PROGRESS[g.slug] || 0;
        const fillStyle = '--progress:' + progress + '%;--progress-color:var(--jx-primary);';
        return '<a href="/screens/category-words.html?group=' + encodeURIComponent(g.slug) + '"' +
          ' class="cat-disc" data-progress="' + progress + '" style="' + fillStyle + '">' +
          '<span class="cat-disc__icon" style="background:' + tint.bg + ';color:' + tint.fg + ';">' + icon + '</span>' +
          '<span class="cat-disc__name">' + name + '</span>' +
          '<span class="cat-disc__count">' + count + ' ' + wordLabel + '</span>' +
        '</a>';
      }).join('');
    }

    let cachedGroups = null;
    async function load () {
      try {
        const cached = sessionStorage.getItem('openjam_groups');
        if (cached) {
          cachedGroups = JSON.parse(cached);
          render(cachedGroups);
          return;
        }
        const res = await fetch('https://openjam.amirj4m.com/v1/categories/groups');
        if (!res.ok) throw new Error('http ' + res.status);
        const data = await res.json();
        cachedGroups = data.groups || [];
        sessionStorage.setItem('openjam_groups', JSON.stringify(cachedGroups));
        render(cachedGroups);
      } catch (err) {
        // Leave the skeleton; the next tab open will retry.
        console.warn('[openjam] failed to load groups', err);
      }
    }

    // Re-render on locale change so the labels follow the UI language.
    document.addEventListener('i18n:changed', function () {
      if (cachedGroups) render(cachedGroups);
    });

    load();
  </script>
</body>
</html>
