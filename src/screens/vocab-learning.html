<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00B4A6" />
  <title>Jamlex · Vocab Learning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css?v=mpr9u9sm" />
  <link rel="stylesheet" href="/css/base.css?v=mpr9u9sm" />
  <link rel="stylesheet" href="/css/components.css?v=mpr9u9sm" />
  <link rel="stylesheet" href="/css/components/v2-patterns.css?v=mpr9u9sm" />
  <link rel="stylesheet" href="/css/components/popup.css?v=mpr9u9sm" />
  <link rel="stylesheet" href="/css/chrome.css?v=mpr9u9sm" />
  <link rel="stylesheet" href="/css/screens/screen-base.css?v=mpr9u9sm" />
  <link rel="stylesheet" href="/css/screens/screens-app.css?v=mpr9u9sm" />
</head>
<body>
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale"><option value="fa">فارسی</option><option value="en">English</option></select>
    <select data-theme-picker aria-label="Theme"><option value="system">🖥 System</option><option value="light">☀ Light</option><option value="dark">🌙 Dark</option></select>
  </div>
  <a href="/" class="hub-ribbon">‹ Hub</a>

  <div class="shell">
    <div class="phone">
      <div class="screen">
        <header class="topbar topbar--transparent">
          <div class="topbar__leading"></div>
          <h1 class="topbar__title" style="display:inline-flex;align-items:center;gap:6px;">
            <span style="display:inline-flex;width:28px;height:28px;border-radius:8px;background:rgba(108,92,231,0.16);align-items:center;justify-content:center;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6C5CE7" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            </span>
            <span data-i18n="v3.vocabLearning.title"></span>
          </h1>
          <div></div>
        </header>

        <div class="screen__body">
          <div class="search-input">
            <span class="search-input__icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16" y2="16"/></svg>
            </span>
            <input type="search" data-i18n-attr="placeholder:v3.vocabLearning.searchPlaceholder" />
          </div>

          <!-- ============================================================
               New layout (locked 2026-05-29): three horizontal rows in
               this order — topic groups, levels, study books. Same
               library-style "see all" pattern as reading.html. The
               levels strip is horizontal-by-default with 5 chips, so
               no see-all is needed there.
               ============================================================ -->

          <!-- 1. واژگان موضوعی (topic groups) — horizontal scroll + see-all -->
          <div class="section-h">
            <div class="section-h__title" data-i18n="v3.vocabLearning.topicWords"></div>
            <a href="/screens/vocab-categories-all.html" class="section-h__action" data-i18n="v3.vocabLearning.seeAll"></a>
          </div>
          <!-- TODO(flutter): the 12 main groups are pulled live from
               openjam. See architecture_openjam.md for the integration
               contract. The cat-h-scroll renders horizontally. -->
          <div class="cat-h-scroll" data-openjam-groups>
            <a class="cat-disc" style="background:var(--jx-input-bg);min-height:96px;"></a>
            <a class="cat-disc" style="background:var(--jx-input-bg);min-height:96px;"></a>
            <a class="cat-disc" style="background:var(--jx-input-bg);min-height:96px;"></a>
            <a class="cat-disc" style="background:var(--jx-input-bg);min-height:96px;"></a>
          </div>

          <!-- 2. یادگیری بر اساس سطح (CEFR levels) — horizontal chip strip -->
          <div class="section-h">
            <div class="section-h__title" data-i18n="v3.vocabLearning.byLevel"></div>
          </div>
          <!-- CEFR level chips with the same liquid progress fill as
               the topic-group tiles. data-progress carries the
               percentage of words at that CEFR level the user has
               graduated from Leitner.
               TODO(flutter): replace literal MOCK values with:
                 progress = COUNT(words at level WHERE graduated=true)
                          / COUNT(words at level) × 100
               No "%" label on the chip — colour fill only. -->
          <div class="level-chips" style="display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;">
            <button class="lvl-chip lvl-chip--c1" data-progress="8"
              style="background:#FCE4E4;color:#C62828;--progress:8%;--progress-color:#C62828;">
              <span style="font-size:18px;font-weight:800;font-family:var(--font-family-latin);">C1</span>
              <span data-i18n="v3.vocabLearning.level.C1Label"></span>
            </button>
            <button class="lvl-chip lvl-chip--b2" data-progress="22"
              style="background:#FCEEDC;color:#E65100;--progress:22%;--progress-color:#E65100;">
              <span style="font-size:18px;font-weight:800;font-family:var(--font-family-latin);">B2</span>
              <span data-i18n="v3.vocabLearning.level.B2Label"></span>
            </button>
            <button class="lvl-chip lvl-chip--b1" data-progress="45"
              style="background:#E3F2FD;color:#1565C0;--progress:45%;--progress-color:#1565C0;">
              <span style="font-size:18px;font-weight:800;font-family:var(--font-family-latin);">B1</span>
              <span data-i18n="v3.vocabLearning.level.B1Label"></span>
            </button>
            <button class="lvl-chip lvl-chip--a2" data-progress="68"
              style="background:#E0F2F1;color:#00897B;--progress:68%;--progress-color:#00897B;">
              <span style="font-size:18px;font-weight:800;font-family:var(--font-family-latin);">A2</span>
              <span data-i18n="v3.vocabLearning.level.A2Label"></span>
            </button>
            <button class="lvl-chip lvl-chip--a1" data-selected="true" data-progress="92"
              style="background:#E0F2EC;color:#1F9389;border-color:#1F9389;--progress:92%;--progress-color:#1F9389;">
              <span style="font-size:18px;font-weight:800;font-family:var(--font-family-latin);">A1</span>
              <span data-i18n="v3.vocabLearning.level.A1Label"></span>
              <span class="lvl-chip__check">✓</span>
            </button>
          </div>

          <!-- 3. کتاب‌های آموزشی (study books) — horizontal scroll + see-all -->
          <div class="section-h">
            <div class="section-h__title" data-i18n="v3.vocabLearning.studyBooks"></div>
            <a href="/screens/vocab-books-all.html" class="section-h__action" data-i18n="v3.vocabLearning.seeAll"></a>
          </div>
          <!-- Study books — same liquid progress fill as topic groups
               and CEFR chips. The percentage text + horizontal bar were
               removed 2026-05-29 per product owner: colour fill only,
               NO number. Brand color of each book drives --progress-color
               (green=IELTS, red=504, orange=GRE, blue=TOEFL).
               TODO(flutter): replace mock progress with:
                 progress = COUNT(book_vocab WHERE graduated_from_leitner=true)
                          / COUNT(book_vocab) × 100 -->
          <div class="vocab-book-h-scroll">
            <a href="/screens/category-words.html" class="bookcard bookcard--ielts"
              data-progress="72" style="--progress:72%;--progress-color:#43A047;">
              <div class="bookcard__head">
                <div class="bookcard__title">IELTS</div>
                <div class="bookcard__sub">B1 - B2</div>
              </div>
              <div class="lottie-stage lottie-stage--sm bookcard__lottie" data-lottie="bookcard-ielts"></div>
            </a>
            <a href="/screens/category-words.html" class="bookcard bookcard--504"
              data-progress="45" style="--progress:45%;--progress-color:#E53935;">
              <div class="bookcard__head">
                <div class="bookcard__title" data-i18n="v3.vocabLearning.book.fiveHundredTitle"></div>
                <div class="bookcard__sub">A1 - A2</div>
              </div>
              <div class="lottie-stage lottie-stage--sm bookcard__lottie" data-lottie="bookcard-504"></div>
            </a>
            <a href="/screens/category-words.html" class="bookcard bookcard--gre"
              data-progress="38" style="--progress:38%;--progress-color:#F57C00;">
              <div class="bookcard__head">
                <div class="bookcard__title">GRE</div>
                <div class="bookcard__sub">C1 - C2</div>
              </div>
              <div class="lottie-stage lottie-stage--sm bookcard__lottie" data-lottie="bookcard-gre"></div>
            </a>
            <a href="/screens/category-words.html" class="bookcard bookcard--toefl"
              data-progress="61" style="--progress:61%;--progress-color:#1976D2;">
              <div class="bookcard__head">
                <div class="bookcard__title">TOEFL</div>
                <div class="bookcard__sub">B2 - C1</div>
              </div>
              <div class="lottie-stage lottie-stage--sm bookcard__lottie" data-lottie="bookcard-toefl"></div>
            </a>
          </div>

          <!-- ============================================================
               Stats footer — LOCKED design v2 2026-05-29. The earlier
               horizontal 3-col version was clipping every label
               ("Daily ...", "هدف ر..."). The product owner asked for
               a much bigger card where every detail is readable.

               Layout is now a VERTICAL stack of three full-width rows:
                 Row 1 → 📈 Total words learned   2,840
                 Row 2 → ⚡ Today                 24  +12%
                 Row 3 → 🏆 Daily goal            40 واژه
               Each row has 52×52 lead icon + label + big 28px value.

               Numbers are LIVE reads, NOT literals. Flutter contract:
                 data-stat="total-learned" → COUNT(leitner_cards
                                              WHERE graduated = true)
                                              per architecture_stats_definitions.md
                 data-stat="today-words"   → COUNT graduated TODAY
                                              (newly mastered today)
                 data-stat="today-delta"   → pct change vs 7-day avg
                                              ("+12%" / "-4%"); hide
                                              when sample size < 3 days
                 data-stat="daily-goal"    → users.leitner_daily_limit,
                                              the EXACT number the user
                                              set in Profile → تنظیمات
                                              لایتنر. NEVER hardcode.
               ============================================================ -->
          <div class="vlearn-footer">
            <!-- Row 1 — total ever learned (chart-up icon) -->
            <div class="vlearn-stat">
              <span class="vlearn-stat__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M3 3v18h18"/>
                  <path d="M7 14l3-4 4 3 6-7"/>
                </svg>
              </span>
              <div class="vlearn-stat__body">
                <div class="vlearn-stat__label" data-i18n="v3.vocabLearning.footer.totalLabel"></div>
                <div class="vlearn-stat__value" data-stat="total-learned">2,840</div>
              </div>
            </div>

            <!-- Row 2 — today's newly learned + delta vs 7-day avg
                 (lightning bolt icon for "today's burst") -->
            <div class="vlearn-stat">
              <span class="vlearn-stat__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path d="M13 2L4.5 13.5h6L9 22l8.5-11.5h-6L13 2z"/>
                </svg>
              </span>
              <div class="vlearn-stat__body">
                <div class="vlearn-stat__label" data-i18n="v3.vocabLearning.footer.todayLabel"></div>
                <div class="vlearn-stat__value">
                  <span data-stat="today-words">24</span>
                  <span class="vlearn-stat__delta" data-stat="today-delta">+12%</span>
                </div>
              </div>
            </div>

            <!-- Row 3 — daily goal from users.leitner_daily_limit.
                 The 3D golden trophy Lottie is the row's lead icon
                 (no white tile, the trophy stands on its own). -->
            <div class="vlearn-stat">
              <div class="lottie-stage vlearn-stat__icon vlearn-stat__icon--trophy" data-lottie="vocab-footer-trophy" aria-hidden="true"></div>
              <div class="vlearn-stat__body">
                <div class="vlearn-stat__label" data-i18n="v3.vocabLearning.footer.dailyGoal"></div>
                <div class="vlearn-stat__value">
                  <span data-stat="daily-goal">40</span>
                  <span class="vlearn-stat__unit" data-i18n="v3.vocabLearning.footer.wordsUnit"></span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/screen-shell.js?v=mpr9u9sm"></script>
  <script type="module">
    // ----------------------------------------------------------------
    // openjam categories — live fetch of the 12 main groups.
    // Endpoint: GET https://openjam.amirj4m.com/v1/categories/groups
    // No auth, CORS open, returns { groups: [{ slug, name_en, name_fa,
    // word_count, children: [...] }, ...] }.
    //
    // We pull this at runtime and template the 12 tiles. Result is
    // cached in sessionStorage so locale-switching doesn't refetch.
    // TODO(flutter): replace the fetch with the hybrid local-DB read
    // from openjam/INTEGRATION.md (one-time download → SQLite cache).
    // ----------------------------------------------------------------
    import { getLocale } from '/js/i18n.js?v=mpr9u9sm';

    // Per-group glyph + soft tint. 12 distinct colour-coded tiles so
    // each main group is visually distinguishable at a glance.
    const ICONS = {
      'food-drink':         '🍔',
      'people-family':      '👨‍👩‍👧',
      'body-health':        '💪',
      'nature-animals':     '🌿',
      'home-objects':       '🏠',
      'places-travel':      '✈️',
      'work-money':         '💼',
      'society-culture':    '🎭',
      'science-tech':       '🔬',
      'sport-action':       '⚽',
      'feelings-qualities': '😊',
      'time-learning':      '⏳',
    };
    const TINTS = {
      'food-drink':         { bg: '#FFF3E0', fg: '#E65100' },
      'people-family':      { bg: '#F3E5F5', fg: '#6A1B9A' },
      'body-health':        { bg: '#FCE4E4', fg: '#C62828' },
      'nature-animals':     { bg: '#E0F2E0', fg: '#2E7D32' },
      'home-objects':       { bg: '#FFF8E1', fg: '#B27A12' },
      'places-travel':      { bg: '#E3F2FD', fg: '#1565C0' },
      'work-money':         { bg: '#E8EAF6', fg: '#283593' },
      'society-culture':    { bg: '#FCE4EC', fg: '#C2185B' },
      'science-tech':       { bg: '#E0F7FA', fg: '#00838F' },
      'sport-action':       { bg: '#F1F8E9', fg: '#558B2F' },
      'feelings-qualities': { bg: '#FFECB3', fg: '#B27A12' },
      'time-learning':      { bg: '#E0F2F1', fg: '#00695C' },
    };

    // Mock per-category mastery (0-100) for the design preview only.
    // Spread covers a deliberate range so reviewers see how varied
    // fills read at a glance.
    //
    // TODO(flutter): replace with a real read against the local DB:
    //   progress = COUNT(words in group WHERE graduated_from_leitner=true)
    //            / COUNT(words in group) * 100
    // The product owner explicitly asked for NO NUMBER on the tile, only
    // the coloured liquid fill height (locked 2026-05-29). Do not append
    // a "%" label later.
    const MOCK_PROGRESS = {
      'food-drink':         28,
      'people-family':      62,
      'body-health':        45,
      'nature-animals':     91,
      'home-objects':       18,
      'places-travel':      73,
      'work-money':         52,
      'society-culture':    8,
      'science-tech':       36,
      'sport-action':       80,
      'feelings-qualities': 14,
      'time-learning':      55,
    };

    function formatCount (n, locale) {
      return locale === 'fa'
        ? n.toLocaleString('fa-IR')
        : n.toLocaleString('en-US');
    }

    function render (groups) {
      const container = document.querySelector('[data-openjam-groups]');
      if (!container) return;
      const locale = getLocale();
      const wordLabel = locale === 'fa' ? 'واژه' : 'words';
      // Horizontal-scroll discs (library pattern). Each disc is a
      // compact tile with a glyph in a tinted circle, the group name,
      // and the word count. The full list lives at
      // /screens/vocab-categories-all.html as a 3-column grid.
      container.innerHTML = groups.map(function (g) {
        const tint = TINTS[g.slug] || { bg: 'var(--jx-input-bg)', fg: 'var(--jx-text)' };
        const icon = ICONS[g.slug] || '📖';
        const name = locale === 'fa' ? g.name_fa : g.name_en;
        const count = formatCount(g.word_count, locale);
        // data-progress carries the raw 0-100 number for Flutter to
        // override; the two custom props drive the liquid fill pseudo
        // elements in screens-app.css (.cat-disc::before / ::after).
        const progress = MOCK_PROGRESS[g.slug] || 0;
        const fillStyle = '--progress:' + progress + '%;--progress-color:' + tint.fg + ';';
        return '<a href="/screens/category-words.html?group=' + encodeURIComponent(g.slug) + '"' +
          ' class="cat-disc" data-progress="' + progress + '" style="' + fillStyle + '">' +
          '<span class="cat-disc__icon" style="background:' + tint.bg + ';color:' + tint.fg + ';">' + icon + '</span>' +
          '<span class="cat-disc__name">' + name + '</span>' +
          '<span class="cat-disc__count">' + count + ' ' + wordLabel + '</span>' +
        '</a>';
      }).join('');
    }

    let cachedGroups = null;
    async function load () {
      try {
        const cached = sessionStorage.getItem('openjam_groups');
        if (cached) {
          cachedGroups = JSON.parse(cached);
          render(cachedGroups);
          return;
        }
        const res = await fetch('https://openjam.amirj4m.com/v1/categories/groups');
        if (!res.ok) throw new Error('http ' + res.status);
        const data = await res.json();
        cachedGroups = data.groups || [];
        sessionStorage.setItem('openjam_groups', JSON.stringify(cachedGroups));
        render(cachedGroups);
      } catch (err) {
        // Leave the skeleton; the next tab open will retry.
        console.warn('[openjam] failed to load groups', err);
      }
    }

    // Re-render on locale change so the labels follow the UI language.
    document.addEventListener('i18n:changed', function () {
      if (cachedGroups) render(cachedGroups);
    });

    load();
  </script>
</body>
</html>
