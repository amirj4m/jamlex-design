<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00B4A6" />
  <title>Jamlex · Quiz Reverse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/chrome.css" />
  <link rel="stylesheet" href="/css/screens/screen-base.css" />
  <link rel="stylesheet" href="/css/screens/screens-app.css" />
</head>
<body>
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale"><option value="fa">فارسی</option><option value="en">English</option></select>
    <select data-theme-picker aria-label="Theme"><option value="system">🖥 System</option><option value="light">☀ Light</option><option value="dark">🌙 Dark</option></select>
  </div>
  <a href="/" class="hub-ribbon">‹ Hub</a>

  <div class="shell">
    <div class="phone">
      <div class="screen">
        <header class="topbar">
          <div class="topbar__leading">
            <a href="/screens/home.html" class="btn-icon back-btn"></a>
          </div>
          <h1 class="topbar__title" data-i18n="quiz.modes.reverseMcq"></h1>
          <div class="topbar__trailing">
            <button class="btn-icon" aria-label="Close">✕</button>
          </div>
        </header>

        <div class="screen__body">
          <div class="fc-counter">5 / 10</div>
          <div class="fc-progress"><div class="fc-progress__bar" style="width:50%"></div></div>

          <div class="qprompt mt-5">
            <div class="qprompt__copy" data-i18n="quiz.prompts.reverseMcq"></div>
            <div class="qprompt__word">تاب‌آوری</div>
          </div>

          <div class="q-options">
            <div class="q-option" style="direction:ltr;text-align:start;"><span class="q-option__letter">A</span><span>capacity</span></div>
            <div class="q-option" style="direction:ltr;text-align:start;"><span class="q-option__letter">B</span><span>resilience</span></div>
            <div class="q-option" style="direction:ltr;text-align:start;"><span class="q-option__letter">C</span><span>persistence</span></div>
            <div class="q-option" style="direction:ltr;text-align:start;"><span class="q-option__letter">D</span><span>endurance</span></div>
          </div>

          <button class="btn btn--filled btn--block mt-5" data-i18n="quiz.checkBtn"></button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/screen-shell.js"></script>
</body>
</html>
