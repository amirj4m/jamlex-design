<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00B4A6" />
  <title>Jamlex · Quiz Reverse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css?v=mppi7br1" />
  <link rel="stylesheet" href="/css/base.css?v=mppi7br1" />
  <link rel="stylesheet" href="/css/components.css?v=mppi7br1" />
  <link rel="stylesheet" href="/css/components/v2-patterns.css?v=mppi7br1" />
  <link rel="stylesheet" href="/css/components/popup.css?v=mppi7br1" />
  <link rel="stylesheet" href="/css/chrome.css?v=mppi7br1" />
  <link rel="stylesheet" href="/css/screens/screen-base.css?v=mppi7br1" />
  <link rel="stylesheet" href="/css/screens/screens-app.css?v=mppi7br1" />
</head>
<body>
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale"><option value="fa">فارسی</option><option value="en">English</option></select>
    <select data-theme-picker aria-label="Theme"><option value="system">🖥 System</option><option value="light">☀ Light</option><option value="dark">🌙 Dark</option></select>
  </div>
  <a href="/" class="hub-ribbon">‹ Hub</a>

  <div class="shell">
    <div class="phone">
      <div class="screen">
        <header class="topbar">
          <div class="topbar__leading">
            <a href="/screens/home.html" class="btn-icon back-btn" aria-label="Back"></a>
          </div>
          <h1 class="topbar__title" data-i18n="v3.quiz.reverseTitle"></h1>
          <div class="topbar__trailing">
            <button class="btn-icon" aria-label="Close">✕</button>
          </div>
        </header>

        <div class="screen__body">
          <div class="fc-counter-v3">5 / 10</div>
          <div class="fc-progress-v3"><div class="fc-progress-v3__bar" style="width:50%;"></div></div>

          <div class="qprompt-v3">
            <div class="qprompt-v3__copy" data-i18n="v3.quiz.reversePrompt"></div>
            <div class="qprompt-v3__word" data-i18n="v3.quiz.options.resilience"></div>
          </div>

          <div class="q-opts">
            <button class="q-opt"><span class="q-opt__letter">A</span><span style="direction:ltr;font-family:var(--font-family-latin);">capacity</span></button>
            <button class="q-opt"><span class="q-opt__letter">B</span><span style="direction:ltr;font-family:var(--font-family-latin);">resilience</span></button>
            <button class="q-opt"><span class="q-opt__letter">C</span><span style="direction:ltr;font-family:var(--font-family-latin);">persistence</span></button>
            <button class="q-opt"><span class="q-opt__letter">D</span><span style="direction:ltr;font-family:var(--font-family-latin);">endurance</span></button>
          </div>

          <button class="btn btn--filled btn--block btn--lg" style="margin-top:var(--sp-5);" data-i18n="v3.quiz.checkBtn"></button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/screen-shell.js?v=mppi7br1"></script>
</body>
</html>
