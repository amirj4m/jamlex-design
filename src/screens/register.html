<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00B4A6" />
  <title>Jamlex · Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css?v=mpp362ef" />
  <link rel="stylesheet" href="/css/base.css?v=mpp362ef" />
  <link rel="stylesheet" href="/css/components.css?v=mpp362ef" />
  <link rel="stylesheet" href="/css/components/v2-patterns.css?v=mpp362ef" />
  <link rel="stylesheet" href="/css/components/popup.css?v=mpp362ef" />
  <link rel="stylesheet" href="/css/chrome.css?v=mpp362ef" />
  <link rel="stylesheet" href="/css/screens/screen-base.css?v=mpp362ef" />
</head>
<body>
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale"><option value="fa">فارسی</option><option value="en">English</option></select>
    <select data-theme-picker aria-label="Theme"><option value="system">🖥 System</option><option value="light">☀ Light</option><option value="dark">🌙 Dark</option></select>
  </div>
  <a href="/" class="hub-ribbon">‹ Hub</a>

  <div class="shell">
    <div class="phone">
      <div class="screen screen--auth">
        <header class="topbar topbar--transparent">
          <div class="topbar__leading">
            <a href="/screens/home.html" class="btn-icon back-btn" aria-label="Back"></a>
          </div>
          <div></div>
          <div></div>
        </header>

        <div class="screen__body screen__body--auth screen__body--auth-dense">
          <div class="lottie-stage lottie-stage--in-disc" data-lottie="hero-profile"></div>

          <h1 class="auth-title" data-i18n="auth.signUpTitle"></h1>

          <form class="auth-form" autocomplete="on" onsubmit="
            event.preventDefault();
            var pw = this.querySelector('input[type=password]');
            if (!pw || pw.value.length < 8) {
              window.popupError(null, { messageKey: 'auth.validation.passwordMin' });
              return false;
            }
            return false;
          ">
            <div class="field">
              <div class="field__control">
                <span class="field__slot-start">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/>
                  </svg>
                </span>
                <input
                  type="text"
                  class="field__input field__input--with-slot-start"
                  data-i18n-attr="placeholder:auth.namePlaceholder"
                  autocomplete="username"
                />
              </div>
            </div>

            <div class="field">
              <div class="field__control">
                <span class="field__slot-start">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="5" width="18" height="14" rx="2"/><polyline points="3,7 12,13 21,7"/>
                  </svg>
                </span>
                <input
                  type="email"
                  class="field__input field__input--with-slot-start"
                  data-i18n-attr="placeholder:auth.email"
                  autocomplete="email"
                  inputmode="email"
                />
              </div>
            </div>

            <div class="field field--phone">
              <div class="field__control">
                <button type="button" class="field__country">
                  🇺🇸 <span>+1</span>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
                </button>
                <input
                  type="tel"
                  class="field__input"
                  data-i18n-attr="placeholder:auth.phonePlaceholderOptional"
                  autocomplete="tel"
                  inputmode="tel"
                  dir="ltr"
                  style="text-align: start;"
                />
                <span class="field__slot-end">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="5" y="2" width="14" height="20" rx="3"/><line x1="12" y1="18" x2="12.01" y2="18"/>
                  </svg>
                </span>
              </div>
            </div>

            <div class="field">
              <div class="field__control">
                <span class="field__slot-start">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/>
                  </svg>
                </span>
                <input
                  type="password"
                  class="field__input field__input--with-slot-start field__input--with-slot-end"
                  data-i18n-attr="placeholder:auth.password"
                  autocomplete="new-password"
                />
                <span class="field__slot-end">
                  <button type="button" data-pwd-toggle aria-label="Toggle">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                    </svg>
                  </button>
                </span>
              </div>
            </div>

            <div class="field">
              <div class="field__control">
                <span class="field__slot-start">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/>
                  </svg>
                </span>
                <input
                  type="password"
                  class="field__input field__input--with-slot-start field__input--with-slot-end"
                  data-i18n-attr="placeholder:auth.confirmPassword"
                  autocomplete="new-password"
                />
                <span class="field__slot-end">
                  <button type="button" data-pwd-toggle aria-label="Toggle">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                    </svg>
                  </button>
                </span>
              </div>
            </div>

            <label class="auth-terms">
              <input type="checkbox" class="check__input" />
              <span class="auth-terms__text">
                <span data-i18n="auth.termsAgreement"></span>
                <a href="#" class="auth-terms__link" data-i18n="auth.termsLinkPrivacy"></a>
                <span data-i18n="auth.termsAgreementJoin"></span>
                <a href="#" class="auth-terms__link" data-i18n="auth.termsLinkTerms"></a>
                <span data-i18n="auth.termsAgreementSuffix"></span>
              </span>
            </label>

            <button type="submit" class="btn btn--filled btn--block btn--lg" data-i18n="auth.signUpTitle"></button>
          </form>

          <div class="auth-footer-link">
            <span data-i18n="auth.haveAccountQ"></span>
            <a href="/screens/login.html" data-i18n="auth.signInBtn"></a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/screen-shell.js?v=mpp362ef"></script>
  <script>
    document.addEventListener('click', function (e) {
      var t = e.target.closest('[data-pwd-toggle]');
      if (!t) return;
      var input = t.closest('.field__control').querySelector('input');
      input.type = input.type === 'password' ? 'text' : 'password';
    });
  </script>
</body>
</html>
