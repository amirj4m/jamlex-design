<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00B4A6" />
  <title>Jamlex · My Words</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css?v=mppi7br1" />
  <link rel="stylesheet" href="/css/base.css?v=mppi7br1" />
  <link rel="stylesheet" href="/css/components.css?v=mppi7br1" />
  <link rel="stylesheet" href="/css/components/v2-patterns.css?v=mppi7br1" />
  <link rel="stylesheet" href="/css/components/popup.css?v=mppi7br1" />
  <link rel="stylesheet" href="/css/chrome.css?v=mppi7br1" />
  <link rel="stylesheet" href="/css/screens/screen-base.css?v=mppi7br1" />
  <link rel="stylesheet" href="/css/screens/screens-app.css?v=mppi7br1" />
</head>
<body>
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale"><option value="fa">فارسی</option><option value="en">English</option></select>
    <select data-theme-picker aria-label="Theme"><option value="system">🖥 System</option><option value="light">☀ Light</option><option value="dark">🌙 Dark</option></select>
    <select id="state-picker" aria-label="State" onchange="
      document.querySelectorAll('.state').forEach(function(s){s.hidden = s.dataset.state !== event.target.value;});
    ">
      <option value="list">With collections</option>
      <option value="empty">Empty</option>
      <option value="gate">Auth gate (guest)</option>
    </select>
  </div>
  <a href="/" class="hub-ribbon">‹ Hub</a>

  <div class="shell">
    <div class="phone">
      <div class="screen">
        <header class="topbar topbar--transparent">
          <div class="topbar__leading"></div>
          <div></div>
          <div></div>
        </header>

        <!-- STATE: with collections -->
        <div class="state" data-state="list">
          <div class="screen__body">
            <div class="page-title">
              <h1 class="page-title__main" data-i18n="v3.myWords.title"></h1>
              <p class="page-title__sub" data-i18n="v3.myWords.subList"></p>
            </div>

            <div class="search-input" style="margin-top: var(--sp-3);">
              <span class="search-input__icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16" y2="16"/></svg>
              </span>
              <input type="search" data-i18n-attr="placeholder:v3.myWords.searchInDict" />
            </div>

            <div class="section-h">
              <div class="section-h__title" data-i18n="v3.myWords.categoriesLabel"></div>
              <button class="section-h__action" style="display:inline-flex;align-items:center;gap:6px;">
                <span style="display:inline-flex;width:22px;height:22px;border-radius:50%;background:var(--jx-primary-glow);color:var(--jx-primary);align-items:center;justify-content:center;font-size:14px;font-weight:bold;">+</span>
                <span data-i18n="v3.myWords.newCategory"></span>
              </button>
            </div>

            <div class="coll-list">
              <a href="/screens/my-words-detail.html" class="coll-row">
                <span class="coll-row__icon" style="background:rgba(108,92,231,0.16);color:#6C5CE7;">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2 12h2M5 8h2v8H5zm4-2h2v12H9zm4-3h2v15h-2zm4 3h2v9h-2zm4 4h2v5h-2z"/></svg>
                </span>
                <div class="coll-row__body">
                  <div class="coll-row__name" data-i18n="v3.myWords.collections.homonyms"></div>
                  <div class="coll-row__count" data-i18n="v3.myWords.collections.homonymsCount"></div>
                </div>
                <span class="coll-row__chevron"></span>
              </a>
              <a href="/screens/my-words-detail.html" class="coll-row">
                <span class="coll-row__icon" style="background:rgba(76,175,80,0.16);color:#2A8E4D;">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L3 14h7l-1 8 10-12h-7l1-8z"/></svg>
                </span>
                <div class="coll-row__body">
                  <div class="coll-row__name" data-i18n="v3.myWords.collections.verbs"></div>
                  <div class="coll-row__count" data-i18n="v3.myWords.collections.verbsCount"></div>
                </div>
                <span class="coll-row__chevron"></span>
              </a>
              <a href="/screens/my-words-detail.html" class="coll-row">
                <span class="coll-row__icon" style="background:rgba(74,144,217,0.16);color:#4A90D9;">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v14l-4-2-4 2-4-2-4 2V6z"/></svg>
                </span>
                <div class="coll-row__body">
                  <div class="coll-row__name" data-i18n="v3.myWords.collections.atomic"></div>
                  <div class="coll-row__count" data-i18n="v3.myWords.collections.atomicCount"></div>
                </div>
                <span class="coll-row__chevron"></span>
              </a>
              <a href="/screens/my-words-detail.html" class="coll-row">
                <span class="coll-row__icon" style="background:rgba(255,152,0,0.16);color:#E59A1A;">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                </span>
                <div class="coll-row__body">
                  <div class="coll-row__name" data-i18n="v3.myWords.collections.toefl"></div>
                  <div class="coll-row__count" data-i18n="v3.myWords.collections.toeflCount"></div>
                </div>
                <span class="coll-row__chevron"></span>
              </a>
              <a href="/screens/my-words-detail.html" class="coll-row">
                <span class="coll-row__icon" style="background:rgba(233,30,99,0.16);color:#D63878;">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="6" width="18" height="14" rx="2"/><polygon points="10,10 16,13 10,16"/></svg>
                </span>
                <div class="coll-row__body">
                  <div class="coll-row__name" data-i18n="v3.myWords.collections.movies"></div>
                  <div class="coll-row__count" data-i18n="v3.myWords.collections.moviesCount"></div>
                </div>
                <span class="coll-row__chevron"></span>
              </a>
              <a href="/screens/my-words-detail.html" class="coll-row">
                <span class="coll-row__icon" style="background:rgba(0,180,166,0.16);color:#1F9389;">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73L13 2.27a2 2 0 0 0-2 0L4 6.27A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73L11 21.73a2 2 0 0 0 2 0L20 17.73A2 2 0 0 0 21 16z"/></svg>
                </span>
                <div class="coll-row__body">
                  <div class="coll-row__name" data-i18n="v3.myWords.collections.travel"></div>
                  <div class="coll-row__count" data-i18n="v3.myWords.collections.travelCount"></div>
                </div>
                <span class="coll-row__chevron"></span>
              </a>
            </div>
          </div>
        </div>

        <!-- STATE: empty -->
        <div class="state" data-state="empty" hidden>
          <div class="screen__body" style="display:flex;flex-direction:column;">
            <div class="page-title">
              <h1 class="page-title__main" data-i18n="v3.myWords.title"></h1>
              <p class="page-title__sub" data-i18n="v3.myWords.subEmpty"></p>
            </div>

            <div class="search-input" style="margin-top: var(--sp-3);">
              <span class="search-input__icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16" y2="16"/></svg>
              </span>
              <input type="search" data-i18n-attr="placeholder:v3.myWords.searchInDict" />
            </div>

            <div class="empty-block" style="margin-top: auto; margin-bottom: auto;">
              <div class="lottie-stage lottie-stage--lg" data-lottie="empty-box-plane"></div>
              <h2 class="empty-block__title" data-i18n="v3.myWords.noCategoriesTitle"></h2>
              <p class="empty-block__sub" data-i18n-html="v3.myWords.noCategoriesSub"></p>
              <button class="btn btn--outlined btn--lg" style="margin-top: var(--sp-5); min-width: 220px;">
                <span style="font-size:18px;color:var(--jx-primary);">+</span>
                <span data-i18n="v3.myWords.newCategory"></span>
              </button>
            </div>
          </div>
        </div>

        <!-- STATE: auth gate -->
        <div class="state" data-state="gate" hidden>
          <div class="gate">
            <div class="lottie-stage lottie-stage--lg" data-lottie="gate-lock-leaves"></div>
            <h2 class="gate__title" data-i18n-html="v3.myWords.guestTitle"></h2>
            <p class="gate__sub" data-i18n-html="v3.myWords.guestSub"></p>
            <a href="/screens/login.html" class="btn btn--filled btn--block btn--lg" data-i18n="v3.leaderboard.loginCta"></a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/screen-shell.js?v=mppi7br1"></script>
</body>
</html>
