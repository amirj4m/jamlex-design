<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00B4A6" />
  <title>Jamlex · Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/chrome.css" />
  <link rel="stylesheet" href="/css/screens/screen-base.css" />
  <link rel="stylesheet" href="/css/screens/screens-app.css" />
</head>
<body>
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale">
      <option value="fa">فارسی</option>
      <option value="en">English</option>
    </select>
    <select data-theme-picker aria-label="Theme">
      <option value="system">🖥 System</option>
      <option value="light">☀ Light</option>
      <option value="dark">🌙 Dark</option>
    </select>
  </div>
  <a href="/" class="hub-ribbon">‹ Hub</a>

  <div class="shell">
    <div class="phone">
      <div class="screen">
        <div class="screen__body">
          <header class="home-header">
            <div class="home-greet">
              <span class="home-greet__hi" data-i18n="home.greetingHi" data-i18n-vars='{"name":""}'></span>
              <span class="home-greet__name">آرین</span>
            </div>
            <div class="streak-badge">
              🔥 <span data-i18n="home.streakDays" data-i18n-vars='{"n":7}'></span>
            </div>
          </header>

          <!-- Word of the day -->
          <div class="wod">
            <div class="wod__label" data-i18n="home.wordOfDay"></div>
            <div class="wod__english">
              <span>resilience</span>
              <button class="audio-btn" data-audio="resilience" aria-label="Play">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 0 0-2.5-4.03v8.05A4.5 4.5 0 0 0 16.5 12zM14 3.23v2.06A7 7 0 0 1 14 18.7v2.06A9 9 0 0 0 14 3.23z"/></svg>
              </button>
            </div>
            <div class="wod__ipa">/rɪˈzɪliəns/</div>
            <div class="wod__meaning">تاب‌آوری، قابلیت بازگشت به حالت اول</div>
            <div class="wod__actions">
              <button class="wod__btn" data-i18n="home.addToLeitner">
                <span>+</span> <span data-i18n="home.addToLeitner"></span>
              </button>
            </div>
          </div>

          <!-- Progress card -->
          <div class="prog-card">
            <div class="prog-card__head">
              <span class="prog-card__title" data-i18n="home.vocabProgress"></span>
              <span class="prog-card__value">23%</span>
            </div>
            <div class="prog-bar"><div class="prog-bar__fill" style="width:23%"></div></div>
            <div class="prog-card__hint" data-i18n="home.keepGoing"></div>
          </div>

          <!-- Quick actions -->
          <div class="quick-actions">
            <a href="/screens/reading.html" class="qa">
              <div class="qa__icon qa__icon--blue">📚</div>
              <div class="qa__title" data-i18n="home.library"></div>
              <div class="qa__desc" data-i18n="home.readBook"></div>
            </a>
            <a href="/screens/my-words.html" class="qa">
              <div class="qa__icon qa__icon--teal">⭐</div>
              <div class="qa__title" data-i18n="home.myWords"></div>
              <div class="qa__desc" data-i18n="home.savedWords"></div>
            </a>
          </div>

          <!-- Section: continue learning -->
          <div class="section-h">
            <div class="section-h__title" data-i18n="vocabLearning.title"></div>
            <a href="/screens/vocab-learning.html" class="section-h__action" data-i18n="reading.seeAll"></a>
          </div>
          <div class="quick-actions">
            <a href="/screens/leitner.html" class="qa">
              <div class="qa__icon qa__icon--teal">🗂</div>
              <div class="qa__title" data-i18n="nav.leitner"></div>
              <div class="qa__desc" data-i18n="leitner.dueSubtitle"></div>
            </a>
            <a href="/screens/flashcards.html" class="qa">
              <div class="qa__icon qa__icon--blue">🃏</div>
              <div class="qa__title" data-i18n="flashcards.title"></div>
              <div class="qa__desc" data-i18n="vocabLearning.learnByLevel"></div>
            </a>
          </div>
        </div>

        <!-- Bottom Nav -->
        <nav class="bottomnav" aria-label="Bottom navigation">
          <a href="/screens/home.html" class="bottomnav__item" data-active="true">
            <span class="bottomnav__icon">🏠</span>
            <span data-i18n="nav.home"></span>
          </a>
          <a href="/screens/leitner.html" class="bottomnav__item">
            <span class="bottomnav__icon">🗂</span>
            <span data-i18n="nav.leitner"></span>
          </a>
          <a href="/screens/vocabulary.html" class="bottomnav__item">
            <span class="bottomnav__icon">🔍</span>
            <span data-i18n="nav.vocabulary"></span>
          </a>
          <a href="/screens/stats.html" class="bottomnav__item">
            <span class="bottomnav__icon">📊</span>
            <span data-i18n="nav.stats"></span>
          </a>
          <a href="/screens/profile.html" class="bottomnav__item">
            <span class="bottomnav__icon">👤</span>
            <span data-i18n="nav.profile"></span>
          </a>
        </nav>
      </div>
    </div>
  </div>

  <script type="module" src="/js/screen-shell.js"></script>
</body>
</html>
