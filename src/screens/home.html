<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00B4A6" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css?v=mpsr5lsg" />
  <link rel="stylesheet" href="/css/base.css?v=mpsr5lsg" />
  <link rel="stylesheet" href="/css/components.css?v=mpsr5lsg" />
  <link rel="stylesheet" href="/css/components/v2-patterns.css?v=mpsr5lsg" />
  <link rel="stylesheet" href="/css/components/popup.css?v=mpsr5lsg" />
  <link rel="stylesheet" href="/css/chrome.css?v=mpsr5lsg" />
  <link rel="stylesheet" href="/css/screens/screen-base.css?v=mpsr5lsg" />
  <link rel="stylesheet" href="/css/screens/screens-app.css?v=mpsr5lsg" />
</head>
<body>
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale"><option value="fa">فارسی</option><option value="en">English</option></select>
    <select data-theme-picker aria-label="Theme"><option value="system">🖥 System</option><option value="light">☀ Light</option><option value="dark">🌙 Dark</option></select>
  </div>
  <a href="/" class="hub-ribbon">‹ Hub</a>

  <div class="shell">
    <div class="phone">
      <div class="screen">
        <div class="screen__body home-screen" dir="ltr">
          <!-- Top row — LOCKED LTR: avatar (left) + greeting + streak chip (right).
               This row's position MUST NOT mirror when locale switches. -->
          <header class="home-top home-top--v3">
            <div class="home-avatar-photo">
              <span data-i18n="v3.home.userInitial"></span>
            </div>
            <div class="home-greet">
              <div class="home-greet__hi" data-greeting></div>
              <div class="home-greet__sub" data-i18n="v3.home.welcomeBack"></div>
            </div>
            <div class="streak-chip">
              <div class="streak-chip__icon"><span style="font-size:18px;">🔥</span></div>
              <div>
                <div class="streak-chip__count" data-i18n="v3.home.streakDays" data-i18n-vars='{"n":7}'></div>
                <div class="streak-chip__label" data-i18n="v3.home.streakLabel"></div>
              </div>
            </div>
          </header>

          <!-- Word of Day card (the centerpiece)
               Live from openjam: every calendar day picks one fresh
               B1 word ((epoch_day) mod 968) → fetch /v1/words/<eng>?lang=fa
               → populate every element below. Skeleton text is just a
               placeholder until the fetch resolves. -->
          <article class="wod-card">
            <div class="wod-card__head">
              <span class="wod-card__label">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="#F5B945"><path d="M12 2l3 7h7l-5.5 4.5L18 21l-6-4-6 4 1.5-7.5L2 9h7z"/></svg>
                <span data-i18n="home.wordOfDay"></span>
              </span>
              <div class="wod-card__tags">
                <span class="chip" data-wod-pos>—</span>
                <span class="chip" data-wod-level data-level="B1">B1</span>
              </div>
            </div>

            <div class="wod-card__english" data-wod-english>…</div>
            <div class="wod-card__ipa">
              <span data-wod-ipa>/…/</span>
              <button class="audio-btn audio-btn--inline" data-wod-audio aria-label="Play">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 0 0-2.5-4.03v8.05A4.5 4.5 0 0 0 16.5 12z"/></svg>
              </button>
            </div>
            <div class="wod-card__meaning" data-wod-meaning>…</div>
            <div class="wod-card__example" data-wod-example>…</div>

            <!-- Floating Lottie paper-plane decoration (right side of card) -->
            <div class="lottie-stage wod-card__lottie" data-lottie="wod-paper-plane"></div>

            <hr class="wod-card__divider"/>
            <button type="button" class="wod-card__cta" onclick="
              if (this.dataset.done === 'true') return;
              this.dataset.done = 'true';
              window.popupSuccess(null, { messageKey: 'v3.home.addedToLeitner' });
            ">
              <span style="font-size:18px;" data-cta-plus>+</span>
              <span data-i18n="home.addToLeitner"></span>
            </button>
          </article>

          <!-- Gradient vocab banner — sprout on left, text middle, 3D book right.
               The sprout icon is a placeholder; the product owner will replace it. -->
          <a href="/screens/vocab-learning.html" class="vocab-banner">
            <div class="vocab-banner__sprout" aria-hidden="true">
              <svg viewBox="0 0 64 64" width="56" height="56" fill="none">
                <ellipse cx="32" cy="54" rx="14" ry="3" fill="rgba(255,255,255,0.20)"/>
                <path d="M32 50 L32 26" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
                <path d="M32 32 C 22 32, 16 24, 16 14 C 26 14, 32 22, 32 32 Z" fill="#fff" opacity="0.95"/>
                <path d="M32 26 C 42 26, 48 18, 48 8 C 38 8, 32 16, 32 26 Z" fill="#fff" opacity="0.85"/>
              </svg>
            </div>
            <div class="vocab-banner__body">
              <!-- Title is the v3 key "واژه‌آموزی" — the older
                   vocabLearning.title was "واژگان موضوعی". Sub now
                   sells the catalog scale (19k+ words across the 12
                   openjam groups). The old cheer line was dropped. -->
              <div class="vocab-banner__title" data-i18n="v3.vocabLearning.title"></div>
              <div class="vocab-banner__sub" data-i18n="v3.home.vocabBannerSub"></div>
            </div>
            <div class="lottie-stage lottie-stage--sm vocab-banner__lottie" data-lottie="vocab-banner-book"></div>
          </a>

          <!-- 2 quick action tiles -->
          <div class="quick-actions">
            <a href="/screens/reading.html" class="qa-tile">
              <div class="lottie-stage qa-tile__lottie" data-lottie="qa-book"></div>
              <div class="qa-tile__body">
                <div class="qa-tile__title" data-i18n="home.readBook"></div>
                <div class="qa-tile__sub" data-i18n="v3.home.readBookSub"></div>
              </div>
              <span class="qa-tile__arrow qa-tile__arrow--amber">›</span>
            </a>
            <a href="/screens/my-words.html" class="qa-tile">
              <div class="lottie-stage qa-tile__lottie" data-lottie="qa-mywords"></div>
              <div class="qa-tile__body">
                <div class="qa-tile__title" data-i18n="home.myWords"></div>
                <div class="qa-tile__sub" data-i18n="v3.home.myWordsSub"></div>
              </div>
              <span class="qa-tile__arrow qa-tile__arrow--purple">›</span>
            </a>
          </div>
        </div>

        <div data-bottomnav="home"></div>
      </div>
    </div>
  </div>

  <script type="module">
    // Compose the greeting after i18n is ready. The NAME is user data — NOT
    // i18n — so it stays "رضا محمدی" regardless of the UI language. Only the
    // surrounding "سلام" / "Hello" string follows the locale. Flutter reads
    // the actual name from users.display_name.
    import { t } from '/js/i18n.js?v=mpsr5lsg';
    document.addEventListener('i18n:changed', fillGreeting);
    function fillGreeting () {
      const el = document.querySelector('[data-greeting]');
      if (!el) return;
      // TODO(flutter): replace literal "رضا محمدی" with users.display_name.
      el.textContent = t('v3.home.greetingHi', { name: 'رضا محمدی' });
    }
  </script>

  <!-- ============================================================
       WORD OF DAY — pulled live from openjam.
       LOCKED 2026-05-30.

       Strategy: pool = all B1 words (~968), pick offset = epoch-day
       mod pool-size. Same offset → same word for the whole calendar
       day → "word of the day" is stable from midnight to midnight.
       Cached per-offset in sessionStorage so multiple loads on the
       same day don't re-hit the API.

       Two requests:
         1. /v1/words?level=B1&limit=1&offset=<N>  → just the english
         2. /v1/words/<english>?lang=fa            → full detail with
                                                     translations,
                                                     IPA, audio URL

       Flutter contract: same pattern. Cache by `wod_<dateYYYYMMDD>`.
       TODO(flutter): consider a dedicated /v1/words/random?seed=<day>
       endpoint to halve the round-trip count.
       ============================================================ -->
  <script type="module">
    const POOL_TOTAL = 968; // B1 word count as of 2026-05-30

    async function loadWordOfDay () {
      try {
        const epochDay = Math.floor(Date.now() / 86400000);
        const offset = epochDay % POOL_TOTAL;
        const cacheKey = 'jamlex_wod_' + offset;

        let detail = null;
        try {
          const cached = sessionStorage.getItem(cacheKey);
          if (cached) detail = JSON.parse(cached);
        } catch (e) { /* ignore */ }

        if (!detail) {
          const listRes = await fetch(
            'https://openjam.amirj4m.com/v1/words?level=B1&limit=1&offset=' + offset
          );
          const list = await listRes.json();
          const eng = (list.data && list.data[0] && list.data[0].english) || null;
          if (!eng) return;

          const detRes = await fetch(
            'https://openjam.amirj4m.com/v1/words/' + encodeURIComponent(eng) + '?lang=fa'
          );
          detail = await detRes.json();
          try { sessionStorage.setItem(cacheKey, JSON.stringify(detail)); } catch (e) { /* ignore */ }
        }

        renderWoD(detail);
      } catch (err) {
        console.warn('[openjam] Word of Day failed to load', err);
      }
    }

    function renderWoD (d) {
      if (!d) return;
      const sense = (d.senses && d.senses[0]) || {};
      const trans = (sense.translations && sense.translations[0]) || {};
      const phon  = (d.phonetics && d.phonetics[0]) || {};

      const set = function (sel, txt) {
        const el = document.querySelector(sel);
        if (el && txt != null) el.textContent = txt;
      };
      set('[data-wod-english]', d.english);
      set('[data-wod-pos]',     sense.part_of_speech || '—');
      set('[data-wod-meaning]', trans.meaning || '');
      const exEn = sense.example_en;
      set('[data-wod-example]', exEn ? "'" + exEn + "'" : '');
      set('[data-wod-ipa]',     phon.ipa ? '/' + phon.ipa + '/' : '');

      const lvlEl = document.querySelector('[data-wod-level]');
      if (lvlEl && d.level) {
        lvlEl.textContent = d.level;
        lvlEl.setAttribute('data-level', d.level);
      }

      const audioBtn = document.querySelector('[data-wod-audio]');
      if (audioBtn && phon.audio_url) {
        audioBtn.onclick = function () {
          try { new Audio(phon.audio_url).play().catch(function () {}); } catch (e) {}
        };
      }
    }

    loadWordOfDay();
  </script>
  <script type="module" src="/js/screen-shell.js?v=mpsr5lsg"></script>
</body>
</html>
