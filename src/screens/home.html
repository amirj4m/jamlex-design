<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00B4A6" />
  <title>Jamlex · Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/chrome.css" />
  <link rel="stylesheet" href="/css/screens/screen-base.css" />
  <link rel="stylesheet" href="/css/screens/screens-app.css" />
</head>
<body>
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale"><option value="fa">فارسی</option><option value="en">English</option></select>
    <select data-theme-picker aria-label="Theme"><option value="system">🖥 System</option><option value="light">☀ Light</option><option value="dark">🌙 Dark</option></select>
  </div>
  <a href="/" class="hub-ribbon">‹ Hub</a>

  <div class="shell">
    <div class="phone">
      <div class="screen">
        <div class="screen__body">
          <!-- Top: small avatar + Jamlex brand -->
          <header class="home-top">
            <div class="home-avatar">
              <span>?</span>
            </div>
            <span class="home-brand">Jamlex</span>
          </header>

          <!-- Word of Day card (v2 — matches reference exactly) -->
          <article class="wod-card">
            <div class="wod-card__head">
              <span class="wod-card__label">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="#F5B945"><path d="M12 2l3 7h7l-5.5 4.5L18 21l-6-4-6 4 1.5-7.5L2 9h7z"/></svg>
                <span data-i18n="home.wordOfDay"></span>
              </span>
              <div class="wod-card__tags">
                <span class="chip" data-level="B1">B1</span>
                <span class="chip">noun</span>
              </div>
            </div>

            <div class="wod-card__english">
              <span>hostel</span>
              <br/>
              <span>dormitory</span>
            </div>
            <div class="wod-card__ipa">
              <span>/ˈhɒstl ˈdɔ:mɪtri/</span>
              <button class="audio-btn audio-btn--inline" data-audio="hostel dormitory" aria-label="Play">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 0 0-2.5-4.03v8.05A4.5 4.5 0 0 0 16.5 12z"/></svg>
              </button>
            </div>

            <div class="wod-card__meaning">اتاق مشترک</div>
            <div class="wod-card__example">'The hostel dormitory sleeps twelve people.'</div>

            <!-- Floating paper plane decoration -->
            <svg class="wod-card__deco" viewBox="0 0 120 120" fill="none" aria-hidden="true">
              <circle cx="80" cy="50" r="36" fill="#E8F0F2"/>
              <path d="M50 50l36-14-14 36-8-14-14-8z" fill="#6C5CE7"/>
              <circle cx="34" cy="74" r="4" fill="#26D07C"/>
              <circle cx="98" cy="80" r="3" fill="#6C5CE7"/>
            </svg>

            <hr class="wod-card__divider"/>
            <button class="wod-card__cta">
              <span style="font-size:18px;">+</span>
              <span data-i18n="home.addToLeitner"></span>
            </button>
          </article>

          <!-- Vocab learning gradient card -->
          <a href="/screens/vocab-learning.html" class="vocab-banner">
            <div class="vocab-banner__ring">
              <svg viewBox="0 0 60 60" fill="none">
                <circle cx="30" cy="30" r="26" stroke="rgba(255,255,255,0.30)" stroke-width="4"/>
                <text x="30" y="36" text-anchor="middle" font-size="16" font-weight="800" fill="#fff" font-family="Inter">0%</text>
              </svg>
            </div>
            <div class="vocab-banner__body">
              <div class="vocab-banner__title" data-i18n="vocabLearning.title"></div>
              <div class="vocab-banner__sub">مسیر یادگیری شما</div>
              <div class="vocab-banner__cheer">خیلی خوب! ادامه بده 🌱</div>
            </div>
            <svg class="vocab-banner__icon" viewBox="0 0 60 60" fill="none">
              <circle cx="30" cy="30" r="26" fill="rgba(255,255,255,0.18)"/>
              <path d="M14 18v22c0 1 1 2 2 2h28c1 0 2-1 2-2V18H14z" fill="#fff"/>
              <path d="M30 18v24M14 20a4 4 0 0 1 4-2h8c2 0 4 2 4 4M46 20a4 4 0 0 0-4-2h-8c-2 0-4 2-4 4" stroke="#7ECCC4" stroke-width="2" fill="none"/>
              <circle cx="50" cy="14" r="3" fill="#F5B945"/>
              <circle cx="12" cy="48" r="2" fill="#6C5CE7"/>
            </svg>
          </a>

          <!-- Two quick actions -->
          <div class="quick-actions">
            <a href="/screens/reading.html" class="qa-tile">
              <svg class="qa-tile__art" viewBox="0 0 80 80" fill="none">
                <path d="M16 22h24v36H16zM40 22h24v36H40z" fill="#E8F0F2"/>
                <path d="M28 32h-6m6 6h-6m6 6h-6M58 32h-6m6 6h-6" stroke="#7ECCC4" stroke-width="2" stroke-linecap="round"/>
              </svg>
              <div class="qa-tile__body">
                <div class="qa-tile__title" data-i18n="home.readBook"></div>
                <div class="qa-tile__sub">مطالعه و یادگیری</div>
              </div>
              <span class="qa-tile__arrow qa-tile__arrow--amber">›</span>
            </a>
            <a href="/screens/my-words.html" class="qa-tile">
              <svg class="qa-tile__art" viewBox="0 0 80 80" fill="none">
                <rect x="20" y="20" width="36" height="40" rx="4" fill="#D4D0FF"/>
                <rect x="24" y="24" width="28" height="32" rx="2" fill="#6C5CE7"/>
                <line x1="30" y1="34" x2="46" y2="34" stroke="#fff" stroke-width="2"/>
                <line x1="30" y1="42" x2="46" y2="42" stroke="#fff" stroke-width="2"/>
                <line x1="30" y1="50" x2="40" y2="50" stroke="#fff" stroke-width="2"/>
              </svg>
              <div class="qa-tile__body">
                <div class="qa-tile__title" data-i18n="home.myWords"></div>
                <div class="qa-tile__sub">لغات ذخیره‌شده</div>
              </div>
              <span class="qa-tile__arrow qa-tile__arrow--mute">›</span>
            </a>
          </div>
        </div>

        <!-- Bottom Nav (auto-injected by bottomnav.js) -->
        <div data-bottomnav="home"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/screen-shell.js"></script>
</body>
</html>
