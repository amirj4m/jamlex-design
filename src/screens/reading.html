<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00B4A6" />
  <title>Jamlex · Reading</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css?v=mpokn2nk" />
  <link rel="stylesheet" href="/css/base.css?v=mpokn2nk" />
  <link rel="stylesheet" href="/css/components.css?v=mpokn2nk" />
  <link rel="stylesheet" href="/css/components/v2-patterns.css?v=mpokn2nk" />
  <link rel="stylesheet" href="/css/components/popup.css?v=mpokn2nk" />
  <link rel="stylesheet" href="/css/chrome.css?v=mpokn2nk" />
  <link rel="stylesheet" href="/css/screens/screen-base.css?v=mpokn2nk" />
  <link rel="stylesheet" href="/css/screens/screens-app.css?v=mpokn2nk" />
</head>
<body data-library-screen="reading">
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale"><option value="fa">فارسی</option><option value="en">English</option></select>
    <select data-theme-picker aria-label="Theme"><option value="system">🖥 System</option><option value="light">☀ Light</option><option value="dark">🌙 Dark</option></select>
  </div>
  <a href="/" class="hub-ribbon">‹ Hub</a>

  <div class="shell">
    <div class="phone">
      <div class="screen">
        <header class="topbar">
          <div class="topbar__leading"></div>
          <h1 class="topbar__title" data-i18n="v3.reading.title"></h1>
          <div class="topbar__trailing">
            <a href="/screens/saved-books.html" class="btn-icon" aria-label="Saved" style="background:var(--jx-primary-glow);color:var(--jx-primary);">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            </a>
          </div>
        </header>

        <div class="screen__body">
          <p style="text-align:end;color:var(--jx-text-2);font-size:var(--fs-body-s);margin-bottom:var(--sp-3);" data-i18n="v3.reading.subtitle"></p>

          <!-- Level chips -->
          <div class="reading-levels">
            <button class="reading-level reading-level--active">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
              <span data-i18n="v3.reading.level.all"></span>
            </button>
            <button class="reading-level"><span class="reading-level__code">C2</span><span data-i18n="v3.reading.level.advanced"></span></button>
            <button class="reading-level"><span class="reading-level__code">C1</span><span data-i18n="v3.reading.level.upper"></span></button>
            <button class="reading-level"><span class="reading-level__code">B2</span><span data-i18n="v3.reading.level.upperMid"></span></button>
            <button class="reading-level"><span class="reading-level__code">B1</span><span data-i18n="v3.reading.level.mid"></span></button>
            <button class="reading-level"><span class="reading-level__code">A2</span><span data-i18n="v3.reading.level.starter"></span></button>
          </div>

          <!-- Categories row -->
          <div class="section-h">
            <div class="section-h__title" data-i18n="v3.reading.categories"></div>
            <a href="/screens/categories-all.html" class="section-h__action" data-i18n="v3.reading.seeAll"></a>
          </div>
          <div class="cat-h-scroll" data-render="categories"></div>

          <!-- Featured books (top 10 by downloads) -->
          <div class="section-h">
            <div class="section-h__title" data-i18n="v3.reading.featured"></div>
            <a href="/screens/books-all.html?list=featured" class="section-h__action" data-i18n="v3.reading.seeAll"></a>
          </div>
          <div class="book-h-scroll" data-render="featured"></div>

          <!-- In progress (kept as a single sample for the design preview) -->
          <div class="section-h"><div class="section-h__title" data-i18n="v3.reading.continueReading"></div></div>
          <a href="/screens/book-reader.html" class="continue-card">
            <div class="continue-card__cover" style="background:linear-gradient(180deg,#6E3A85,#D4A8C8);font-family:'Times New Roman',serif;color:#fff;font-weight:bold;font-size:10px;text-align:center;padding:8px;">Pride and Prejudice</div>
            <div class="continue-card__body">
              <div class="continue-card__title">Pride and Prejudice</div>
              <div class="continue-card__author">Jane Austen</div>
              <div class="continue-card__progress">
                <div class="continue-card__track"><div class="continue-card__fill" style="width:65%;"></div></div>
                <span class="continue-card__pct"><span class="font-latin">65%</span></span>
              </div>
              <div class="continue-card__last" data-i18n="v3.reading.lastReadYesterday"></div>
            </div>
            <button class="continue-card__cta">📖 <span data-i18n="v3.reading.continueAction"></span></button>
          </a>

          <!-- Newest (20 remaining sorted by downloads, shown horizontally) -->
          <div class="section-h">
            <div class="section-h__title" data-i18n="v3.reading.newest"></div>
            <a href="/screens/books-all.html?list=newest" class="section-h__action" data-i18n="v3.reading.seeAll"></a>
          </div>
          <div class="book-h-scroll" data-render="newest"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/screen-shell.js?v=mpokn2nk"></script>
  <script type="module">
    import { mountReadingScreen } from '/js/library.js?v=mpokn2nk';
    document.addEventListener('i18n:changed', mountReadingScreen, { once: true });
  </script>
</body>
</html>
