<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00B4A6" />
  <title>Jamlex · Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css?v=1i74m4n9" />
  <link rel="stylesheet" href="/css/base.css?v=1i74m4n9" />
  <link rel="stylesheet" href="/css/components.css?v=1i74m4n9" />
  <link rel="stylesheet" href="/css/components/v2-patterns.css?v=1i74m4n9" />
  <link rel="stylesheet" href="/css/components/popup.css?v=1i74m4n9" />
  <link rel="stylesheet" href="/css/chrome.css?v=1i74m4n9" />
  <link rel="stylesheet" href="/css/screens/screen-base.css?v=1i74m4n9" />
  <link rel="stylesheet" href="/css/screens/screens-app.css?v=1i74m4n9" />
</head>
<body>
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale"><option value="fa">فارسی</option><option value="en">English</option></select>
    <select data-theme-picker aria-label="Theme"><option value="system">🖥 System</option><option value="light">☀ Light</option><option value="dark">🌙 Dark</option></select>
    <select id="state-picker" aria-label="State" onchange="
      document.querySelectorAll('.state').forEach(function(s){s.hidden = s.dataset.state !== event.target.value;});
    ">
      <option value="history">With history (phase-1)</option>
      <option value="empty">No history</option>
      <option value="results">With results</option>
      <option value="detail">Word detail sheet</option>
    </select>
  </div>
  <a href="/" class="hub-ribbon">‹ Hub</a>

  <div class="shell">
    <div class="phone">
      <div class="screen">
        <header class="topbar topbar--transparent">
          <div></div>
          <h1 class="topbar__title" data-i18n="vocabulary.title"></h1>
          <div></div>
        </header>

        <div class="screen__body">
          <!-- Search pill (sits big and pill-shaped per reference) -->
          <div class="search-pill">
            <span class="search-pill__icon">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16" y2="16"/></svg>
            </span>
            <input type="search" data-i18n-attr="placeholder:v3.vocab.searchPlaceholder" />
          </div>

          <!-- STATE: history -->
          <div class="state" data-state="history">
            <div class="section-h" style="margin-top: var(--sp-4);">
              <div class="section-h__title" data-i18n="v3.vocab.historyTitle"></div>
              <button class="section-h__action" style="background:transparent;border:0;color:var(--jx-primary);font-weight:var(--fw-semibold);cursor:pointer;" data-i18n="v3.vocab.clearAll" onclick="window.confirmAction('clearSearchHistory');"></button>
            </div>
            <div class="hist-list">
              <button class="hist-row">
                <span class="hist-row__remove">✕</span>
                <span class="hist-row__text">direct</span>
                <span class="hist-row__icon">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </span>
              </button>
              <button class="hist-row">
                <span class="hist-row__remove">✕</span>
                <span class="hist-row__text">improve</span>
                <span class="hist-row__icon">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </span>
              </button>
              <button class="hist-row">
                <span class="hist-row__remove">✕</span>
                <span class="hist-row__text">commitment</span>
                <span class="hist-row__icon">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </span>
              </button>
              <button class="hist-row">
                <span class="hist-row__remove">✕</span>
                <span class="hist-row__text">benefit</span>
                <span class="hist-row__icon">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </span>
              </button>
              <button class="hist-row">
                <span class="hist-row__remove">✕</span>
                <span class="hist-row__text">achieve</span>
                <span class="hist-row__icon">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </span>
              </button>
            </div>

          </div>

          <!-- STATE: empty / no history -->
          <div class="state" data-state="empty" hidden>
            <div class="empty-block" style="margin-top: var(--sp-7);">
              <div class="lottie-stage lottie-stage--lg" data-lottie="empty-box-plane"></div>
              <h2 class="empty-block__title" data-i18n="v3.vocab.readyTitle"></h2>
              <p class="empty-block__sub" data-i18n-html="v3.vocab.readyBody"></p>
            </div>
          </div>

          <!-- STATE: results -->
          <div class="state" data-state="results" hidden>
            <div class="word-rows-v3" style="margin-top: var(--sp-4);">
              <div class="word-row-v3">
                <button class="word-row-v3__bookmark"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></button>
                <div class="word-row-v3__body"><div class="word-row-v3__english">resilience</div><div class="word-row-v3__ipa">/rɪˈzɪliəns/</div></div>
                <button class="audio-btn audio-btn--lg" data-audio="resilience"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg></button>
              </div>
              <div class="word-row-v3">
                <button class="word-row-v3__bookmark"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></button>
                <div class="word-row-v3__body"><div class="word-row-v3__english">resilient</div><div class="word-row-v3__ipa">/rɪˈzɪliənt/</div></div>
                <button class="audio-btn audio-btn--lg" data-audio="resilient"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg></button>
              </div>
            </div>
          </div>

          <!-- STATE: word detail bottom sheet -->
          <div class="state" data-state="detail" hidden>
            <div class="card" style="margin-top: var(--sp-4);padding: var(--sp-5);">
              <div style="display:flex;justify-content:space-between;align-items:center;">
                <button class="btn-icon" style="color:var(--jx-text-3);">⭐</button>
                <div style="text-align:start;">
                  <h2 style="font-size:36px;font-weight:800;font-family:var(--font-family-latin);direction:ltr;">tap</h2>
                  <div style="display:inline-flex;align-items:center;gap:8px;margin-top:6px;">
                    <span style="font-size:var(--fs-body-m);color:var(--jx-text-2);font-family:var(--font-family-latin);direction:ltr;">/tæp/</span>
                    <button class="audio-btn" style="background:#E2EBFA;color:#2E64C0;" data-audio="tap"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg></button>
                  </div>
                </div>
              </div>

              <div class="section-h"><div class="section-h__title" data-i18n="v3.vocab.wordDetail.meanings"></div></div>
              <div style="background:var(--jx-input-bg);border-radius:14px;padding:var(--sp-3) var(--sp-4);font-size:var(--fs-body-m);">
                <div style="margin-bottom:6px;" data-i18n="v3.bookReader.lookup.tapMeaning1"></div>
                <div data-i18n="v3.bookReader.lookup.tapMeaning2"></div>
              </div>

              <div class="section-h"><div class="section-h__title" data-i18n="v3.vocab.wordDetail.example"></div></div>
              <div style="background:var(--jx-primary-glow);border-radius:14px;padding:var(--sp-3) var(--sp-4);">
                <div style="display:flex;justify-content:space-between;align-items:center;gap:var(--sp-2);">
                  <button class="audio-btn" style="background:#E2EBFA;color:#2E64C0;flex:none;" data-audio="tap"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg></button>
                  <div style="flex:1;text-align:start;direction:ltr;font-family:var(--font-family-latin);">She <span style="color:var(--jx-secondary);font-weight:bold;">tapped</span> the table to get his attention.</div>
                </div>
                <div style="margin-top:8px;color:var(--jx-text-2);font-size:var(--fs-body-s);" data-i18n="v3.bookReader.lookup.tapExampleFa"></div>
              </div>

              <div class="lookup-actions">
                <button class="pbtn pbtn--blue">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                  <span data-i18n="v3.vocab.wordDetail.viewFull"></span>
                </button>
                <button class="pbtn pbtn--mint">
                  <span style="font-weight:bold;">+</span>
                  <span data-i18n="v3.vocab.wordDetail.addToLeitner"></span>
                </button>
                <button class="pbtn pbtn--sky">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg>
                  <span data-i18n="v3.vocab.wordDetail.pronunciation"></span>
                </button>
              </div>
            </div>
          </div>
        </div>

        <div data-bottomnav="vocabulary"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/screen-shell.js?v=1i74m4n9"></script>
</body>
</html>
