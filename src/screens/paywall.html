<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00B4A6" />
  <title>Jamlex · Paywall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css?v=mppig4oy" />
  <link rel="stylesheet" href="/css/base.css?v=mppig4oy" />
  <link rel="stylesheet" href="/css/components.css?v=mppig4oy" />
  <link rel="stylesheet" href="/css/components/v2-patterns.css?v=mppig4oy" />
  <link rel="stylesheet" href="/css/components/popup.css?v=mppig4oy" />
  <link rel="stylesheet" href="/css/chrome.css?v=mppig4oy" />
  <link rel="stylesheet" href="/css/screens/screen-base.css?v=mppig4oy" />
</head>
<body>
  <div class="preview-controls">
    <select data-locale-picker aria-label="Locale"><option value="fa">فارسی</option><option value="en">English</option></select>
    <select data-theme-picker aria-label="Theme"><option value="system">🖥 System</option><option value="light">☀ Light</option><option value="dark">🌙 Dark</option></select>
  </div>
  <a href="/" class="hub-ribbon">‹ Hub</a>

  <div class="shell">
    <div class="phone">
      <div class="screen">
        <header class="topbar topbar--transparent">
          <div class="topbar__leading">
            <a href="/screens/home.html" class="btn-icon back-btn" aria-label="Back"></a>
          </div>
          <div></div>
          <div></div>
        </header>

        <div class="screen__body" style="text-align:center;">
          <div class="lottie-stage" data-lottie="hero-crown"></div>

          <h1 style="font-size:24px;font-weight:800;line-height:1.5;margin-top:var(--sp-2);" data-i18n-html="v3.paywall.headline" data-i18n-vars='{"brand":"<span style=\"color:var(--jx-primary);font-family:var(--font-family-latin);\">Jamlex</span>"}'></h1>
          <p style="color:var(--jx-text-2);margin-top:var(--sp-2);font-size:var(--fs-body-s);" data-i18n="v3.paywall.sub"></p>

          <div class="paywall-features">
            <div class="paywall-feat">
              <div class="paywall-feat__icon paywall-feat__icon--purple">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M18.6 6.6C16.7 4.7 13.4 4.7 11.5 6.6L8 10.1c-1.9 1.9-1.9 5.1 0 7l.5.5"/><path d="M5.4 17.4c1.9 1.9 5.2 1.9 7.1 0L16 13.9c1.9-1.9 1.9-5.1 0-7"/></svg>
              </div>
              <div class="paywall-feat__top" data-i18n="v3.paywall.feat.unlimitedTop"></div>
              <div class="paywall-feat__bot" data-i18n="v3.paywall.feat.unlimitedBot"></div>
            </div>
            <div class="paywall-feat">
              <div class="paywall-feat__icon paywall-feat__icon--blue">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16" y2="16"/></svg>
              </div>
              <div class="paywall-feat__top" data-i18n="v3.paywall.feat.searchTop"></div>
              <div class="paywall-feat__bot" data-i18n="v3.paywall.feat.searchBot"></div>
            </div>
            <div class="paywall-feat">
              <div class="paywall-feat__icon paywall-feat__icon--mint">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="6" y1="20" x2="6" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="18" y1="20" x2="18" y2="14"/></svg>
              </div>
              <div class="paywall-feat__top" data-i18n="v3.paywall.feat.reportsTop"></div>
              <div class="paywall-feat__bot" data-i18n="v3.paywall.feat.reportsBot"></div>
            </div>
            <div class="paywall-feat">
              <div class="paywall-feat__icon paywall-feat__icon--orange">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73L13 2.27a2 2 0 0 0-2 0L4 6.27A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73L11 21.73a2 2 0 0 0 2 0L20 17.73A2 2 0 0 0 21 16z"/></svg>
              </div>
              <div class="paywall-feat__top" data-i18n="v3.paywall.feat.categoriesTop"></div>
              <div class="paywall-feat__bot" data-i18n="v3.paywall.feat.categoriesBot"></div>
            </div>
          </div>

          <h2 style="font-size:18px;font-weight:800;margin-bottom:var(--sp-3);" data-i18n="v3.paywall.pickPlan"></h2>

          <div class="pw-plan" data-selected="true">
            <span class="pw-plan__badge" data-i18n="v3.paywall.popular"></span>
            <div class="pw-plan__icon">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M2 4l4 12h12l4-12-6 4-4-8-4 8z"/></svg>
            </div>
            <div style="flex:1;text-align:start;">
              <div class="pw-plan__name" data-i18n="v3.paywall.yearlyName"></div>
              <div class="pw-plan__sub" data-i18n="v3.paywall.yearlySub"></div>
            </div>
            <div style="text-align:start;">
              <div class="pw-plan__price">$29.99</div>
              <div class="pw-plan__per"><span class="font-latin">$2.50</span> <span data-i18n="v3.paywall.perMonth"></span></div>
            </div>
          </div>

          <div class="pw-plan pw-plan--monthly">
            <div class="pw-plan__icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            </div>
            <div style="flex:1;text-align:start;">
              <div class="pw-plan__name" data-i18n="v3.paywall.monthlyName"></div>
              <div class="pw-plan__sub" data-i18n="v3.paywall.monthlySub"></div>
            </div>
            <div style="text-align:start;">
              <div class="pw-plan__price">$4.99</div>
              <div class="pw-plan__per"><span class="font-latin">$4.99</span> <span data-i18n="v3.paywall.perMonth"></span></div>
            </div>
          </div>

          <button class="btn btn--filled btn--block btn--lg" style="margin-top: var(--sp-5);">
            <span data-i18n="v3.paywall.checkoutBtn"></span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3 7h7l-5.5 4.5L18 21l-6-4-6 4 1.5-7.5L2 9h7z"/></svg>
          </button>

          <div style="display:inline-flex;align-items:center;gap:6px;margin-top:var(--sp-4);font-size:var(--fs-body-s);color:var(--jx-text-2);">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            <span data-i18n="v3.paywall.secureNote"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/screen-shell.js?v=mppig4oy"></script>
  <script>
    document.addEventListener('click', function (e) {
      var p = e.target.closest('.pw-plan');
      if (p) {
        document.querySelectorAll('.pw-plan').forEach(function (x) { x.dataset.selected = 'false'; });
        p.dataset.selected = 'true';
      }
    });
  </script>
</body>
</html>
